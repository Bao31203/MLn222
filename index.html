CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":252,"text":"Thứ năm, kết hợp chặt chẽ kinh tế với quốc phòng, an ninh và đối ngoại trong hội nhập quốc tế. Mở rộng quan hệ quốc tế phải quán triệt và thực hiện nguyên tắc bình đẳng, cùng có lợi, tôn trọng độc lập, chủ quyền và không can thiệp vào công việc nội bộ của nhau."},"num":501},{"id":"C06-Q082","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Ba đột phá chiến lược cho hội nhập","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một chương trình hội nhập đồng thời sửa đổi thể chế, nâng cấp hạ tầng giao thông - số và đào tạo nhân lực chất lượng cao. Chương trình đang tập trung vào tổ hợp nào?","options":["Ba hình thức hội nhập gồm ngoại thương, đầu tư quốc tế và dịch vụ thu ngoại tệ","Ba mức độ hội nhập gồm thỏa thuận ưu đãi, khu vực mậu dịch tự do và liên minh thuế quan","Ba đột phá chiến lược gồm cải cách thể chế, phát triển hạ tầng và phát triển nguồn nhân lực","Ba tác động tích cực gồm mở rộng tiêu dùng, giao lưu văn hóa và phối hợp an ninh"],"answer":2,"explanation":"Ba nhóm hành động trong tình huống trùng với ba đột phá chiến lược mà giáo trình nêu: cải cách thể chế, phát triển hạ tầng cơ sở và phát triển nguồn nhân lực.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":252,"text":"Để chủ động hội nhập hiệu quả cần huy động nguồn lực thực hiện ba đột phá chiến lược: cải cách thể chế, phát triển hạ tầng cơ sở và phát triển nguồn nhân lực."},"num":502},{"id":"C06-Q083","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Lợi ích nhóm trong hội nhập","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một số chủ thể trong nước liên kết với đối tác nước ngoài để vận động chính sách ưu đãi riêng, khiến quá trình quyết sách quốc gia bị chi phối bởi lợi ích cục bộ. Tình huống phản ánh nguy cơ nào?","options":["Sự phụ  triển, an ninh và gia tăng vị thế của đất nước."},"num":504}];
const LETTERS = ["A","B","C","D"];
const KIND_LABELS = {
  nhan_biet_khai_niem:"Khái niệm",
  thong_hieu_phan_biet:"Phân biệt",
  trinh_tu_quan_he:"Quan hệ",
  van_dung_tinh_huong:"Tình huống",
  van_dung_tinh_toan:"Tính toán",
};

/* ====== Persistent store (localStorage) ====== */
const QUESTION_IDS = new Set(QUESTIONS.map(q=>q.id));
function readStoredJson(key,fallback){
  try{
    const raw=window.localStorage.getItem(key);
    return raw===null ? fallback : JSON.parse(raw);
  }catch(_error){ return fallback; }
}
function loadMarked(){
  const value=readStoredJson("mln222.v2.marked",[]);
  return new Set(Array.isArray(value)?value.filter(id=>typeof id==="string"&&QUESTION_IDS.has(id)):[]);
}
function loadStats(){
  const value=readStoredJson("mln222.v2.stats",{});
  const clean={};
  if(!value||typeof value!=="object"||Array.isArray(value)) return clean;
  Object.entries(value).forEach(([id,stat])=>{
    if(!QUESTION_IDS.has(id)||!stat||typeof stat!=="object"||Array.isArray(stat)) return;
    const c=Number.isSafeInteger(stat.c)&&stat.c>=0?stat.c:0;
    const w=Number.isSafeInteger(stat.w)&&stat.w>=0?stat.w:0;
    clean[id]={c,w};
  });
  return clean;
}
const LS = {
  marked:loadMarked(),
  stats:loadStats(), // id -> {c,w}
  save(){
    try{
      window.localStorage.setItem("mln222.v2.marked",JSON.stringify([...this.marked]));
      window.localStorage.setItem("mln222.v2.stats",JSON.stringify(this.stats));
    }catch(_error){ /* Continue with in-memory progress when storage is unavailable. */ }
  },
  clear(){
    try{
      window.localStorage.removeItem("mln222.v2.marked");
      window.localStorage.removeItem("mln222.v2.stats");
    }catch(_error){ /* In-memory state is still reset below. */ }
  },
  stat(id){ return this.stats[id] || (this.stats[id]={c:0,w:0}); },
};

/* ====== App state ====== */
const state = {
  mode:"quiz", chapter:"all", difficulty:"all",
  shuffle:false, onlyMarked:false, onlyWrong:false,
  pool:[], idx:0,
  answered:{}, // poolPosition -> chosen index (session, for navigation)
  sessSeen:0, sessCorrect:0, flashRevealed:-1,
};

/* ====== Helpers ====== */
const $=s=>document.querySelector(s);
const shuffleArr=a=>{for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;};

function buildChapterSelect(){
  const sel=$("#chapter");
  const chaps=[...new Set(QUESTIONS.map(q=>q.chapter))];
  let html='<option value="all">Tất cả chương</option>';
  chaps.forEach(c=>{
    const n=QUESTIONS.filter(q=>q.chapter===c).length;
    html+=`<option value="${escapeHtml(c)}">${escapeHtml(c)} (${n})</option>`;
  });
  sel.innerHTML=html;
}

function buildDifficultySelect(){
  const sel=$("#difficulty");
  const levels=[...new Set(QUESTIONS.map(q=>q.difficulty))];
  sel.innerHTML='<option value="all">Tất cả mức độ</option>'+levels.map(level=>
    `<option value="${escapeHtml(level)}">${escapeHtml(level)}</option>`
  ).join("");
}

function buildPool(){
  let pool=QUESTIONS.filter(q=>{
    if(state.chapter!=="all" && q.chapter!==state.chapter) return false;
    if(state.difficulty!=="all" && q.difficulty!==state.difficulty) return false;
    if(state.onlyMarked && !LS.marked.has(q.id)) return false;
    if(state.onlyWrong){ const s=LS.stats[q.id]; if(!s||s.w<=0) return false; }
    return true;
  });
  if(state.shuffle) pool=shuffleArr(pool.slice());
  state.pool=pool; state.idx=0; state.answered={};
  state.sessSeen=0;state.sessCorrect=0;state.flashRevealed=-1;
}

function renderSource(source){
  const el=$("#source");
  el.replaceChildren();
  const label=document.createElement("b");
  label.textContent="Nguồn:";
  el.append(label,document.createTextNode(` ${source.file||""}${source.page?` · trang ${source.page}`:""}`));
  el.append(document.createElement("br"),document.createTextNode(source.text||""));
  if(source.slide){
    const slideLabel=document.createElement("b");
    slideLabel.textContent="Slide bổ trợ:";
    el.append(document.createElement("br"),slideLabel,document.createTextNode(
      ` ${source.slide.file||""}${source.slide.number?` · slide ${source.slide.number}`:""}`
    ));
  }
}

function focusQuestion(){
  if(!$("#card").classList.contains("hidden")) $("#stem").focus({preventScroll:true});
}

/* ====== Render quiz/flashcard ====== */
function render(){
  const pool=state.pool;
  $("#poolN").textContent=pool.length;
  $("#markN").textContent=LS.marked.size;
  $("#seenAll").textContent=Object.values(LS.stats).filter(s=>s.c+s.w>0).length;
  $("#score").textContent=state.sessCorrect;
  $("#answered").textContent=state.sessSeen;
  $("#pct").textContent=state.sessSeen?Math.round(state.sessCorrect/state.sessSeen*100):0;

  if(!pool.length){
    $("#card").classList.add("hidden");
    if(!$("#noPool")){
      const d=document.createElement("div");d.id="noPool";d.className="empty";
      d.textContent="Không có câu nào khớp bộ lọc.";
      $("#studyControls").appendChild(d);
    }
    $("#pos").textContent=0;$("#bar").style.width="0%";
    return;
  }
  if($("#noPool")) $("#noPool").remove();
  $("#card").classList.remove("hidden");

  const q=pool[state.idx];
  $("#pos").textContent=state.idx+1;
  $("#bar").style.width=((state.idx+1)/pool.length*100)+"%";
  const s=LS.stats[q.id];
  const stat=s?` · đúng ${s.c} · sai ${s.w}`:"";
  $("#qtag").textContent=`${q.chapter} · Câu ${q.num}${stat}`;
  $("#qlevel").textContent=q.difficulty;
  $("#qtopic").textContent=`${q.topic} · ${KIND_LABELS[q.kind]||q.kind}`;
  $("#star").textContent=LS.marked.has(q.id)?"★":"☆";
  $("#star").classList.toggle("on",LS.marked.has(q.id));
  $("#star").setAttribute("aria-pressed",String(LS.marked.has(q.id)));
  $("#stem").textContent=q.stem;
  $("#feedback").textContent="";$("#feedback").className="feedback";
  $("#review").classList.add("hidden");
  $("#explanation").textContent="";$("#source").innerHTML="";

  const chosen=state.answered[state.idx]; // session choice
  const reveal = state.mode==="flash" ? (state.flashRevealed===state.idx) : (chosen!==undefined);

  const optsEl=$("#opts");optsEl.innerHTML="";
  q.options.forEach((opt,i)=>{
    const b=document.createElement("button");
    b.className="opt";
    b.type="button";
    b.innerHTML=`<span class="lbl">${LETTERS[i]}.</span><span>${escapeHtml(opt)}</span>`;
    b.setAttribute("aria-label",`${LETTERS[i]}. ${opt}`);
    if(reveal){
      b.classList.add("locked");
      b.disabled=true;
      if(i===q.answer) b.classList.add("correct");
      else if(i===chosen) b.classList.add("wrong");
    }else if(state.mode==="quiz"){
      b.onclick=()=>choose(q,i);
    }else{
      b.classList.add("locked");
      b.disabled=true;
    }
    optsEl.appendChild(b);
  });

  // feedback line
  if(state.mode==="quiz" && chosen!==undefined){
    const ok=chosen===q.answer;
    $("#feedback").textContent=ok?"Đúng":`Chưa đúng · Đáp án: ${LETTERS[q.answer]}`;
    $("#feedback").className="feedback "+(ok?"ok":"bad");
  }else if(state.mode==="flash" && reveal){
    $("#feedback").textContent=`Đáp án: ${LETTERS[q.answer]}. ${q.options[q.answer]}`;
    $("#feedback").className="feedback ok";
  }
  if(reveal && q.source){
    $("#review").classList.remove("hidden");
    $("#explanation").textContent=q.explanation;
    renderSource(q.source);
  }
  // flashcard reveal control via nextBtn label handled below
  $("#prevBtn").disabled=state.idx===0;
  $("#nextBtn").textContent = (state.mode==="flash" && !reveal) ? "Hiện đáp án"
      : (state.idx===pool.length-1?"Làm lại từ đầu":"Câu sau →");
}

function choose(q,i){
  if(state.answered[state.idx]!==undefined) return;
  state.answered[state.idx]=i;
  const ok=i===q.answer;
  const st=LS.stat(q.id); ok?st.c++:st.w++; LS.save();
  state.sessSeen++; if(ok) state.sessCorrect++;
  render();
  $("#feedback").focus({preventScroll:true});
}

function next(){
  if(state.mode==="flash" && state.flashRevealed!==state.idx){
    state.flashRevealed=state.idx; render(); return;
  }
  if(state.idx<state.pool.length-1){
    state.idx++;state.flashRevealed=-1;render();focusQuestion();return;
  }
  state.idx=0;state.answered={};state.sessSeen=0;state.sessCorrect=0;state.flashRevealed=-1;
  if(state.shuffle) state.pool=shuffleArr(state.pool.slice());
  render();focusQuestion();
}
function prev(){
  if(state.idx>0){state.idx--;state.flashRevealed=-1;render();focusQuestion();}
}

function toggleStar(){
  const q=state.pool[state.idx]; if(!q)return;
  LS.marked.has(q.id)?LS.marked.delete(q.id):LS.marked.add(q.id);
  LS.save();
  if(state.onlyMarked) buildPool();
  render();
}

/* ====== Search ====== */
function escapeHtml(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function normalizeText(s){
  return String(s??"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\u0111/g,"d").replace(/\u0110/g,"D").toLowerCase();
}
function hl(text,kw){
  const e=escapeHtml(text);
  if(!kw) return e;
  const re=new RegExp("("+kw.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
  return e.replace(re,"<mark>$1</mark>");
}
function doSearch(){
  const kw=$("#searchInput").value.trim();
  const box=$("#searchResults");
  const status=$("#searchStatus");
  if(kw.length<2){
    box.innerHTML='<div class="empty">Gõ ít nhất 2 ký tự để tìm.</div>';
    status.textContent="Nhập ít nhất 2 ký tự để tìm kiếm.";
    return;
  }
  const low=normalizeText(kw);
  const res=QUESTIONS.filter(q=>{
    const src=q.source?`${q.source.file} ${q.source.text} ${q.source.page||""}`:"";
    const searchable=[q.stem,q.chapter,q.topic,q.difficulty,q.explanation,src,...q.options].map(normalizeText);
    return searchable.some(value=>value.includes(low));
  });
  if(!res.length){
    box.innerHTML='<div class="empty">Không tìm thấy câu nào.</div>';
    status.textContent="Không có kết quả tìm kiếm.";
    return;
  }
  status.textContent=`Tìm thấy ${res.length} kết quả.`;
  box.innerHTML=res.slice(0,80).map(q=>`
    <div class="result">
      <div class="meta">${escapeHtml(q.chapter)} · Câu ${q.num} · ${escapeHtml(q.difficulty)} · ${escapeHtml(q.topic)}</div>
      <div class="stem">${hl(q.stem,kw)}</div>
      <div class="ans">${LETTERS[q.answer]}. ${hl(q.options[q.answer],kw)}</div>
      <div class="explain">${hl(q.explanation,kw)}</div>
      ${q.source?`<div class="meta">Nguồn: ${escapeHtml(q.source.file||"")} · trang ${q.source.page||""}</div>`:""}
    </div>`).join("")+(res.length>80?`<div class="empty">… và ${res.length-80} kết quả khác. Gõ cụ thể hơn.</div>`:"");
}

/* ====== Mode switching ====== */
function setMode(m){
  state.mode=m; state.flashRevealed=-1;
  document.querySelectorAll(".tabs button").forEach(b=>{
    const active=b.dataset.mode===m;
    b.classList.toggle("active",active);
    b.setAttribute("aria-pressed",String(active));
  });
  const search=m==="search";
  $("#studyControls").classList.toggle("hidden",search);
  $("#searchPanel").classList.toggle("hidden",!search);
  $("#scoreWrap").style.display = m==="quiz" ? "" : "none";
  if(search){doSearch();}else{buildPool();render();focusQuestion();}
}

/* ====== Wire up ====== */
function init(){
  $("#total").textContent=QUESTIONS.length;
  buildChapterSelect();
  buildDifficultySelect();
  document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
  $("#chapter").onchange=e=>{state.chapter=e.target.value;buildPool();render();};
  $("#difficulty").onchange=e=>{state.difficulty=e.target.value;buildPool();render();};
  $("#cShuffle").onclick=e=>{state.shuffle=!state.shuffle;e.currentTarget.classList.toggle("on",state.shuffle);e.currentTarget.setAttribute("aria-pressed",String(state.shuffle));buildPool();render();};
  $("#cMarked").onclick=e=>{state.onlyMarked=!state.onlyMarked;e.currentTarget.classList.toggle("on",state.onlyMarked);e.currentTarget.setAttribute("aria-pressed",String(state.onlyMarked));buildPool();render();};
  $("#cWrong").onclick=e=>{state.onlyWrong=!state.onlyWrong;e.currentTarget.classList.toggle("on",state.onlyWrong);e.currentTarget.setAttribute("aria-pressed",String(state.onlyWrong));buildPool();render();};
  $("#prevBtn").onclick=prev; $("#nextBtn").onclick=next; $("#star").onclick=toggleStar;
  $("#resetBtn").onclick=()=>{
    if(confirm("Xoá toàn bộ tiến độ, thống kê và câu đánh dấu?")){
      LS.clear();
      LS.marked=new Set();LS.stats={};state.sessSeen=0;state.sessCorrect=0;
      buildPool();render();
    }
  };
  $("#searchInput").oninput=doSearch;
  document.onkeydown=e=>{
    if(state.mode==="search" || (e.target instanceof Element && e.target.closest("input,select,textarea,button,a")))return;
    if(e.key==="ArrowRight"){e.preventDefault();next();}
    else if(e.key==="ArrowLeft"){e.preventDefault();prev();}
    else if(["1","2","3","4"].includes(e.key) && state.mode==="quiz"){
      e.preventDefault();
      const q=state.pool[state.idx]; if(q && state.answered[state.idx]===undefined) choose(q,+e.key-1);
    }
  };
  buildPool(); render();
}
init();
</script>
</body>
</html>
