cả giữa cơ quan nhà nước và doanh nghiệp","Quan hệ phân bổ tư liệu sinh hoạt giữa các nhóm người lao động","Quan hệ phân chia giá trị thặng dư giữa các nhà tư bản và địa chủ"],"answer":3,"explanation":"Lợi nhuận, lợi nhuận thương nghiệp, lợi tức và địa tô biểu hiện việc phân chia giá trị thặng dư giữa những chủ thể sở hữu tư bản và đất đai, chứ không phải những nguồn độc lập tạo ra giá trị mới.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":98,"text":"Các hình thức biểu hiện của giá trị thặng dư phản ánh quan hệ lợi ích giữa các nhà tư bản với nhau và giữa nhà tư bản với địa chủ trong phân chia giá trị thặng dư."},"num":235},{"id":"C03-Q083","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Vai trò của chi phí sản xuất","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Vai trò nào thuộc về chi phí sản xuất tư bản chủ nghĩa?","options":["Bù đắp tư bản đã tiêu dùng, bảo đảm tái sản xuất và làm căn cứ cạnh tranh giá","Đo trình độ khai thác, quyết định địa tô và loại bỏ rủi ro kinh doanh","Tạo giá trị thặng dư, xác định tiền công và thay thế vai trò của thị trường","Hoàn trả toàn bộ tư bản cố định, bảo toàn lợi nhuận và cố định giá bán"],"answer":0,"explanation":"Chi phí sản xuất bù lại tư liệu sản xuất đã tiêu dùng và sức lao động đã sử dụng cả về giá trị lẫn hiện vật. Nó bảo đảm điều kiện tái sản xuất và là căn cứ quan trọng trong cạnh tranh về giá bán.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":100,"text":"Chi phí sản xuất bù đắp tư bản về giá trị và hiện vật, bảo đảm tái sản xuất, đồng thời là căn cứ cạnh tranh về giá bán."},"num":236},{"id":"C03-Q084","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Lợi nhuận và tỷ suất lợi nhuận","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Lợi nhuận tính bằng số tuyệt đối và tỷ suất lợi nhuận phản ánh khác nhau như thế nào?","options":["Lợi nhuận phản ánh tốc độ chu chuyển; tỷ suất lợi nhuận phản ánh thời gian một vòng","Lợi nhuận phản ánh mức doanh lợi; tỷ suất lợi nhuận phản ánh quy mô tư bản cố định","Lợi nhuận phản ánh trình độ khai thác; tỷ suất lợi nhuận phản ánh giá trị sức lao động","Lợi nhuận phản ánh quy mô hiệu quả; tỷ suất lợi nhuận phản ánh mức doanh lợi"],"answer":3,"explanation":"Số lợi nhuận cho biết doanh nghiệp thu được một lượng chênh lệch lớn hay nhỏ. Tỷ suất lợi nhuận so sánh khoản đó với toàn bộ tư bản ứng trước nên phản ánh đầy đủ hơn mức độ hiệu quả đầu tư.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":101,"text":"Lợi nhuận tuyệt đối phản ánh quy mô hiệu quả, còn tỷ suất lợi nhuận là số đo tương đối phản ánh mức doanh lợi đầu tư tư bản."},"num":237},{"id":"C03-Q085","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Trình độ khai thác sức lao động và tích lũy","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một doanh nghiệp giữ nguyên tỷ lệ chia giá trị thặng dư giữa tích lũy và tiêu dùng, nhưng cắt giảm tiền công và tăng thời gian làm thêm. Nhân tố nào đang làm quy mô tích lũy có điều kiện tăng?","options":["Năng suất lao động xã hội tăng làm giá trị tư liệu sinh hoạt giảm","Chênh lệch giữa tư bản cố định sử dụng và tư bản đã tiêu dùng tăng","Đại lượng tư bản ứng trước tăng trong khi thị trường đầu ra thuận lợi","Trình độ khai thác sức lao động tăng, tạo khả năng tăng giá trị thặng dư"],"answer":3,"explanation":"Cắt giảm tiền công và tăng thời gian làm thêm là các biện pháp nâng trình độ khai thác sức lao động. Khi tỷ suất và khối lượng giá trị thặng dư tăng, phần dành cho tích lũy cũng có điều kiện tăng dù tỷ lệ phân chia không đổi.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":95,"text":"Tăng trình độ khai thác sức lao động bằng các biện pháp như cắt giảm tiền công, tăng ca và tăng cường độ tạo điều kiện tăng quy mô tích lũy."},"num":238},{"id":"C03-Q086","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tác động tới tỷ suất lợi nhuận","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Trong các điều kiện khác không đổi, chuỗi tác động nào đúng đối với tỷ suất lợi nhuận?","options":["Tỷ suất giá trị thặng dư tăng làm tỷ suất lợi nhuận giảm; chu chuyển nhanh làm tỷ suất lợi nhuận giảm","Tỷ suất giá trị thặng dư tăng làm tỷ suất lợi nhuận tăng; chu chuyển nhanh làm tỷ suất lợi nhuận tăng","Tỷ suất giá trị thặng dư không tác động; chu chuyển nhanh chỉ làm thay đổi hao mòn hữu hình","Tỷ suất giá trị thặng dư tăng chỉ làm c tăng; chu chuyển nhanh chỉ làm v giảm"],"answer":1,"explanation":"Tỷ suất giá trị thặng dư tăng trực tiếp làm tăng lượng giá trị thặng dư tương ứng. Chu chuyển nhanh hơn làm tỷ lệ giá trị thặng dư hằng năm tăng; do đó cả hai đều tạo xu hướng tăng tỷ suất lợi nhuận khi các điều kiện khác giữ nguyên.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":102,"text":"Tỷ suất giá trị thặng dư tăng và tốc độ chu chuyển lớn hơn đều tác động làm tỷ suất lợi nhuận tăng."},"num":239},{"id":"C03-Q087","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Vai trò định hướng của lợi nhuận bình quân","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao lợi nhuận bình quân trở thành căn cứ để doanh nghiệp lựa chọn ngành, nghề và phương án kinh doanh?","options":["Vì bảo đảm mọi khoản tư bản đều thu cùng một số lợi nhuận tuyệt đối","Vì làm giá cả từng hàng hóa luôn bằng đúng giá trị trong mọi thời điểm","Vì cung cấp chuẩn so sánh để lựa chọn hướng đầu tư có hiệu quả hơn","Vì thay thế cạnh tranh và ngăn tư bản di chuyển giữa các ngành"],"answer":2,"explanation":"Lợi nhuận bình quân biểu hiện mức lợi nhuận mà những tư bản như nhau có xu hướng thu được khi đầu tư vào các ngành khác nhau. Vì vậy, nó là chuẩn để so sánh và lựa chọn hướng kinh doanh hiệu quả.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":105,"text":"Lợi nhuận bình quân trở thành căn cứ để doanh nghiệp lựa chọn ngành, nghề và phương án kinh doanh có hiệu quả."},"num":240},{"id":"C03-Q088","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Điều kiện hình thành lợi nhuận bình quân","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Hai điều kiện được giáo trình nêu cho sự hình thành tỷ suất lợi nhuận bình quân, lợi nhuận bình quân và giá cả sản xuất là gì?","options":["Tư bản bị cố định giữa các ngành và sức lao động không thể di chuyển","Tư bản tự do di chuyển và sức lao động tự do di chuyển","Mọi ngành có cùng cấu tạo hữu cơ và không cần diễn ra cạnh tranh","Mọi hàng hóa bán cùng một giá và các nhà tư bản ngừng đầu tư"],"answer":1,"explanation":"Cạnh tranh giữa ngành chỉ phát huy cơ chế san bằng khi tư bản có thể chuyển đến nơi có tỷ suất lợi nhuận cao hơn và sức lao động cũng có khả năng dịch chuyển giữa các ngành.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":105,"text":"Điều kiện hình thành lợi nhuận bình quân và giá cả sản xuất gồm tư bản tự do di chuyển và sức lao động tự do di chuyển."},"num":241},{"id":"C03-Q089","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Sự hình thành tư bản thương nghiệp","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Tư bản thương nghiệp xuất hiện như thế nào trong nền kinh tế thị trường tư bản chủ nghĩa?","options":["Là bộ phận tư bản xã hội chuyên cho vay lượng tiền nhàn rỗi","Là bộ phận chuyên môn hóa lưu thông hàng hóa do phân công lao động xã hội","Là bộ phận tư bản chuyên thực hiện mua bán và nhờ lưu thông tự tạo ra toàn bộ giá trị mới","Là bộ phận tư bản nông nghiệp chuyên cho thuê những mảnh đất tốt"],"answer":1,"explanation":"Khi phân công lao động xã hội phát triển, chức năng lưu thông hàng hóa được chuyên môn hóa thành hoạt động của tư bản thương nghiệp. Chuyên môn hóa lưu thông không làm mua bán trở thành nguồn tạo giá trị thặng dư.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":105,"text":"Do phân công lao động xã hội, một bộ phận chuyên môn hóa việc lưu thông hàng hóa xuất hiện và được gọi là tư bản thương nghiệp.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":50}},"num":242},{"id":"C03-Q090","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Cơ sở hình thành quan hệ cho vay","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Tình hình kinh tế nào trực tiếp thúc đẩy quan hệ cho vay và đi vay hình thành?","options":["Mọi chủ thể đều có đủ vốn nên không phát sinh nhu cầu sử dụng vốn của nhau","Mọi lượng tiền đều đi vào tiêu dùng nên không có tiền nhàn rỗi trong nền kinh tế","Chỉ địa chủ có đất cho thuê còn các chủ thể sản xuất không cần ứng trước vốn","Có chủ thể tạm thời thừa tiền trong khi chủ thể khác cần vốn kinh doanh"],"answer":3,"explanation":"Sự cùng tồn tại của lượng tiền tạm thời nhàn rỗi và nhu cầu vốn để mở rộng sản xuất kinh doanh tạo cơ sở cho quan hệ tín dụng; người cho vay thu lợi tức và người đi vay phải trả lợi tức.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":106,"text":"Quan hệ vay hình thành khi có chủ thể có tiền nhàn rỗi và chủ thể khác cần tiền để mở rộng sản xuất kinh doanh."},"num":243},{"id":"C03-Q091","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Quyền sở hữu và sử dụng tư bản cho vay","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Sự tách rời quyền sở hữu khỏi quyền sử dụng trong tư bản cho vay được hiểu như thế nào?","options":["Người đi vay trở thành chủ sở hữu, còn người cho vay chỉ được sử dụng vốn trong thời hạn vay","Người đi vay có cả quyền sở hữu lẫn sử dụng vĩnh viễn như khi mua hàng hóa thông thường","Người cho vay và người đi vay đều mất mọi quyền đối với vốn ngay khi giao dịch được ký","Người cho vay giữ quyền sở hữu; người đi vay chỉ sử dụng vốn trong thời hạn vay"],"answer":3,"explanation":"Chủ thể sở hữu tư bản cho phép chủ thể khác sử dụng vốn trong một thời hạn nhưng không chuyển quyền sở hữu. Hết thời hạn, người đi vay phải hoàn trả vốn và trả lợi tức theo quan hệ đã thỏa thuận.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":106,"text":"Trong tư bản cho vay, chủ thể sở hữu không trực tiếp sử dụng, còn chủ thể sử dụng chỉ có quyền sử dụng trong một thời hạn nhất định."},"num":244},{"id":"C03-Q092","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tích lũy và tư bản khả biến tương đối","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Sau nhiều vòng tích lũy, doanh nghiệp tăng máy móc nhanh hơn nhiều so với tăng lao động; số lao động vẫn tăng nhẹ nhưng tỷ lệ v so với c giảm. Kết luận nào phù hợp?","options":["v giảm tuyệt đối và giảm tương đối so với c, nên cấu tạo hữu cơ giảm","v tăng tuyệt đối nhưng giảm tương đối so với c, nên nguy cơ dư thừa lao động tăng","v tăng nhanh hơn c, nên nhu cầu sức lao động tăng nhanh hơn quy mô tư bản","v tăng cùng tỷ lệ với c, nên cấu tạo hữu cơ và nhu cầu sức lao động không đổi"],"answer":1,"explanation":"Tăng tuyệt đối số lao động không loại trừ việc v giảm tương đối so với c. Khi cấu tạo hữu cơ tăng và nhu cầu sức lao động tăng chậm hơn quy mô tư bản, nguy cơ hình thành bộ phận lao động dư thừa xuất hiện.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":97,"text":"Khi cấu tạo hữu cơ tăng, tư bản khả biến có xu hướng giảm tương đối so với tư bản bất biến, dẫn tới nguy cơ thừa nhân khẩu."},"num":245},{"id":"C03-Q093","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Giá cả của tư bản cho vay","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Vì sao giá cả của tư bản cho vay không được quyết định trực tiếp bởi giá trị của bản thân số tiền cho vay?","options":["Vì số tiền cho vay mất hoàn toàn giá trị sử dụng ngay khi được chuyển giao","Vì giá cả của vốn vay chỉ bằng chi phí in và bảo quản lượng tiền đó","Vì giá cả ấy dựa vào khả năng sử dụng vốn để thu lợi nhuận bình quân","Vì người đi vay mua đứt quyền sở hữu nên không phải hoàn trả tiền gốc"],"answer":2,"explanation":"Tư bản cho vay là hàng hóa đặc biệt. Giá cả của nó gắn với giá trị sử dụng là khả năng đem lại lợi nhuận bình quân cho người sử dụng, nên không do giá trị của số tiền quyết định và thấp hơn nhiều so với giá trị ấy.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":107,"text":"Giá cả tư bản cho vay do giá trị sử dụng là khả năng thu lợi nhuận bình quân quyết định, không do giá trị của tư bản cho vay quyết định."},"num":246},{"id":"C03-Q094","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Nhân tố ảnh hưởng tỷ suất lợi tức","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Hai nhân tố chủ yếu ảnh hưởng đến tỷ suất lợi tức là gì?","options":["Cấu tạo kỹ thuật và mức hao mòn hữu hình của máy móc","Tỷ suất lợi nhuận bình quân và cung cầu về tư bản cho vay","Giá trị sức lao động và số vòng chu chuyển của tư bản cố định","Độ màu mỡ của đất và tỷ lệ phân chia quỹ tiêu dùng"],"answer":1,"explanation":"Khả năng sinh lợi của vốn trong kinh doanh đặt nền tảng cho lợi tức, còn quan hệ cung cầu vốn cho vay tác động trực tiếp đến mức tỷ suất được thỏa thuận trên thị trường tín dụng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":107,"text":"Tỷ suất lợi tức chịu ảnh hưởng chủ yếu của tỷ suất lợi nhuận bình quân và tình hình cung cầu về tư bản cho vay."},"num":247},{"id":"C03-Q095","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tư bản giả","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Loại tài sản nào được C. Mác gọi là tư bản giả trong nội dung về thị trường chứng khoán?","options":["Cổ phiếu và trái phiếu được giao dịch tương đối tách biệt với kinh doanh thực","Tiền công và tư liệu sinh hoạt dùng để tái sản xuất sức lao động","Máy móc, nhà xưởng và nguyên liệu đang trực tiếp vận động trong quá trình sản xuất thực","Tiền mặt được cất giữ ngoài lưu thông và không phát sinh giao dịch"],"answer":0,"explanation":"Cổ phiếu và trái phiếu là những chứng khoán có thể được mua bán tương đối tách biệt với quá trình sản xuất kinh doanh thực. Vì đặc điểm đó, C. Mác gọi chúng là tư bản giả.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":107,"text":"Cổ phiếu và trái phiếu được gọi là tư bản giả vì được giao dịch tương đối tách biệt với quá trình sản xuất kinh doanh thực."},"num":248},{"id":"C03-Q096","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Khái niệm địa tô tư bản chủ nghĩa","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Địa tô tư bản chủ nghĩa là bộ phận nào trong kết quả kinh doanh nông nghiệp?","options":["Phần lợi nhuận siêu ngạch ngoài lợi nhuận bình quân được trả cho địa chủ","Toàn bộ lợi nhuận bình quân mà nhà tư bản nông nghiệp giữ lại sau khi thuê đất","Phần tiền công của công nhân nông nghiệp được chuyển thành giá thuê đất","Phần lợi tức ngân hàng trả cho địa chủ vì đã gửi số tiền thu từ nông nghiệp"],"answer":0,"explanation":"Nhà tư bản kinh doanh nông nghiệp trước hết thu lợi nhuận bình quân như tư bản ở ngành khác. Phần giá trị thặng dư dôi ra ngoài lợi nhuận bình quân được chuyển cho chủ đất dưới hình thái địa tô.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":108,"text":"Địa tô là phần giá trị thặng dư còn lại sau khi khấu trừ lợi nhuận bình quân mà nhà tư bản nông nghiệp phải trả cho địa chủ.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":52}},"num":249},{"id":"C03-Q097","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Giá cả đất đai và tỷ suất lợi tức","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Theo công thức ở trang 109, nếu địa tô không đổi còn tỷ suất lợi tức nhận gửi của ngân hàng giảm, giá cả đất đai thay đổi thế nào?","options":["Giảm vì tỷ suất lợi tức thấp hơn làm mẫu số trong công thức giá đất tăng lên","Tăng vì cùng một địa tô được chia cho tỷ suất lợi tức thấp hơn","Tăng đúng bằng mức giảm của tỷ suất lợi tức, không phụ thuộc quy mô địa tô","Không đổi vì tỷ suất lợi tức chỉ chi phối vốn cho vay, không tham gia cách tính giá đất"],"answer":1,"explanation":"Giá cả đất đai bằng địa tô chia cho tỷ suất lợi tức nhận gửi của ngân hàng. Khi địa tô giữ nguyên và mẫu số giảm, thương số tăng; vì vậy giá đất tăng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":109,"text":"Giá cả đất đai được tính bằng địa tô chia cho tỷ suất lợi tức nhận gửi của ngân hàng."},"num":250},{"id":"C03-Q098","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Trách nhiệm trong quan hệ lao động","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một chủ doanh nghiệp cho rằng trả lương đúng hạn là đã hết mọi trách nhiệm, dù cách tổ chức công việc gây tổn hại lợi ích của người lao động. Đánh giá nào phù hợp?","options":["Chưa đầy đủ; người mua sức lao động phải có trách nhiệm với lợi ích của người lao động","Đúng, vì tư liệu sản xuất là nguồn duy nhất tạo giá trị mới cho doanh nghiệp","Đúng, vì tiền công là khoản chủ doanh nghiệp tự tạo ra rồi trao cho người lao động","Chưa đầy đủ; người lao động phải từ bỏ lợi ích để bảo đảm lợi nhuận cho doanh nghiệp"],"answer":0,"explanation":"Tiền công là một phần giá trị mới do người lao động tạo ra, không phải món quà của chủ doanh nghiệp. Người mua sức lao động phải đối xử có trách nhiệm, còn người lao động có quyền bảo vệ lợi ích chính đáng của mình.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":84,"text":"Người mua sức lao động cần đối xử có trách nhiệm vì người lao động là nguồn gốc sự giàu có; người bán sức lao động cần bảo vệ lợi ích của mình."},"num":251},{"id":"C03-Q099","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Ý nghĩa thực tiễn của lý luận địa tô","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Định hướng chính sách nào phù hợp với ý nghĩa thực tiễn của lý luận địa tô tư bản chủ nghĩa?","options":["Hoàn thiện thuế và quan hệ đất đai, điều tiết địa tô, khuyến khích thâm canh và tiết kiệm đất","Bãi bỏ điều tiết địa tô, miễn mọi thuế đất và khuyến khích để đất không sử dụng","Ấn định một giá đất vĩnh viễn, tách giá đất khỏi lợi tức và không xét hiệu quả sử dụng","Chuyển toàn bộ địa tô cho thương nghiệp, hạn chế đầu tư nông nghiệp và mở rộng đất bỏ hoang"],"answer":0,"explanation":"Lý luận địa tô cung cấp cơ sở cho chính sách thuế, điều tiết địa tô và giải quyết quan hệ đất đai. Mục tiêu là kết hợp lợi ích, khuyến khích thâm canh, sử dụng đất tiết kiệm và phát triển nông nghiệp hàng hóa bền vững.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":109,"text":"Lý luận địa tô là cơ sở cho chính sách thuế, điều tiết địa tô và đất đai nhằm hài hòa lợi ích, khuyến khích thâm canh và sử dụng đất tiết kiệm."},"num":252},{"id":"C04-Q001","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Khái niệm độc quyền","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Nội dung nào diễn đạt đúng khái niệm độc quyền trong nền kinh tế thị trường?","options":["Sự hợp tác tạm thời giữa các doanh nghiệp nhỏ để cùng chia sẻ chi phí sản xuất","Sự liên minh giữa các doanh nghiệp lớn có khả năng thâu tóm sản xuất, tiêu thụ và định giá độc quyền","Cơ chế nhà nước dùng chính sách kinh tế để điều hòa hoạt động của mọi doanh nghiệp","Quá trình các doanh nghiệp cùng ngành tự nguyện công khai toàn bộ bí quyết kỹ thuật"],"answer":1,"explanation":"Độc quyền là liên minh của các doanh nghiệp lớn đủ sức chi phối sản xuất, tiêu thụ và áp đặt giá cả độc quyền nhằm thu lợi nhuận độc quyền cao.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":113,"text":"Độc quyền là liên minh doanh nghiệp lớn có khả năng thâu tóm sản xuất, tiêu thụ và định ra giá cả độc quyền.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":3}},"num":253},{"id":"C04-Q002","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Bản chất độc quyền nhà nước trong chủ nghĩa tư bản","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Độc quyền nhà nước trong chủ nghĩa tư bản hình thành nhằm mục đích cơ bản nào?","options":["Thay lợi ích của tư bản độc quyền bằng lợi ích chung và chấm dứt nền sản xuất tư bản chủ nghĩa","Phục vụ lợi ích của các tổ chức độc quyền tư nhân và tiếp tục duy trì, phát triển chủ nghĩa tư bản","Tách sức mạnh kinh tế của Nhà nước khỏi các tổ chức độc quyền và khỏi quá trình tái sản xuất","Xóa bỏ các tổ chức độc quyền tư nhân để chuyển toàn bộ tư liệu sản xuất cho người lao động"],"answer":1,"explanation":"Bản chất của độc quyền nhà nước trong chủ nghĩa tư bản là kết hợp sức mạnh nhà nước với độc quyền tư nhân để phục vụ lợi ích độc quyền và duy trì chế độ tư bản chủ nghĩa.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":118,"text":"Độc quyền nhà nước trong chủ nghĩa tư bản hình thành để phục vụ lợi ích của tổ chức độc quyền tư nhân và duy trì, phát triển chủ nghĩa tư bản.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":11}},"num":254},{"id":"C04-Q003","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Nguyên nhân hình thành độc quyền","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Sự phát triển của lực lượng sản xuất thúc đẩy độc quyền hình thành trước hết qua quá trình nào?","options":["Tiến bộ kỹ thuật thay thế quan hệ tín dụng, khiến doanh nghiệp không còn nhu cầu liên kết","Tiến bộ kỹ thuật làm nhu cầu vốn giảm, khiến doanh nghiệp lớn tự tách thành nhiều đơn vị độc lập","Tiến bộ kỹ thuật xóa bỏ lợi thế quy mô, làm thị trường chỉ còn các cơ sở sản xuất nhỏ","Tiến bộ kỹ thuật đòi hỏi vốn lớn, thúc đẩy tích tụ, tập trung sản xuất và hình thành doanh nghiệp quy mô lớn"],"answer":3,"explanation":"Khoa học - kỹ thuật mới làm xuất hiện ngành cần quy mô vốn lớn và tăng khả năng tích lũy, qua đó thúc đẩy tích tụ, tập trung sản xuất.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":114,"text":"Tiến bộ khoa học - kỹ thuật thúc đẩy năng suất, tích lũy, tích tụ và tập trung sản xuất quy mô lớn.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":4}},"num":255},{"id":"C04-Q004","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Cạnh tranh và sự hình thành độc quyền","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Cạnh tranh gay gắt góp phần hình thành độc quyền theo cơ chế chủ yếu nào?","options":["Làm mọi doanh nghiệp có quy mô ngang nhau nên không bên nào có thể chi phối thị trường","Buộc doanh nghiệp lớn chia nhỏ vốn để tránh phải đổi mới kỹ thuật và phương thức quản lý","Làm hệ thống tín dụng ngừng hoạt động nên doanh nghiệp chỉ có thể dùng vốn tự có","Làm doanh nghiệp vừa và nhỏ phá sản, còn doanh nghiệp lớn tăng tích tụ, tập trung và liên kết với nhau"],"answer":3,"explanation":"Cạnh tranh đào thải doanh nghiệp yếu và làm các doanh nghiệp lớn còn lại phải tăng tích tụ, tập trung hoặc liên kết để tiếp tục phát triển.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":114,"text":"Cạnh tranh làm doanh nghiệp vừa và nhỏ phá sản, thúc đẩy doanh nghiệp lớn tích tụ, tập trung và liên kết.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":5}},"num":256},{"id":"C04-Q005","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Tín dụng và sự hình thành độc quyền","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Sự phát triển của hệ thống tín dụng thúc đẩy quá trình hình thành độc quyền bằng cách nào?","options":["Phân tán nguồn vốn giữa các doanh nghiệp nhỏ, ngăn quá trình tích tụ và tập trung sản xuất","Trở thành đòn bẩy tập trung sản xuất, thúc đẩy hình thành và phát triển các công ty cổ phần","Hạn chế doanh nghiệp huy động vốn bên ngoài, buộc công ty cổ phần chuyển thành hộ kinh doanh","Làm các doanh nghiệp độc lập hoàn toàn về tài chính và không còn nhu cầu liên kết với nhau"],"answer":1,"explanation":"Hệ thống tín dụng là đòn bẩy mạnh thúc đẩy tập trung sản xuất, đặc biệt thông qua sự hình thành và phát triển của công ty cổ phần.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":115,"text":"Sự phát triển của tín dụng thúc đẩy tập trung sản xuất và công ty cổ phần, tạo tiền đề cho các tổ chức độc quyền.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":8}},"num":257},{"id":"C04-Q006","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Giá cả độc quyền","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Cặp mức giá nào cấu thành giá cả độc quyền mà tổ chức độc quyền thường áp đặt?","options":["Giá bán cao và giá mua thấp","Giá bán thấp và giá mua cao","Giá bán bằng giá trị và giá mua bằng chi phí","Giá bán cố định và giá mua tự do"],"answer":0,"explanation":"Tổ chức độc quyền dùng vị thế chi phối để áp đặt giá độc quyền cao khi bán và giá độc quyền thấp khi mua.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":116,"text":"Giá cả độc quyền gồm giá cả độc quyền cao khi bán và giá cả độc quyền thấp khi mua."},"num":258},{"id":"C04-Q007","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Nguồn gốc lợi nhuận độc quyền cao","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Nguồn gốc thực chất của lợi nhuận độc quyền cao được giáo trình xác định là gì?","options":["Chênh lệch tỷ giá và lãi suất do ngân hàng trung ương điều chỉnh trên thị trường tiền tệ","Lao động trong và ngoài xí nghiệp độc quyền cùng phần giá trị bị chuyển dịch qua cạnh tranh","Khoản tiết kiệm chi phí nhờ kỹ thuật mới, hoàn toàn không liên quan đến lao động và cạnh tranh","Trợ cấp ngân sách và hợp đồng mua sắm công mà nhà nước dành riêng cho mọi doanh nghiệp"],"answer":1,"explanation":"Lợi nhuận độc quyền cao vẫn bắt nguồn từ lao động của công nhân, đồng thời bao gồm phần giá trị thặng dư và lao động thặng dư bị chiếm đoạt qua vị thế độc quyền.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":115,"text":"Nguồn lợi nhuận độc quyền cao gồm lao động trong, ngoài xí nghiệp độc quyền và phần giá trị bị chuyển dịch từ các chủ thể yếu hơn."},"num":259},{"id":"C04-Q008","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Khái niệm độc quyền nhà nước","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Đâu là nội dung cốt lõi của khái niệm độc quyền nhà nước?","options":["Nhà nước rút khỏi mọi lĩnh vực then chốt để doanh nghiệp tư nhân tự điều tiết nền kinh tế","Nhà nước nắm vị thế độc quyền ở lĩnh vực then chốt để tạo sức mạnh vật chất cho ổn định chế độ","Nhà nước chia đều quyền định giá cho mọi doanh nghiệp nhằm loại bỏ khác biệt về quy mô","Nhà nước chỉ giám sát cạnh tranh mà không sở hữu hay chi phối bất kỳ nguồn lực kinh tế nào"],"answer":1,"explanation":"Độc quyền nhà nước là kiểu độc quyền trong đó nhà nước giữ vị thế ở các lĩnh vực then chốt nhằm tạo sức mạnh vật chất cho sự ổn định chính trị - xã hội.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":116,"text":"Nhà nước nắm vị thế độc quyền ở lĩnh vực then chốt để tạo sức mạnh vật chất cho ổn định chế độ chính trị - xã hội.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":9}},"num":260},{"id":"C04-Q009","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Nguyên nhân hình thành độc quyền nhà nước","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Sự phát triển của phân công lao động xã hội làm nảy sinh độc quyền nhà nước vì lý do nào?","options":["Xuất hiện ngành quan trọng cần vốn lớn, thu hồi chậm, ít lợi nhuận mà tư nhân không thể hoặc không muốn đầu tư","Các tổ chức độc quyền tư nhân muốn đầu tư toàn bộ vốn vào những ngành thu hồi vốn chậm","Các chính sách xã hội đã xóa bỏ hoàn toàn phân hóa giàu - nghèo và mâu thuẫn giai cấp","Quan hệ kinh tế quốc tế phát triển làm vai trò điều tiết của nhà nước trở nên không cần thiết"],"answer":0,"explanation":"Nhiều ngành hạ tầng và dịch vụ cơ bản có vai trò lớn nhưng vốn đầu tư cao, hoàn vốn chậm và lợi nhuận thấp, nên nhà nước phải đứng ra đảm nhận.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":117,"text":"Phân công lao động tạo ngành quan trọng có vốn lớn, thu hồi chậm, ít lợi nhuận mà độc quyền tư nhân không thể hoặc không muốn đầu tư.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":10}},"num":261},{"id":"C04-Q010","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Tác động tích cực của độc quyền","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Tác động nào sau đây là một khả năng tích cực do độc quyền tạo ra?","options":["Tạo cung cầu giả tạo bằng cách hạn chế khối lượng hàng hóa trên thị trường","Tập trung nguồn lực tài chính cho nghiên cứu, triển khai khoa học - kỹ thuật","Trì hoãn sáng chế khi đổi mới có thể làm vị thế độc quyền bị lung lay","Làm nhóm lợi ích cục bộ chi phối chính sách và tăng phân hóa giàu - nghèo"],"answer":1,"explanation":"Quy mô tích tụ và tập trung cao cho phép tổ chức độc quyền huy động nguồn lực lớn cho nghiên cứu và triển khai khoa học - kỹ thuật.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":119,"text":"Độc quyền có khả năng tập trung nguồn lực, nhất là tài chính, cho nghiên cứu và triển khai khoa học - kỹ thuật.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":12}},"num":262},{"id":"C04-Q011","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Tác động tiêu cực của độc quyền","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Hành vi nào của tổ chức độc quyền trực tiếp gây thiệt hại cho người tiêu dùng và xã hội?","options":["Áp đặt giá bán cao, hạn chế sản lượng và tạo cung cầu hàng hóa giả tạo","Ứng dụng công nghệ mới để giảm chi phí và tăng năng suất lao động","Đầu tư vào ngành mũi nhọn để mở rộng quy mô sản xuất hiện đại","Tập trung nguồn lực tài chính cho hoạt động nghiên cứu và triển khai"],"answer":0,"explanation":"Giá bán cao, lượng cung bị hạn chế và cung cầu giả tạo tạo ra trao đổi không ngang giá, làm người tiêu dùng và xã hội chịu thiệt.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":121,"text":"Độc quyền áp đặt giá bán cao, giá mua thấp, hạn chế hàng hóa và tạo cung cầu giả tạo, gây thiệt hại xã hội.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":13}},"num":263},{"id":"C04-Q012","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Biểu hiện mới về cơ chế quan hệ nhân sự","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Biểu hiện mới về cơ chế quan hệ nhân sự trong độc quyền nhà nước dưới chủ nghĩa tư bản là gì?","options":["Thể chế đa nguyên và cơ chế thỏa hiệp giữa các thế lực độc quyền phát triển, hạn chế một thế lực độc tôn","Quan hệ nhân sự giữa giới độc quyền và Nhà nước chấm dứt vì hai bên không còn tác động đến nhau","Mọi đại diện doanh nghiệp bị loại khỏi đời sống chính trị nên quyền lực nhà nước không còn sự thỏa hiệp","Một thế lực tư bản độc quyền được phép độc tôn và loại bỏ mọi lực lượng tư bản đối lập khỏi bộ máy nhà nước"],"answer":0,"explanation":"Tại các nước tư bản phát triển, cơ chế thỏa hiệp và phân chia quyền lực giữa các thế lực độc quyền trở nên phổ biến, không để một thế lực dễ dàng độc tôn.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":141,"text":"Thể chế đa nguyên và cơ chế thỏa hiệp giữa các thế lực tư bản độc quyền trở nên phổ biến, không cho phép một thế lực độc tôn.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":46}},"num":264},{"id":"C04-Q013","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Các loại cạnh tranh ở trạng thái độc quyền","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Đâu là biểu hiện của cạnh tranh trong nội bộ một tổ chức độc quyền?","options":["Hai tổ chức độc quyền khác ngành tranh giành cùng một nguồn lực đầu vào quan trọng","Tổ chức độc quyền kiểm soát nguồn nguyên liệu để loại doanh nghiệp ngoài độc quyền khỏi thị trường","Các thành viên tranh giành cổ phần khống chế để có vị trí chi phối và phân chia lợi ích thuận lợi hơn","Các chính phủ ký hiệp định để phân định khu vực ảnh hưởng giữa những quốc gia"],"answer":2,"explanation":" ":124,"text":"Syndicate giữ độc lập sản xuất cho thành viên nhưng tập trung toàn bộ việc mua và bán vào một ban quản trị chung.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":18}},"num":267},{"id":"C04-Q016","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Hình thức trust","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Đặc trưng tổ chức nào thuộc về trust?","options":["Thành viên chỉ thỏa thuận giá cả nhưng tự mua, tự bán và tự tổ chức sản xuất","Thành viên tự tổ chức sản xuất nhưng giao toàn bộ mua bán cho ban quản trị chung","Các liên minh đa ngành chỉ phụ thuộc tài chính vào một nhóm tư bản đứng đầu","Một ban quản trị chung thống nhất cả sản xuất và tiêu thụ, còn thành viên trở thành cổ đông"],"answer":3,"explanation":"Trust tập trung quyền quản lý cả sản xuất lẫn tiêu thụ; các xí nghiệp thành viên không còn độc lập mà nhận lợi nhuận theo cổ phần.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":124,"text":"Trong trust, một ban quản trị chung quản lý cả sản xuất và tiêu thụ, các xí nghiệp trở thành cổ đông.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":19}},"num":268},{"id":"C04-Q017","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Hình thức consortium","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Mô tả nào phù hợp nhất với consortium?","options":["Hiệp nghị cùng ngành về giá, sản lượng và thị trường, trong khi từng thành viên vẫn tự sản xuất và lưu thông","Liên minh quy mô lớn gồm nhiều xí nghiệp và tổ chức độc quyền ở các ngành liên quan, chịu chi phối tài chính chung","Liên minh lưu thông, trong đó thành viên tự sản xuất nhưng ban chung phụ trách mua nguyên liệu và bán hàng","Liên minh cùng ngành, trong đó ban quản trị chung thống nhất sản xuất, tiêu thụ và chia lợi nhuận theo cổ phần"],"answer":1,"explanation":"Consortium có trình độ và quy mô lớn, liên kết dọc nhiều đơn vị thuộc các ngành có quan hệ kinh tế, kỹ thuật và chịu sự chi phối tài chính chung.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":125,"text":"Consortium liên kết các xí nghiệp và tổ chức độc quyền thuộc nhiều ngành liên quan dưới sự phụ thuộc tài chính chung."},"num":269},{"id":"C04-Q018","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Tư bản tài chính","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Theo V.I. Lênin, tư bản tài chính hình thành từ sự hợp nhất nào?","options":["Tư bản ngân hàng của các ngân hàng độc quyền lớn với tư bản của các liên minh độc quyền công nghiệp","Tư bản thương nghiệp của doanh nghiệp bán lẻ với ngân sách tiêu dùng của các hộ gia đình","Tư bản cho vay của ngân hàng nhỏ với vốn tự có của những người sản xuất cá thể","Tư bản nhà nước trong kết cấu hạ tầng với vốn viện trợ của các tổ chức quốc tế"],"answer":0,"explanation":"Tư bản tài chính là kết quả xâm nhập và hợp nhất giữa độc quyền ngân hàng với độc quyền công nghiệp.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":126,"text":"Tư bản tài chính là sự hợp nhất giữa tư bản ngân hàng độc quyền lớn và tư bản của liên minh độc quyền công nghiệp.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":23}},"num":270},{"id":"C04-Q019","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Xuất khẩu tư bản","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Khái niệm xuất khẩu tư bản được hiểu như thế nào?","options":["Đưa hàng hóa ra nước ngoài để thực hiện giá trị đã tạo ra trong nước","Chuyển người lao động ra nước ngoài để cung ứng dịch vụ theo hợp đồng","Bán công nghệ ra nước ngoài để thu một lần phí chuyển giao quyền sử dụng","Đưa giá trị ra nước ngoài để thu giá trị thặng dư và các nguồn lợi nhuận khác"],"answer":3,"explanation":"Xuất khẩu tư bản là đầu tư giá trị ra nước ngoài với mục tiêu thu giá trị thặng dư và các khoản lợi nhuận khác tại nước nhập khẩu tư bản.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":127,"text":"Xuất khẩu tư bản là xuất khẩu giá trị ra nước ngoài nhằm thu giá trị thặng dư và các nguồn lợi nhuận khác.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":25}},"num":271},{"id":"C04-Q020","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Vai trò lịch sử của chủ nghĩa tư bản","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Chuyển biến nào được giáo trình xác định là một vai trò tích cực của chủ nghĩa tư bản?","options":["Chuyển nền sản xuất nhỏ thành nền sản xuất tập trung, quy mô lớn và hiện đại","Duy trì nền sản xuất nhỏ phân tán để hạn chế sự phụ thuộc giữa các đơn vị kinh tế","Thu hẹp sản xuất hàng hóa để giảm tác động của các quy luật kinh tế thị trường","Tách rời các ngành và quốc gia để giảm mức độ xã hội hóa của quá trình sản xuất"],"answer":0,"explanation":"Chủ nghĩa tư bản thúc đẩy kinh tế hàng hóa phát triển, chuyển sản xuất nhỏ thành sản xuất tập trung quy mô lớn, hiện đại và năng suất cao.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":144,"text":"Chủ nghĩa tư bản chuyển nền sản xuất nhỏ thành nền sản xuất tập trung quy mô lớn, hiện đại và năng suất cao.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":49}},"num":272},{"id":"C04-Q021","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Khả năng và giới hạn đổi mới của độc quyền","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao khả năng tập trung nguồn lực nghiên cứu của độc quyền không đương nhiên biến thành tiến bộ kỹ thuật?","options":["Vì pháp luật luôn cấm tổ chức độc quyền tiến hành mọi hoạt động nghiên cứu khoa học","Vì sản xuất quy mô lớn làm tổ chức độc quyền không thể sử dụng công nghệ hiện đại","Vì việc nghiên cứu còn phụ thuộc mục đích kinh tế và có thể bị trì hoãn khi vị thế độc quyền bị đe dọa","Vì người tiêu dùng trực tiếp quyết định toàn bộ chương trình nghiên cứu của tổ chức độc quyền"],"answer":2,"explanation":"Nguồn lực chỉ tạo ra khả năng. Vì lợi ích độc quyền, sáng chế có thể không được triển khai nếu làm suy yếu vị thế đang có, nên độc quyền cũng có thể kìm hãm tiến bộ kỹ thuật.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":121,"text":"Tổ chức độc quyền có thể không tích cực nghiên cứu, sáng chế nếu lợi ích và vị thế độc quyền của họ bị ảnh hưởng."},"num":273},{"id":"C04-Q022","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Quan hệ giữa cạnh tranh và độc quyền","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Nhận định “độc quyền không thủ tiêu cạnh tranh” được thể hiện đầy đủ nhất qua hệ quả nào?","options":["Chỉ doanh nghiệp vừa và nhỏ tiếp tục cạnh tranh, còn tổ chức độc quyền đứng ngoài thị trường","Mọi hình thức cạnh tranh đều quy về tranh giành cổ phần trong cùng một tổ chức độc quyền","Cạnh tranh được thay hoàn toàn bằng thỏa thuận hành chính giữa các cơ quan quản lý nhà nước","Xuất hiện cạnh tranh giữa độc quyền với bên ngoài, giữa các độc quyền và ngay trong từng tổ chức độc quyền"],"answer":3,"explanation":"Trạng thái độc quyền bổ sung ba quan hệ cạnh tranh đặc thù: với doanh nghiệp ngoài độc quyền, giữa các độc quyền và trong nội bộ độc quyền.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":122,"text":"Ở trạng thái độc quyền vẫn có cạnh tranh với bên ngoài, giữa các tổ chức độc quyền và trong nội bộ từng tổ chức.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":14}},"num":274},{"id":"C04-Q023","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Biểu hiện mới của xuất khẩu tư bản","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao những thập kỷ gần đây phần lớn dòng đầu tư lại vận động qua lại giữa các nước tư bản phát triển?","options":["Hạ tầng ở các nước đang phát triển đã hiện đại hơn nên các nước này không còn tiếp nhận vốn nước ngoài","Các nước tư bản phát triển đồng loạt cấm bằng pháp luật mọi dòng vốn đầu tư đi sang các nước đang phát triển","Ngành có hàm lượng khoa học - kỹ thuật và vốn cao tại đó sinh lợi lớn, còn đầu tư vào nước đang phát triển rủi ro hơn","Lợi nhuận ở mọi quốc gia đã ngang nhau nên nhà đầu tư chỉ lựa chọn thị trường gần về địa lý"],"answer":2,"explanation":"Các nước phát triển tập trung ngành cần nhiều vốn và tri thức nên vẫn sinh lợi cao; trong khi hạ tầng lạc hậu và bất ổn ở một số nước đang phát triển làm rủi ro tăng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":138,"text":"Dòng đầu tư gần đây chủ yếu qua lại giữa các nước phát triển vì ngành công nghệ, vốn cao sinh lợi lớn và đầu tư vào nước đang phát triển có nhiều rủi ro.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":40}},"num":275},{"id":"C04-Q024","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Chủ thể xuất khẩu tư bản hiện nay","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Sự thay đổi lớn về chủ thể xuất khẩu tư bản hiện nay được thể hiện như thế nào?","options":["Chỉ chính phủ các nước tư bản phát triển còn xuất khẩu tư bản, còn doanh nghiệp không tham gia đầu tư quốc tế","Công ty xuyên quốc gia giữ vai trò ngày càng lớn, nhất là trong FDI, đồng thời xuất hiện chủ thể từ các nước đang phát triển","Công ty xuyên quốc gia giảm vai trò trong đầu tư trực tiếp, còn các nước đang phát triển chỉ tiếp nhận vốn","Chỉ doanh nghiệp vừa và nhỏ ở nước kém phát triển xuất khẩu tư bản, còn tập đoàn lớn rút khỏi thị trường quốc tế"],"answer":1,"explanation":"Vai trò của các công ty xuyên quốc gia trong xuất khẩu tư bản, đặc biệt trong FDI, ngày càng tăng; đồng thời đã xuất hiện nhiều chủ thể xuất khẩu tư bản từ các nước đang phát triển.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":138,"text":"Công ty xuyên quốc gia ngày càng giữ vai trò lớn trong xuất khẩu tư bản, nhất là FDI, và nhiều chủ thể từ các nước đang phát triển đã xuất hiện.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":41}},"num":276},{"id":"C04-Q025","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Thị trường nhà nước và lợi ích độc quyền","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Vì sao hợp đồng giữa Nhà nước và tổ chức độc quyền tư nhân có thể giúp tổ chức độc quyền ổn định lợi nhuận trong thời kỳ khủng hoảng thừa?","options":["Nhà nước yêu cầu các tổ chức độc quyền tiêu hủy hàng hóa nhưng vẫn thanh toán toàn bộ chi phí sản xuất","Hợp đồng chuyển quyền sở hữu tư nhân cho người lao động nên tổ chức độc quyền không còn theo đuổi lợi nhuận","Hợp đồng cấm tổ chức độc quyền bán hàng trên thị trường và buộc họ chuyển toàn bộ sản phẩm cho doanh nghiệp nhỏ","Nhà nước bao mua qua đơn đặt hàng, giúp tiêu thụ hàng hóa, bảo đảm lợi nhuận và khắc phục một phần khó khăn tái sản xuất"],"answer":3,"explanation":"Đơn đặt hàng của Nhà nước tạo đầu ra cho hàng hóa của tổ chức độc quyền, giúp quá trình tái sản xuất diễn ra và mang lại khối lượng lợi nhuận lớn, ổn định.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":133,"text":"Nhà nước bao mua sản phẩm bằng các hợp đồng, giúp độc quyền tư nhân tiêu thụ hàng hóa, duy trì tái sản xuất và có lợi nhuận lớn, ổn định."},"num":277},{"id":"C04-Q026","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Chế độ tham dự của tài phiệt","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao “chế độ tham dự” cho phép tài phiệt khống chế lượng tư bản lớn hơn nhiều so với vốn trực tiếp bỏ ra?","options":["Mỗi công ty con phải nộp toàn bộ doanh thu cho ngân hàng trung ương theo quy định pháp luật","Cổ phần khống chế ở công ty mẹ tạo chuỗi kiểm soát công ty con rồi công ty cháu theo kiểu móc xích","Các cổ đông nhỏ tự động mất quyền sở hữu khi công ty mẹ phát hành thêm cổ phiếu ra thị trường","Nhà nước bảo lãnh vô điều kiện mọi khoản đầu tư của công ty mẹ và công ty con trong tập đoàn"],"answer":1,"explanation":"Một lượng vốn đủ nắm cổ phần khống chế công ty mẹ có thể truyền quyền chi phối xuống nhiều tầng công ty con và công ty cháu.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":127,"text":"Chuỗi công ty mẹ, con và cháu theo chế độ tham dự giúp tài phiệt dùng vốn nhỏ để điều tiết lượng tư bản lớn hơn nhiều."},"num":278},{"id":"C04-Q027","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Hình thức xuất khẩu tư bản","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Tiêu chí nào phân biệt đúng đầu tư trực tiếp với đầu tư gián tiếp trong xuất khẩu tư bản?","options":["Đầu tư trực tiếp chỉ đến nước phát triển, còn đầu tư gián tiếp chỉ đến nước đang và kém phát triển","Đầu tư trực tiếp chỉ dùng vốn tư nhân, còn đầu tư gián tiếp chỉ dùng ngân sách và tín dụng nhà nước","Đầu tư trực tiếp luôn sở hữu toàn bộ dự án, còn đầu tư gián tiếp luôn nắm quá nửa cổ phần doanh nghiệp","Đầu tư trực tiếp gắn với cơ sở và quyền quản lý kinh doanh, còn đầu tư gián tiếp không trực tiếp tham gia quản lý"],"answer":3,"explanation":"Điểm phân biệt là quyền tham gia quản lý: đầu tư trực tiếp tổ chức hoặc mua cơ sở để trực tiếp kinh doanh; đầu tư gián tiếp qua cho vay, chứng khoán hoặc trung gian tài chính.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":128,"text":"Đầu tư gián tiếp được thực hiện qua cho vay, chứng khoán và định chế trung gian mà nhà đầu tư không trực tiếp quản lý."},"num":279},{"id":"C04-Q028","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Phân chia thị trường thế giới","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao xuất khẩu tư bản tăng về quy mô và phạm vi dẫn tới sự phân chia thế giới về kinh tế giữa các tập đoàn độc quyền?","options":["Các tập đoàn chấm dứt cạnh tranh quốc tế vì mọi nước nhập khẩu tư bản có mức lợi nhuận như nhau","Các tập đoàn từ bỏ thị trường ngoài nước để chỉ tập trung khai thác nhu cầu tại chính quốc","Các tập đoàn phải cạnh tranh rồi thỏa hiệp về thị trường, nguồn lực và lĩnh vực đầu tư để củng cố vị trí độc quyền","Các tập đoàn chuyển quyền phân phối toàn bộ vốn quốc tế cho doanh nghiệp vừa và nhỏ ở nước tiếp nhận"],"answer":2,"explanation":"Tư bản vươn ra ngoài làm các độc quyền lớn va chạm trên thị trường quốc tế; cạnh tranh thúc đẩy họ ký kết, phân chia phạm vi hoạt động và lập liên minh quốc tế.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":128,"text":"Xuất khẩu tư bản tăng dẫn tới phân chia thế giới về kinh tế và hình thành các tổ chức độc quyền quốc tế.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":26}},"num":280},{"id":"C04-Q029","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Phân chia kinh tế và lãnh thổ thế giới","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Điểm riêng của đặc điểm phân chia lãnh thổ ảnh hưởng so với phân chia thế giới về kinh tế là gì?","options":["Chỉ liên quan đến thống nhất mua bán của các xí nghiệp cùng ngành và không có vai trò của chính phủ","Chỉ thể hiện qua đầu tư gián tiếp bằng chứng khoán và hoàn toàn không gắn với quyền lực nhà nước","Chỉ diễn ra trong nội bộ tập đoàn qua tranh giành cổ phần, không liên quan tới khu vực ảnh hưởng","Lôi kéo chính phủ vào phân định thuộc địa, khu vực và các hình thức lệ thuộc để bảo vệ lợi ích độc quyền"],"answer":3,"explanation":"Phân chia kinh tế chủ yếu xoay quanh thị trường và đầu tư giữa các độc quyền; phân chia lãnh thổ gắn với quyền lực nhà nước, thuộc địa và khu vực ảnh hưởng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":129,"text":"Các chính phủ bị thúc đẩy vào đấu tranh phân chia lãnh thổ và tạo nhiều hình thức lệ thuộc để bảo vệ lợi ích độc quyền.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":28}},"num":281},{"id":"C04-Q030","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Điều chỉnh quan hệ sở hữu và giới hạn của chủ nghĩa tư bản","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao những điều chỉnh về hình thức sở hữu trong chủ nghĩa tư bản hiện đại không xóa bỏ được mâu thuẫn cơ bản của nó?","options":["Các điều chỉnh làm trình độ xã hội hóa của lực lượng sản xuất giảm xuống và khôi phục hoàn toàn nền sản xuất nhỏ","Các điều chỉnh chỉ tạo ra sự thích ứng nhất định, còn mâu thuẫn giữa lực lượng sản xuất xã hội hóa và chiếm hữu tư nhân tư bản chủ nghĩa vẫn tồn tại","Sở hữu nhà nước đã tách khỏi sở hữu độc quyền tư nhân nên quan hệ sản xuất không còn liên hệ với lực lượng sản xuất","Mâu thuẫn cơ bản chỉ bắt nguồn từ khác biệt giữa công nghiệp và nông nghiệp, không liên quan đến quan hệ sở hữu"],"answer":1,"explanation":"Các hình thức sở hữu có thể được điều chỉnh để thích ứng ở mức nhất định, nhưng nền tảng chiếm hữu tư nhân tư bản chủ nghĩa vẫn đối lập với tính xã hội hóa ngày càng cao của lực lượng sản xuất.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":150,"text":"Dù quan hệ sản xuất có những sự thích ứng nhất định, mâu thuẫn giữa lực lượng sản xuất xã hội hóa và chiếm hữu tư nhân tư bản chủ nghĩa vẫn tồn tại."},"num":282},{"id":"C04-Q031","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Kết hợp nhân sự trong độc quyền nhà nước","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Tại sao các đảng phái và hội chủ xí nghiệp là mắt xích quan trọng trong sự kết hợp nhân sự giữa độc quyền và nhà nước?","options":["Họ tách hoàn toàn giới kinh doanh khỏi bộ máy nhà nước để bảo đảm chính sách không chịu tác động lợi ích","Họ chỉ tổ chức hoạt động từ thiện nên không tham gia lựa chọn nhân sự hoặc đường lối kinh tế","Họ cung cấp cơ sở xã hội, kinh phí, nhân sự và kênh tác động chính sách cho sự thâm nhập lẫn nhau","Họ thay thế toàn bộ cơ quan lập pháp, hành pháp và tư pháp bằng ban quản trị của doanh nghiệp tư nhân"],"answer":2,"explanation":"Các tổ chức này kết nối giới độc quyền với chính quyền qua tài trợ, lựa chọn nhân sự, xây dựng đường lối và trao đổi vị trí giữa doanh nghiệp với bộ máy nhà nước.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":131,"text":"Đảng phái và hội chủ xí nghiệp tạo cơ sở nhân sự, tài chính và đường lối cho sự thâm nhập giữa độc quyền với nhà nước.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":29}},"num":283},{"id":"C04-Q032","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Bản chất sở hữu nhà nước trong chủ nghĩa tư bản","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Trong độc quyền nhà nước tư bản chủ nghĩa, vì sao sở hữu nhà nước được xem là sở hữu tập thể của giai cấp tư sản?","options":["Vì nó được tổ chức để hỗ trợ lợi ích tư bản độc quyền và duy trì sự tồn tại của chủ nghĩa tư bản","Vì mọi công dân trực tiếp quản lý và chia đều lợi nhuận của toàn bộ doanh nghiệp nhà nước","Vì nó xóa bỏ hoàn toàn sự đan kết giữa sở hữu nhà nước với sở hữu độc quyền tư nhân","Vì nó chỉ gồm tài sản hành chính, không bao gồm doanh nghiệp hay kết cấu hạ tầng kinh tế - xã hội"],"answer":0,"explanation":"Dù mang hình thức nhà nước, loại sở hữu này phục vụ việc mở rộng và ổn định hoạt động của tư bản độc quyền trong toàn bộ cơ chế tư bản chủ nghĩa.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":132,"text":"Sở hữu nhà nước trong độc quyền nhà nước có nhiệm vụ ủng hộ tư bản độc quyền và duy trì chủ nghĩa tư bản.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":31}},"num":284},{"id":"C04-Q033","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Chức năng của sở hữu nhà nước","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Nhà nước đảm nhận một ngành ít lãi rồi tạo điều kiện để tư bản độc quyền chuyển sang ngành sinh lợi cao hơn. Trường hợp này thể hiện chức năng nào của sở hữu nhà nước?","options":["Tách hoạt động của doanh nghiệp nhà nước khỏi mọi chương trình điều tiết kinh tế của chính phủ","Thu hẹp địa bàn sản xuất tư bản chủ nghĩa để ngăn các tổ chức độc quyền tiếp tục mở rộng","Tạo thuận lợi cho tư bản độc quyền di chuyển giữa các ngành và lựa chọn lĩnh vực kinh doanh hiệu quả hơn","Chuyển toàn bộ quyền sở hữu tư nhân cho người lao động mà không qua bất kỳ hình thức mua lại nào"],"answer":2,"explanation":"Một chức năng của sở hữu nhà nước là giải phóng và tạo thuận lợi cho tư bản độc quyền rời ngành ít lãi để đầu tư vào ngành có hiệu quả cao hơn.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":132,"text":"Sở hữu nhà nước tạo điều kiện cho tư bản độc quyền di chuyển từ ngành ít lãi sang ngành kinh doanh hiệu quả hơn.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":31}},"num":285},{"id":"C04-Q034","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Cơ chế điều tiết độc quyền nhà nước","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Nói cơ chế điều tiết kinh tế độc quyền nhà nước là sự “dung hợp” có nghĩa là gì?","options":["Chỉ cơ chế thị trường quyết định, còn độc quyền tư nhân và nhà nước không tham gia điều tiết","Chỉ mệnh lệnh hành chính của nhà nước vận hành nền kinh tế, thay thế giá cả và cạnh tranh","Cơ chế thị trường, độc quyền tư nhân và điều tiết nhà nước được kết hợp trong một chỉnh thể","Cơ chế độc quyền tư nhân xóa bỏ cả thị trường lẫn mọi công cụ kinh tế của nhà nước"],"answer":2,"explanation":"Cơ chế này không loại bỏ thị trường mà kết hợp vận động thị trường, sức mạnh độc quyền tư nhân và các công cụ điều tiết nhà nước.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":134,"text":"Cơ chế điều tiết độc quyền nhà nước dung hợp thị trường, độc quyền tư nhân và điều tiết của nhà nước.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":33}},"num":286},{"id":"C04-Q035","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Concern và conglomerate","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Cách phân biệt nào giữa concern và conglomerate phù hợp với giáo trình?","options":["Concern gồm hàng trăm xí nghiệp thuộc nhiều ngành và nhiều nước, còn conglomerate ghép các hãng không liên quan trực tiếp","Concern chỉ gồm hãng không liên quan, còn conglomerate gồm xí nghiệp có quan hệ kinh tế - kỹ thuật chặt chẽ","Concern chỉ thống nhất lưu thông trong một ngành, còn conglomerate thống nhất cả sản xuất và tiêu thụ cùng ngành","Concern là hiệp nghị ngắn hạn về giá giữa các hãng cùng ngành, còn conglomerate là liên minh lâu dài giữa các chính phủ"],"answer":0,"explanation":"Concern là tổ chức độc quyền đa ngành gồm hàng trăm xí nghiệp phân bố ở nhiều nước; conglomerate kết hợp nhiều hãng vừa và nhỏ không liên quan trực tiếp về sản xuất hoặc dịch vụ sản xuất.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":135,"text":"Concern liên kết đa ngành ở nhiều nước; conglomerate kết hợp các hãng vừa và nhỏ không liên quan trực tiếp về sản xuất.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":37}},"num":287},{"id":"C04-Q036","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Doanh nghiệp vừa và nhỏ trong điều kiện độc quyền","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao sự phát triển của nhiều doanh nghiệp vừa và nhỏ ngày nay không đồng nghĩa với việc quyền kiểm soát của độc quyền lớn suy giảm?","options":["Vì doanh nghiệp vừa và nhỏ đều trở thành cơ quan hành chính trực thuộc chính phủ trung ương","Vì nhiều doanh nghiệp nhỏ nằm trong hệ thống gia công và phụ thuộc concern, conglomerate qua quan hệ hợp tác","Vì luật chống độc quyền cho phép concern sở hữu tuyệt đối mọi mặt hàng trong một ngành","Vì doanh nghiệp vừa và nhỏ không còn tham gia chuyên môn hóa, đổi mới kỹ thuật hoặc thị trường ngách"],"answer":1,"explanation":"Tiêu chuẩn hóa và chuyên môn hóa tạo mạng lưới gia công; qua hợp tác, độc quyền lớn vẫn kiểm soát sản xuất và tiến bộ công nghệ của nhiều đơn vị nhỏ.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":136,"text":"Nhiều hãng vừa và nhỏ phụ thuộc các concern và conglomerate thông qua hệ thống gia công và quan hệ hợp tác."},"num":288},{"id":"C04-Q037","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Biểu hiện mới của tư bản tài chính","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"“Chế độ ủy nhiệm” bổ sung cho “chế độ tham dự” bằng cách nào?","options":["Cổ đông nhỏ trực tiếp thay thế hội đồng quản trị và tự quyết định mọi hoạt động hằng ngày của công ty","Người lao động ủy nhiệm cho nhà nước phân phối ngang bằng mọi khoản lợi nhuận của công ty","Ngân hàng trung ương nhận ủy quyền sở hữu toàn bộ cổ phiếu của mọi doanh nghiệp tư nhân","Đại cổ đông được ủy nhiệm thay mặt nhiều cổ đông nhỏ quyết định phương hướng hoạt động của công ty"],"answer":3,"explanation":"Khi cổ phiếu mệnh giá nhỏ được phân tán rộng, đại cổ đông có thể nhận ủy nhiệm của số đông cổ đông nhỏ và tiếp tục duy trì quyền chi phối.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":137,"text":"Chế độ ủy nhiệm cho phép đại cổ đông thay mặt đa số cổ đông nhỏ quyết định phương hướng của công ty cổ phần."},"num":289},{"id":"C04-Q038","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Biểu hiện mới của phân chia thị trường thế giới","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Hai xu hướng nào cùng tồn tại trong biểu hiện mới của sự phân chia thị trường thế giới?","options":["Xóa bỏ công ty xuyên quốc gia đồng thời với trao toàn bộ thị trường thế giới cho doanh nghiệp nhỏ","Đóng cửa hoàn toàn thị trường quốc gia đồng thời với chấm dứt mọi liên minh thuế quan và mậu dịch","Quốc tế hóa, toàn cầu hóa kinh tế đồng thời với khu vực hóa và hình thành các liên minh kinh tế khu vực","Ngừng lưu chuyển tư bản quốc tế đồng thời với chỉ duy trì trao đổi hàng hóa trong từng địa phương"],"answer":2,"explanation":"Toàn cầu hóa mở rộng phạm vi hoạt động của tư bản xuyên quốc gia, trong khi khu vực hóa tạo ra các liên minh kinh tế và mậu dịch theo vùng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":139,"text":"Sự phân chia thị trường hiện nay chịu tác động đồng thời của toàn cầu hóa và khu vực hóa kinh tế.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":44}},"num":290},{"id":"C04-Q039","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Biểu hiện mới của sở hữu nhà nước","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Việc nhà nước dùng ngân sách mua cổ phần hoặc cứu tập đoàn lớn khỏi phá sản trong khủng hoảng phản ánh điều gì?","options":["Nhà nước đã chấm dứt vai trò ổn định kinh tế vĩ mô và trao toàn bộ quyền điều tiết cho thị trường","Sở hữu và ngân sách nhà nước được dùng để ổn định kinh tế đồng thời gắn kết với hoạt động của độc quyền tư nhân","Tập đoàn độc quyền không còn nhận được bất kỳ hỗ trợ nào từ thuế, tín dụng hoặc mua sắm công","Sở hữu nhà nước chỉ còn giới hạn ở trụ sở và tài sản phục vụ bộ máy hành chính công"],"answer":1,"explanation":"Mua cổ phần và giải cứu trong khủng hoảng cho thấy nhà nước dùng tiềm lực sở hữu, ngân sách để ổn định vĩ mô và nâng đỡ các tập đoàn lớn.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":142,"text":"Ngân sách và cổ phần nhà nước được sử dụng để ổn định vĩ mô, kể cả cứu các tập đoàn lớn trong khủng hoảng."},"num":291},{"id":"C04-Q040","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Giới hạn lịch sử của chủ nghĩa tư bản","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Mâu thuẫn nào là nguồn gốc chung của những giới hạn lịch sử của chủ nghĩa tư bản?","options":["Mâu thuẫn giữa sản xuất công nghiệp và sản xuất nông nghiệp trong từng nền kinh tế quốc dân","Mâu thuẫn giữa tiêu dùng hiện tại và tiết kiệm tương lai trong phân bổ thu nhập của các hộ gia đình","Mâu thuẫn giữa lực lượng sản xuất xã hội hóa ngày càng cao và chiếm hữu tư nhân tư bản chủ nghĩa về tư liệu sản xuất","Mâu thuẫn giữa doanh nghiệp xuất khẩu hàng hóa và doanh nghiệp chỉ phục vụ thị trường trong nước"],"answer":2,"explanation":"Lực lượng sản xuất ngày càng mang tính xã hội, còn tư liệu sản xuất và kết quả phân phối vẫn bị chi phối bởi sở hữu tư nhân tư bản chủ nghĩa; đó là mâu thuẫn cơ bản.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":149,"text":"Giới hạn của chủ nghĩa tư bản bắt nguồn từ mâu thuẫn giữa xã hội hóa lực lượng sản xuất và chiếm hữu tư nhân tư bản chủ nghĩa.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":50}},"num":292},{"id":"C04-Q041","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Tích tụ, tập trung và độc quyền nhà nước","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Tích tụ và tập trung tạo ra những cơ cấu kinh tế rất lớn, đòi hỏi sản xuất và phân phối phải được phối hợp từ một trung tâm. Tình huống này phản ánh nguyên nhân nào của độc quyền nhà nước?","options":["Tích tụ, tập trung vốn và sản xuất đạt mức cao, đòi hỏi Nhà nước điều tiết sản xuất và phân phối","Phân công lao động tạo ngành mới cần vốn lớn, thu hồi chậm và ít lợi nhuận mà tư nhân không muốn đầu tư","Độc quyền tư nhân làm sâu sắc phân hóa giàu - nghèo, đòi hỏi Nhà nước dùng chính sách xã hội để xoa dịu mâu thuẫn","Quốc tế hóa kinh tế làm phát sinh hàng rào quốc gia và xung đột lợi ích, đòi hỏi Nhà nước điều tiết quan hệ đối ngoại"],"answer":0,"explanation":"Khi tích tụ và tập trung đạt trình độ cao, các cơ cấu kinh tế lớn phát sinh nhu cầu khách quan về sự điều tiết sản xuất và phân phối của Nhà nước.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":116,"text":"Tích tụ, tập trung vốn và sản xuất ở trình độ cao tạo ra các cơ cấu kinh tế lớn, đòi hỏi sự điều tiết sản xuất và phân phối từ một trung tâm.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":10}},"num":293},{"id":"C04-Q042","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Biểu hiện mới của công cụ điều tiết độc quyền nhà nước","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một chính phủ dùng nguồn lực viện trợ ra nước ngoài và chỉ định tập đoàn trong nước thực hiện dự án; việc này đồng thời giúp tập đoàn xử lý hàng tồn đọng hoặc công nghệ lỗi thời. Tình huống phản ánh điều gì?","options":["Cơ chế thỏa hiệp nhân sự giữa các thế lực độc quyền đã thay thế toàn bộ vai trò điều tiết kinh tế","Sở hữu nhà nước chỉ còn là dự trữ quốc gia và không liên hệ với hoạt động của các tập đoàn tư nhân","Viện trợ đối ngoại trở thành một bộ phận điều tiết kinh tế trong nước và tạo cơ hội cho tập đoàn độc quyền","Hoạt động viện trợ đã tách hoàn toàn khỏi lợi ích kinh tế trong nước và chỉ còn mục tiêu đối ngoại"],"answer":2,"explanation":"Giáo trình xem viện trợ của chính phủ cho nước ngoài là một bộ phận của điều tiết kinh tế trong nước; tập đoàn được giao dự án có thể dùng cơ hội này để giải quyết khó khăn kinh doanh.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":143,"text":"Viện trợ của chính phủ cho nước ngoài trở thành một bộ phận điều tiết kinh tế trong nước và là cơ hội cho các tập đoàn độc quyền được chỉ định thực hiện dự án."},"num":294},{"id":"C04-Q043","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Giới hạn chiến tranh và xung đột","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Hai cường quốc tư bản phát triển không đều, cùng đòi phân chia lại thị trường và lãnh thổ đã được xác lập, từ đó đẩy quan hệ giữa họ tới xung đột quân sự. Tình huống này thể hiện giới hạn nào của chủ nghĩa tư bản?","options":["Giới hạn tiếp tục gây chiến tranh và xung đột do cạnh tranh phân chia lại thị trường, lãnh thổ thế giới","Vai trò thúc đẩy xã hội hóa sản xuất và gắn các quá trình kinh tế thành một hệ thống thống nhất","Giới hạn làm sâu sắc phân hóa giàu - nghèo trong từng nước và giữa các quốc gia trên thế giới","Giới hạn đặt mục đích sản xuất chủ yếu vào lợi ích của thiểu số tư sản, nhất là tư bản độc quyền"],"answer":0,"explanation":"Phát triển không đều cùng cuộc đấu tranh phân chia lại thị trường và lãnh thổ là cơ sở kinh tế dẫn tới chiến tranh, xung đột giữa các cường quốc tư bản.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":147,"text":"Phát triển không đều và đấu tranh phân chia lại thị trường, lãnh thổ là nguyên nhân dẫn tới chiến tranh và xung đột.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":50}},"num":295},{"id":"C04-Q044","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Vận dụng biểu hiện mới của xuất khẩu tư bản","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một công ty đầu tư dự án xây dựng - kinh doanh - chuyển giao ở nước ngoài, đồng thời ràng buộc dự án với hợp đồng cung cấp thiết bị và dịch vụ kỹ thuật. Tình huống này thể hiện biểu hiện mới nào của xuất khẩu tư bản?","options":["Xuất khẩu tư bản quay lại duy nhất hình thức cho vay quốc tế để thu lợi tức và không gắn với dự án","Hình thức xuất khẩu tư bản đa dạng và ngày càng đan xen với xuất khẩu hàng hóa, dịch vụ, chất xám","Chủ thể xuất khẩu tư bản không còn gồm công ty xuyên quốc gia mà chỉ còn cơ quan nhà nước","Xuất khẩu tư bản tách hoàn toàn khỏi hợp đồng xuất khẩu hàng hóa, thiết bị và dịch vụ kỹ thuật"],"answer":1,"explanation":"Mô hình xây dựng - kinh doanh - chuyển giao cùng hợp đồng thiết bị, dịch vụ cho thấy hình thức đầu tư mới và sự kết hợp ngày càng chặt giữa xuất khẩu tư bản với hàng hóa, dịch vụ.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":139,"text":"Xuất khẩu tư bản có hình thức mới như BOT, BT và ngày càng kết hợp với hợp đồng hàng hóa, dịch vụ, chất xám.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":42}},"num":296},{"id":"C04-Q045","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Vận dụng nguyên nhân độc quyền nhà nước","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một ngành hạ tầng mới cần vốn rất lớn, thời gian thu hồi dài và tỷ suất lợi nhuận thấp nên các tập đoàn tư nhân đều né tránh; nhà nước phải đầu tư để các ngành khác hoạt động. Tình huống này phản ánh nguyên nhân nào của độc quyền nhà nước?","options":["Phân công lao động xã hội tạo ngành quan trọng mà độc quyền tư nhân không thể hoặc không muốn đầu tư","Sự kết hợp nhân sự giữa hội chủ xí nghiệp với bộ máy chính quyền để tác động quá trình hoạch định chính sách","Các tập đoàn quốc tế cạnh tranh rồi thỏa hiệp để phân chia thị trường tiêu thụ và đầu tư trên thế giới","Tư bản tài chính chuyển từ chế độ tham dự trực tiếp sang chế độ ủy nhiệm thông qua các cổ đông nhỏ"],"answer":0,"explanation":"Đây đúng với nguyên nhân do phân công lao động tạo ra ngành thiết yếu nhưng vốn lớn, hoàn vốn chậm và ít lợi nhuận, buộc nhà nước đứng ra đảm nhận.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":117,"text":"Nhà nước đảm nhận ngành hạ tầng quan trọng khi tư nhân không thể hoặc không muốn đầu tư vì vốn lớn, hoàn vốn chậm, ít lợi nhuận.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":10}},"num":297},{"id":"C04-Q046","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Giới hạn phân hóa giàu - nghèo","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một nhóm tư bản độc quyền thu giá trị thặng dư ngày càng lớn, trong khi thu nhập của người lao động giảm tương đối so với thu nhập của giới sở hữu. Hệ quả nào phù hợp nhất với phân tích của giáo trình?","options":["Thành quả tăng năng suất được tự động phân phối ngang bằng giữa mọi thành viên xã hội","Sự phân hóa giàu - nghèo ngày càng sâu sắc giữa giai cấp tư sản và người lao động","Mâu thuẫn giai cấp được xóa bỏ vì mức độ tích tụ và tập trung tư bản ngày càng cao","Đường lối nhà nước chắc chắn độc lập với nhóm lợi ích khi độc quyền tư nhân mở rộng"],"answer":1,"explanation":"Tích lũy và giá trị thặng dư tập trung vào các tập đoàn độc quyền làm thu nhập của giới tư sản tăng, còn thu nhập người lao động giảm tương đối, nên chênh lệch giàu - nghèo sâu sắc hơn.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":147,"text":"Tích lũy và tập trung tư bản làm thu nhập công nhân giảm tương đối, thu nhập tư sản tăng và phân hóa giàu - nghèo sâu sắc hơn.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":50}},"num":298},{"id":"C04-Q047","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Nhận diện concern","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Theo phần trình bày về các hình thức độc quyền mới, một tổ chức đa ngành gồm hàng trăm xí nghiệp thuộc nhiều ngành và phân bố tại nhiều quốc gia là hình thức nào?","options":["Dạng concern","Dạng consortium","Dạng cartel","Dạng conglomerate"],"answer":0,"explanation":"Tính đa ngành, quy mô hàng trăm xí nghiệp và sự phân bố ở nhiều nước là những dấu hiệu được giáo trình dùng để mô tả concern.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":135,"text":"Concern là tổ chức độc quyền đa ngành gồm hàng trăm xí nghiệp thuộc nhiều ngành và phân bố ở nhiều nước.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":37}},"num":299},{"id":"C04-Q048","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Nhận diện conglomerate","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Hàng chục hãng vừa và nhỏ không liên quan trực tiếp về sản xuất được ghép thành một tập đoàn, mục tiêu chính là thu lợi từ kinh doanh chứng khoán. Tập đoàn này gần nhất với hình thức nào?","options":["Mô hình conglomerate đa ngành","Mô hình consortium đa ngành","Mô hình concern đa ngành","Mô hình trust đa ngành"],"answer":0,"explanation":"Sự kết hợp các hãng không liên quan trực tiếp và mục tiêu lợi nhuận chứng khoán là hai dấu hiệu điển hình của conglomerate.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":135,"text":"Conglomerate kết hợp nhiều hãng vừa và nhỏ không liên quan trực tiếp, chủ yếu nhằm thu lợi từ kinh doanh chứng khoán.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":37}},"num":300},{"id":"C04-Q049","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Vận dụng vai trò xã hội hóa sản xuất","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một sản phẩm được tạo ra qua chuyên môn hóa sâu giữa nhiều đơn vị, nhiều ngành và nhiều quốc gia; các khâu phụ thuộc lẫn nhau thành một hệ thống thống nhất. Vai trò lịch sử nào của chủ nghĩa tư bản được thể hiện rõ nhất?","options":["Thúc đẩy tranh giành lãnh thổ và xung đột giữa các cường quốc","Duy trì chiếm hữu tư nhân như một giới hạn không thể tự khắc phục","Gây phân hóa giàu - nghèo giữa các tầng lớp và các quốc gia","Thực hiện xã hội hóa sản xuất cả về chiều rộng và chiều sâu"],"answer":3,"explanation":"Chuyên môn hóa, hợp tác và liên hệ xuyên ngành, xuyên quốc gia biến các quá trình phân tán thành một hệ thống sản xuất xã hội thống nhất.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":145,"text":"Xã hội hóa sản xuất liên kết các đơn vị, ngành và quốc gia thành một quá trình sản xuất xã hội thống nhất.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":49}},"num":301},{"id":"C04-Q050","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Vận dụng giới hạn lịch sử của chủ nghĩa tư bản","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một nền kinh tế có lực lượng sản xuất liên kết và xã hội hóa rất cao, nhưng tư liệu sản xuất cùng quyền phân phối sản phẩm vẫn tập trung trong tay một nhóm chủ sở hữu tư nhân. Nhận định nào phù hợp nhất?","options":["Đây chỉ là mất cân đối ngắn hạn giữa tiết kiệm và tiêu dùng của các hộ gia đình","Đây là biểu hiện của mâu thuẫn cơ bản tạo nên giới hạn lịch sử của chủ nghĩa tư bản","Đây chỉ là hạn chế quản trị có thể xóa bỏ hoàn toàn bằng thay đổi nhân sự doanh nghiệp","Đây là bằng chứng quan hệ sản xuất tư bản chủ nghĩa đã phù hợp tuyệt đối với lực lượng sản xuất"],"answer":1,"explanation":"Tính xã hội ngày càng cao của lực lượng sản xuất đối lập với chiếm hữu tư nhân tư bản chủ nghĩa là mâu thuẫn cơ bản mà chủ nghĩa tư bản không tự giải quyết được.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":149,"text":"Mâu thuẫn giữa xã hội hóa lực lượng sản xuất và chiếm hữu tư nhân tư bản chủ nghĩa là nguồn gốc giới hạn của chủ nghĩa tư bản.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":50}},"num":302},{"id":"C04-Q051","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Con đường hình thành độc quyền","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Trong nền kinh tế thị trường, độc quyền có thể được hình thành theo hai con đường nào?","options":["Từ vận động tự nhiên của thị trường hoặc từ ý chí tạo lập của nhà nước","Từ quyết định của người tiêu dùng hoặc từ thỏa ước chung của người lao động","Từ biến động ngẫu nhiên của giá cả hoặc từ việc xóa bỏ sở hữu doanh nghiệp","Từ phân phối bình quân nguồn lực hoặc từ việc đình chỉ mọi quan hệ tín dụng"],"answer":0,"explanation":"Độc quyền có thể nảy sinh tự nhiên từ vận động của cạnh tranh, tích tụ và tập trung, đồng thời cũng có thể được nhà nước chủ động tạo lập.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":113,"text":"Trong nền kinh tế thị trường, độc quyền có thể hình thành tự nhiên hoặc do ý chí của nhà nước tạo ra."},"num":303},{"id":"C04-Q052","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Tính phổ biến của độc quyền nhà nước","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Mức độ tồn tại của độc quyền nhà nước trong các nền kinh tế thị trường được giáo trình khái quát như thế nào?","options":["Chỉ xuất hiện ở các nền kinh tế đang khủng hoảng và mất đi khi tăng trưởng phục hồi","Mang tính phổ biến, nhưng phạm vi và mức độ tùy thuộc trình độ phát triển của mỗi quốc gia","Chỉ có ở các nước kém phát triển vì khu vực tư nhân chưa đủ khả năng tổ chức sản xuất","Có phạm vi và mức độ hoàn toàn giống nhau trong mọi nền kinh tế thị trường hiện đại"],"answer":1,"explanation":"Các quốc gia đều nắm giữ những vị thế độc quyền nhất định để duy trì sức mạnh, nhưng biểu hiện cụ thể khác nhau theo trình độ phát triển.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":116,"text":"Độc quyền nhà nước mang tính phổ biến trong kinh tế thị trường và có thể xuất hiện ở các mức độ khác nhau tùy trình độ phát triển."},"num":304},{"id":"C04-Q053","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Mâu thuẫn xã hội và độc quyền nhà nước","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Theo nguyên nhân hình thành độc quyền nhà nước được giáo trình nêu, khi độc quyền tư nhân làm sâu sắc phân hóa và mâu thuẫn giai cấp, nhà nước tư sản phải dùng nhóm chính sách nào?","options":["Giảm trợ cấp thất nghiệp, thu hẹp điều tiết thu nhập và giao phúc lợi cho thị trường","Tăng bảo hộ giá độc quyền, giảm thuế lợi nhuận và hạn chế thương lượng tiền lương","Tư nhân hóa dịch vụ công, giảm bảo hiểm xã hội và trao phân phối thu nhập cho độc quyền","Trợ cấp thất nghiệp, điều tiết
