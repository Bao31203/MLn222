 thu nhập và phát triển phúc lợi để xoa dịu mâu thuẫn"],"answer":3,"explanation":"Các chính sách trợ cấp thất nghiệp, điều tiết thu nhập và phúc lợi xã hội được sử dụng để xoa dịu mâu thuẫn, duy trì ổn định chính trị và trật tự xã hội.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":117,"text":"Sự thống trị của độc quyền tư nhân làm sâu sắc mâu thuẫn xã hội, đòi hỏi nhà nước dùng trợ cấp, điều tiết thu nhập và phúc lợi để duy trì ổn định.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":10}},"num":305},{"id":"C04-Q054","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Quốc tế hóa và độc quyền nhà nước","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Việc các liên minh độc quyền quốc tế gặp hàng rào quốc gia và xung đột lợi ích trên thị trường thế giới đặt ra yêu cầu nào?","options":["Nhà nước tham gia điều tiết các quan hệ chính trị và kinh tế quốc tế","Ngân hàng chấm dứt cấp tín dụng cho các liên minh đang đầu tư ra nước ngoài","Các quốc gia xóa bỏ ngay mọi hàng rào và để tư bản quốc tế tự phân chia","Doanh nghiệp thu hẹp hoạt động về thị trường trong nước và từ bỏ bành trướng"],"answer":0,"explanation":"Quốc tế hóa làm lợi ích độc quyền va chạm với hàng rào và lợi ích quốc gia, nên việc điều tiết quan hệ chính trị, kinh tế quốc tế không thể thiếu vai trò nhà nước.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":118,"text":"Hàng rào quốc gia và xung đột lợi ích trên thị trường thế giới đòi hỏi nhà nước điều tiết các quan hệ chính trị và kinh tế quốc tế.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":10}},"num":306},{"id":"C04-Q055","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Sự biến đổi vai trò kinh tế của nhà nước tư sản","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Ngoài thuế và luật pháp, vai trò kinh tế của nhà nước tư sản hiện đại còn được thể hiện rõ nhất ở hoạt động nào?","options":["Tách khu vực kinh tế nhà nước khỏi các chính sách tác động đến nền kinh tế và đời sống xã hội","Chỉ quản lý khâu sản xuất, còn phân phối, trao đổi và tiêu dùng hoàn toàn nằm ngoài điều tiết","Chỉ ban hành quy tắc cạnh tranh, không tổ chức hay quản lý bất kỳ đơn vị kinh tế nhà nước nào","Tổ chức khu vực kinh tế nhà nước và dùng đòn bẩy kinh tế điều tiết mọi khâu tái sản xuất"],"answer":3,"explanation":"Nhà nước tư sản hiện đại vừa tổ chức, quản lý khu vực kinh tế nhà nước vừa dùng các đòn bẩy kinh tế tác động tới sản xuất, phân phối, trao đổi và tiêu dùng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":119,"text":"Vai trò nhà nước tư sản mở rộng từ thuế, luật pháp sang tổ chức khu vực nhà nước và điều tiết tất cả các khâu của quá trình tái sản xuất."},"num":307},{"id":"C04-Q056","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Độc quyền và năng lực cạnh tranh","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Ưu thế nào giúp tổ chức độc quyền có thể làm tăng năng suất lao động và nâng cao năng lực cạnh tranh?","options":["Phân tán vốn vào nhiều cơ sở nhỏ để tránh áp dụng các phương pháp sản xuất tiên tiến","Duy trì thiết bị cũ để không phát sinh chi phí đầu tư và thay đổi quy trình sản xuất","Dùng ưu thế vốn ứng dụng công nghệ và phương pháp sản xuất mới nhằm giảm chi phí","Hạn chế chuyên môn hóa để mọi đơn vị tự thực hiện toàn bộ các khâu sản xuất"],"answer":2,"explanation":"Ưu thế vốn cho phép tổ chức độc quyền ứng dụng kỹ thuật, công nghệ và phương pháp sản xuất tiên tiến, nhờ đó tăng năng suất, giảm chi phí và tăng sức cạnh tranh.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":120,"text":"Độc quyền có ưu thế về vốn để ứng dụng kỹ thuật và phương pháp sản xuất hiện đại, làm tăng năng suất, giảm chi phí và nâng cao năng lực cạnh tranh.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":12}},"num":308},{"id":"C04-Q057","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Cạnh tranh giữa các tổ chức độc quyền","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Cạnh tranh giữa các tổ chức độc quyền với nhau có thể diễn ra theo hai dạng nào?","options":["Giữa các thành viên trong cùng tổ chức; và giữa các cổ đông nhỏ tranh quyền quản lý","Giữa các tổ chức cùng ngành; và giữa các tổ chức khác ngành có liên quan về đầu vào","Giữa tổ chức độc quyền với doanh nghiệp ngoài độc quyền; và giữa các hộ tiêu dùng","Giữa các chính phủ phân chia lãnh thổ; và giữa các ngân hàng điều hành tiền tệ"],"answer":1,"explanation":"Trong cùng ngành, cạnh tranh có thể kết thúc bằng thỏa hiệp hoặc một bên phá sản. Giữa các ngành, cạnh tranh diễn ra khi các tổ chức độc quyền có quan hệ với nhau về nguồn lực đầu vào.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":122,"text":"Cạnh tranh giữa các tổ chức độc quyền gồm cạnh tranh trong cùng ngành và cạnh tranh giữa các tổ chức khác ngành có liên quan về nguồn lực đầu vào.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":14}},"num":309},{"id":"C04-Q058","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Cạnh tranh với doanh nghiệp ngoài độc quyền","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Để chi phối hoặc thôn tính doanh nghiệp ngoài độc quyền, tổ chức độc quyền thường sử dụng nhóm biện pháp nào?","options":["Tranh giành cổ phần khống chế để nắm vị trí lãnh đạo trong chính tổ chức","Thỏa hiệp về thị trường và lĩnh vực hoạt động với tổ chức độc quyền cùng ngành","Độc chiếm nguyên liệu, phương tiện vận tải và nguồn tín dụng của thị trường","Mua cổ phần ngân hàng lớn để tác động hoạt động tín dụng của ngân hàng"],"answer":2,"explanation":"Kiểm soát nguyên liệu, vận tải và tín dụng là các cách làm suy yếu, loại bỏ hoặc thôn tính doanh nghiệp ngoài độc quyền.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":122,"text":"Tổ chức độc quyền chi phối doanh nghiệp ngoài độc quyền bằng cách độc quyền đầu vào, vận tải, tín dụng và các nguồn lực thiết yếu.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":14}},"num":310},{"id":"C04-Q059","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Trình tự các hình thức độc quyền","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Trình tự lịch sử của các hình thức tổ chức độc quyền cơ bản từ thấp đến cao là gì?","options":["Cartel, syndicate, trust, consortium","Syndicate, cartel, consortium, trust","Trust, consortium, cartel, syndicate","Consortium, trust, syndicate, cartel"],"answer":0,"explanation":"Mức độ thống nhất tăng dần từ thỏa thuận của cartel, thống nhất lưu thông ở syndicate, thống nhất sản xuất và tiêu thụ ở trust đến consortium quy mô lớn, đa ngành.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":124,"text":"Các hình thức tổ chức độc quyền cơ bản phát triển từ thấp đến cao gồm cartel, syndicate, trust và consortium.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":16}},"num":311},{"id":"C04-Q060","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Sự hình thành độc quyền ngân hàng","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Quá trình nào trực tiếp dẫn đến sự ra đời của các tổ chức độc quyền trong ngân hàng?","options":["Các ngân hàng lớn tự chia nhỏ thành nhiều đơn vị để giảm khả năng chi phối tín dụng","Tín dụng ngân hàng bị thay thế hoàn toàn bằng vốn tự có của những người sản xuất nhỏ","Doanh nghiệp công nghiệp ngừng vay vốn nên mọi ngân hàng chuyển sang hoạt động thanh toán","Cạnh tranh làm ngân hàng vừa và nhỏ phá sản, bị thôn tính hoặc sáp nhập vào ngân hàng lớn"],"answer":3,"explanation":"Tích tụ và tập trung trong ngân hàng diễn ra qua cạnh tranh, phá sản, thôn tính và sáp nhập, từ đó hình thành các ngân hàng lớn giữ vị thế độc quyền.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":125,"text":"Cạnh tranh làm ngân hàng vừa và nhỏ phá sản, bị thôn tính hoặc sáp nhập, thúc đẩy các tổ chức độc quyền ngân hàng ra đời.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":21}},"num":312},{"id":"C04-Q061","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Khái niệm tài phiệt","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Khái niệm tài phiệt trong chủ nghĩa tư bản độc quyền dùng để chỉ lực lượng nào?","options":["Toàn bộ cổ đông nhỏ cùng trực tiếp điều hành các công ty cổ phần và ngân hàng","Các chủ doanh nghiệp vừa và nhỏ chỉ hoạt động trong những thị trường địa phương","Đội ngũ công chức nhà nước không sở hữu và không liên hệ với các tập đoàn tài chính","Một nhóm nhỏ nhà tư bản kếch xù chi phối đời sống kinh tế và chính trị của xã hội"],"answer":3,"explanation":"Sự phát triển của tư bản tài chính hình thành một nhóm nhỏ nhà tư bản rất lớn có khả năng chi phối cả kinh tế lẫn chính trị, được gọi là tài phiệt hay đầu sỏ tài chính.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":126,"text":"Tài phiệt là nhóm nhỏ những nhà tư bản kếch xù chi phối toàn bộ đời sống kinh tế và chính trị của xã hội."},"num":313},{"id":"C04-Q062","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Thủ đoạn thống trị của tài phiệt","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Ngoài chế độ tham dự, tài phiệt còn sử dụng nhóm thủ đoạn nào để thu lợi nhuận độc quyền cao?","options":["Giải thể công ty mẹ, phân tán cổ phiếu và rút khỏi các sở giao dịch chứng khoán","Chuyển vốn sang dự trữ bắt buộc, ngừng mua bán trái phiếu và cổ phần doanh nghiệp","Lập công ty mới, kinh doanh công trái, đầu cơ chứng khoán và ruộng đất","Từ bỏ đầu cơ tài sản, chỉ cho các doanh nghiệp công nghiệp vay vốn ngắn hạn"],"answer":2,"explanation":"Tài phiệt kết hợp chế độ tham dự với việc lập công ty mới, phát hành trái khoán, kinh doanh công trái và đầu cơ chứng khoán, ruộng đất để mở rộng lợi ích.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":127,"text":"Ngoài chế độ tham dự, tài phiệt lập công ty mới, phát hành trái khoán, kinh doanh công trái và đầu cơ chứng khoán, ruộng đất."},"num":314},{"id":"C04-Q063","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Hình thức hình thành sở hữu nhà nước","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Nhóm phương thức nào được giáo trình nêu là các con đường hình thành sở hữu nhà nước trong chủ nghĩa tư bản?","options":["Chỉ trưng thu không bồi hoàn mọi doanh nghiệp nhỏ và cấm phát hành cổ phiếu tư nhân","Xây doanh nghiệp bằng ngân sách, mua lại doanh nghiệp tư nhân hoặc mua cổ phần của họ","Chuyển toàn bộ tài sản công cho tư nhân và rút khỏi các ngành kết cấu hạ tầng","Chỉ nhận viện trợ nước ngoài rồi chia đều thành cổ phần cho mọi công dân"],"answer":1,"explanation":"Sở hữu nhà nước có thể được tạo bằng vốn ngân sách, quốc hữu hóa thông qua mua lại, mua cổ phần doanh nghiệp tư nhân và mở rộng doanh nghiệp nhà nước.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":132,"text":"Sở hữu nhà nước hình thành qua xây dựng doanh nghiệp bằng ngân sách, mua lại doanh nghiệp tư nhân, mua cổ phần và mở rộng doanh nghiệp nhà nước."},"num":315},{"id":"C04-Q064","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Chính sách thực dân mới","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Sau khi hệ thống thuộc địa kiểu cũ tan rã, nội dung chủ yếu của chính sách thực dân mới là gì?","options":["Tiếp tục trực tiếp chiếm đóng mọi nước đang phát triển bằng bộ máy cai trị thuộc địa","Từ bỏ mọi ảnh hưởng bên ngoài và chỉ cạnh tranh trong phạm vi thị trường chính quốc","Dùng viện trợ kinh tế, kỹ thuật và quân sự để duy trì sự lệ thuộc của nước đang phát triển","Trao quyền kiểm soát tư bản tài chính cho các nước tiếp nhận để xóa bỏ quan hệ phụ thuộc"],"answer":2,"explanation":"Khi thuộc địa kiểu cũ sụp đổ, các cường quốc chuyển sang dùng viện trợ kinh tế, kỹ thuật và quân sự để duy trì những quan hệ lệ thuộc mới.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":130,"text":"Chủ nghĩa thực dân mới chủ yếu dùng viện trợ kinh tế, kỹ thuật và quân sự để duy trì sự lệ thuộc của các nước đang phát triển.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":25}},"num":316},{"id":"C04-Q065","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Tập trung sản xuất và khuynh hướng thỏa hiệp","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao mức tập trung sản xuất cao vừa làm cạnh tranh gay gắt vừa tạo khuynh hướng thỏa hiệp giữa các doanh nghiệp lớn?","options":["Doanh nghiệp lớn có cùng kỹ thuật nên pháp luật tự động buộc họ hợp nhất thành một đơn vị","Doanh nghiệp lớn không còn tranh giành thị trường nên thỏa hiệp chỉ nhằm giảm chi phí quản lý","Số doanh nghiệp lớn tăng vô hạn nên từng doanh nghiệp không đủ khả năng nhận biết đối thủ","Số doanh nghiệp lớn ít nên dễ thỏa thuận, còn quy mô và kỹ thuật cao khiến họ khó đánh bại nhau"],"answer":3,"explanation":"Khi chỉ còn ít doanh nghiệp lớn, việc thỏa thuận trở nên khả thi; đồng thời sức mạnh và kỹ thuật của họ tương đối lớn làm cuộc cạnh tranh khó phân thắng bại, thúc đẩy thỏa hiệp.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":123,"text":"Số doanh nghiệp lớn ít giúp họ dễ thỏa thuận, còn quy mô và kỹ thuật cao làm cạnh tranh khó đánh bại nhau nên nảy sinh khuynh hướng thỏa hiệp."},"num":317},{"id":"C04-Q066","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Liên kết ngang và liên kết dọc","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Sự chuyển từ liên kết ngang sang liên kết dọc của các tổ chức độc quyền được hiểu đúng như thế nào?","options":["Từ liên kết ngân hàng sang tách hoàn toàn hoạt động tín dụng khỏi sản xuất công nghiệp","Từ liên kết quốc tế sang chỉ duy trì các doanh nghiệp hoạt động trong một địa phương","Từ thống nhất lưu thông sang trả lại toàn bộ quyền mua bán cho từng xí nghiệp thành viên","Từ liên kết doanh nghiệp cùng ngành sang liên kết các ngành theo dây chuyền kinh tế - kỹ thuật"],"answer":3,"explanation":"Liên kết ngang tập hợp doanh nghiệp trong cùng ngành; liên kết dọc mở rộng theo chuỗi sang các ngành có quan hệ kinh tế và kỹ thuật với nhau.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":124,"text":"Tổ chức độc quyền ban đầu liên kết các doanh nghiệp cùng ngành, sau đó phát triển theo liên kết dọc và mở rộng ra nhiều ngành theo quan hệ dây chuyền."},"num":318},{"id":"C04-Q067","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Biến đổi vai trò của ngân hàng độc quyền","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao ngân hàng độc quyền từ vai trò trung gian thanh toán, tín dụng có thể trở thành quyền lực chi phối hoạt động kinh tế?","options":["Vì tập trung quyền phát hành tiền của nhà nước nên chi phối công nghiệp mà không cần quan hệ tín dụng","Vì nắm phần lớn tiền tệ xã hội và giữ vị thế chủ cho vay đối với các doanh nghiệp lớn","Vì doanh nghiệp công nghiệp tự chuyển quyền quản lý cho ngân hàng để giảm chi phí lưu thông","Vì trực tiếp ấn định giá bán của các tổ chức độc quyền thông qua hiệp nghị phân chia thị trường"],"answer":1,"explanation":"Tập trung ngân hàng làm các ngân hàng lớn nắm phần lớn tiền tệ xã hội. Từ địa vị chủ cho vay, họ có thể giám sát, đầu tư và can thiệp vào hoạt động của các độc quyền công nghiệp.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":126,"text":"Nắm phần lớn tiền tệ xã hội và dựa trên địa vị chủ cho vay, độc quyền ngân hàng can thiệp, khống chế hoạt động công nghiệp.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":21}},"num":319},{"id":"C04-Q068","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Sự xâm nhập giữa ngân hàng và công nghiệp","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Mối quan hệ nào giải thích sự ra đời của tư bản tài chính chứ không chỉ dừng ở độc quyền ngân hàng?","options":["Ngân hàng chỉ làm trung gian thanh toán, còn doanh nghiệp công nghiệp chỉ sử dụng vốn tự có","Ngân hàng chuyển toàn bộ quyền tín dụng cho nhà nước, còn công nghiệp ngừng phát hành cổ phiếu","Ngân hàng đầu tư vào công nghiệp, còn độc quyền công nghiệp mua cổ phần để chi phối ngân hàng","Ngân hàng nhỏ phục vụ hộ sản xuất, còn ngân hàng lớn rút khỏi quan hệ với doanh nghiệp công nghiệp"],"answer":2,"explanation":"Sự xâm nhập diễn ra hai chiều: độc quyền ngân hàng đầu tư và giám sát công nghiệp, còn độc quyền công nghiệp mua cổ phần để tác động ngân hàng; quá trình đó hình thành tư bản tài chính.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":126,"text":"Độc quyền ngân hàng xâm nhập công nghiệp và độc quyền công nghiệp mua cổ phần ngân hàng, làm nảy sinh tư bản tài chính.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":21}},"num":320},{"id":"C04-Q069","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Quyền lực chính trị của tài phiệt","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao tài phiệt có thể chi phối chính sách đối nội và đối ngoại của nhà nước tư sản?","options":["Vì mọi cổ đông nhỏ tự nguyện chuyển quyền công dân cho người quản lý ngân hàng lớn","Vì địa vị thống trị kinh tế của tư bản tài chính tạo cơ sở để tài phiệt chi phối bộ máy nhà nước","Vì nhà nước giao quyền lập pháp trực tiếp cho từng doanh nghiệp thuộc hệ thống công ty mẹ","Vì hoạt động đầu cơ chứng khoán làm các cơ quan nhà nước không còn bất kỳ chức năng kinh tế nào"],"answer":1,"explanation":"Quyền lực chính trị của tài phiệt bắt nguồn từ sự thống trị kinh tế; nhờ chi phối lượng tư bản lớn, họ tác động bộ máy và chính sách nhà nước để phục vụ lợi ích của mình.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":127,"text":"Do thống trị về kinh tế, hệ thống tài phiệt chi phối hoạt động cơ quan nhà nước và các chính sách đối nội, đối ngoại."},"num":321},{"id":"C04-Q070","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Ý nghĩa của năm đặc điểm kinh tế của độc quyền","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Theo giáo trình, mối liên hệ chặt chẽ giữa năm đặc điểm kinh tế cơ bản của độc quyền dưới chủ nghĩa tư bản cùng nói lên điều gì?","options":["Phản ánh sự tan rã của độc quyền và sự trở lại hoàn toàn của cạnh tranh tự do","Phản ánh năm quá trình tách biệt, không cùng phục vụ lợi ích của tư bản độc quyền","Phản ánh bản chất thống trị và cách thực hiện lợi ích của các tập đoàn độc quyền","Phản ánh việc các quốc gia đã chấm dứt phân chia thị trường và lãnh thổ thế giới"],"answer":2,"explanation":"Năm đặc điểm không tồn tại rời rạc mà liên hệ chặt chẽ, cùng biểu hiện bản chất thống trị của tư bản độc quyền và phương thức các tập đoàn độc quyền thực hiện lợi ích.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":130,"text":"Năm đặc điểm kinh tế cơ bản của độc quyền có quan hệ chặt chẽ, nói lên bản chất thống trị của tư bản độc quyền và phương thức thực hiện lợi ích của các tập đoàn độc quyền."},"num":322},{"id":"C04-Q071","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Sự đan kết giữa hai loại sở hữu","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Nói sở hữu nhà nước và sở hữu độc quyền tư nhân “đan kết” với nhau có nghĩa là gì?","options":["Hai loại sở hữu đan kết trong tuần hoàn của tổng tư bản xã hội thay vì loại trừ nhau","Sở hữu nhà nước thay thế ngay toàn bộ sở hữu tư nhân nên không còn quan hệ giữa hai khu vực","Sở hữu tư nhân chỉ tồn tại trong tiêu dùng, còn mọi tư liệu sản xuất đều thuộc nhà nước","Hai loại sở hữu hoạt động tách biệt vì pháp luật cấm nhà nước mua cổ phần doanh nghiệp tư nhân"],"answer":0,"explanation":"Sự đan kết thể hiện ở việc vốn và hoạt động của hai khu vực liên hệ trong tuần hoàn tổng tư bản xã hội, qua đó sở hữu nhà nước hỗ trợ cơ chế độc quyền tư nhân thay vì xóa bỏ nó.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":132,"text":"Sở hữu nhà nước và sở hữu độc quyền tư nhân tăng cường quan hệ, đan kết với nhau trong tuần hoàn của tổng tư bản xã hội."},"num":323},{"id":"C04-Q072","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Hệ thống điều tiết kinh tế của nhà nước tư sản","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Vì sao hệ thống điều tiết kinh tế của nhà nước tư sản không thể đồng nhất với một chính sách kinh tế đơn lẻ?","options":["Vì hệ thống này chỉ gồm các doanh nghiệp nhà nước, không bao gồm bộ máy quản lý hoặc công cụ chính sách","Vì mọi công cụ điều tiết đều có tác dụng giống nhau nên nhà nước không cần phối hợp chúng trong một chỉnh thể","Vì hệ thống này chỉ xử lý các giao dịch quốc tế, còn sản xuất và phân phối trong nước do độc quyền tự quản","Vì đây là tổng thể thiết chế, bộ máy, chính sách và công cụ tác động đến toàn bộ nền kinh tế và tái sản xuất"],"answer":3,"explanation":"Hệ thống điều tiết bao gồm cả thiết chế, bộ máy quản lý, chính sách và nhiều công cụ phối hợp để tác động đến nền kinh tế quốc dân và toàn bộ quá trình tái sản xuất.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":133,"text":"Hệ thống điều tiết là tổng thể thiết chế, thể chế, bộ máy, chính sách và công cụ có khả năng điều tiết toàn bộ nền kinh tế và quá trình tái sản xuất.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":32}},"num":324},{"id":"C04-Q073","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Giải pháp điều tiết dài hạn và ngắn hạn","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Cách phân biệt nào đúng giữa giải pháp điều tiết chiến lược dài hạn và giải pháp ngắn hạn của nhà nước tư sản?","options":["Dài hạn chỉ điều chỉnh lãi suất hằng tháng, còn ngắn hạn xây dựng kết cấu hạ tầng trong nhiều thập kỷ","Dài hạn chỉ xử phạt hành chính, còn ngắn hạn lập chương trình tổng thể về khoa học và môi trường","Dài hạn chỉ áp dụng cho doanh nghiệp nhỏ, còn ngắn hạn chỉ áp dụng cho tập đoàn độc quyền lớn","Dài hạn định hướng bằng chương trình tổng thể, còn ngắn hạn xử lý kịp thời các biến động trước mắt"],"answer":3,"explanation":"Giải pháp dài hạn đặt định hướng qua chương trình, kế hoạch tổng thể về kinh tế, khoa học, môi trường và xã hội; giải pháp ngắn hạn phản ứng với các vấn đề kinh tế trước mắt.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":134,"text":"Nhà nước điều tiết bằng giải pháp chiến lược dài hạn như chương trình, kế hoạch tổng thể và bằng cả các giải pháp ngắn hạn.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":35}},"num":325},{"id":"C04-Q074","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Thế mạnh của doanh nghiệp vừa và nhỏ","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao doanh nghiệp vừa và nhỏ vẫn có vai trò quan trọng bên cạnh các tổ chức độc quyền lớn?","options":["Vì họ luôn có tiềm lực tài chính lớn hơn và kiểm soát nhiều quốc gia hơn các công ty xuyên quốc gia","Vì họ không chịu tác động của biến động thị trường và không cần thay đổi kỹ thuật sản xuất","Vì họ linh hoạt trước thị trường, dám vào ngành mới và dễ đổi mới hoặc kết hợp kỹ thuật","Vì họ chỉ hoạt động trong ngành cũ, ít rủi ro và không tham gia hệ thống chuyên môn hóa"],"answer":2,"explanation":"Quy mô vừa và nhỏ tạo khả năng phản ứng nhanh với thị trường, chấp nhận ngành mới mạo hiểm, đổi mới thiết bị với chi phí bổ sung thấp và kết hợp nhiều loại kỹ thuật.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":136,"text":"Doanh nghiệp vừa và nhỏ nhạy với thay đổi, linh hoạt trước thị trường, mạnh dạn vào ngành mới và dễ đổi mới, kết hợp kỹ thuật."},"num":326},{"id":"C04-Q075","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Nguyên nhân hình thành concern","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao cạnh tranh gay gắt và luật chống độc quyền thúc đẩy sự hình thành concern đa ngành?","options":["Đa dạng hóa giúp tránh rủi ro chuyên môn hóa hẹp và đối phó quy định cấm độc quyền toàn bộ một mặt hàng","Đa dạng hóa làm mọi xí nghiệp mất quan hệ tài chính nên không doanh nghiệp nào còn khả năng chi phối","Luật chống độc quyền bắt buộc mỗi doanh nghiệp phải thống nhất sản xuất và tiêu thụ trong một ngành duy nhất","Cạnh tranh làm kinh doanh chuyên môn hóa hẹp an toàn hơn nên doanh nghiệp không cần mở rộng sang ngành khác"],"answer":0,"explanation":"Concern đa ngành phân tán rủi ro do chuyên môn hóa hẹp và giúp các tập đoàn thích ứng với luật cấm độc quyền tuyệt đối một mặt hàng trong một ngành.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":135,"text":"Concern đa ngành hình thành vì chuyên môn hóa hẹp dễ phá sản trong cạnh tranh và để đối phó luật chống độc quyền một mặt hàng."},"num":327},{"id":"C04-Q076","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Tính dễ tổn thương của conglomerate","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao nhiều conglomerate dễ phá sản nhanh hoặc chuyển thành concern?","options":["Vì các hãng thành viên có quan hệ sản xuất quá chặt nên không thể thay đổi danh mục kinh doanh","Vì họ không tham gia lĩnh vực tài chính và chỉ dựa vào một dây chuyền sản xuất chuyên môn hóa hẹp","Vì họ chỉ thống nhất mua bán nguyên liệu, còn mọi hoạt động tài chính đều bị pháp luật cấm","Vì họ ghép các hãng ít liên quan và chủ yếu tìm lợi nhuận chứng khoán nên dễ tổn thương trước biến động"],"answer":3,"explanation":"Conglomerate thường kết hợp các hãng không liên quan trực tiếp và hướng mạnh vào lợi nhuận chứng khoán, nên cấu trúc dễ bất ổn khi thị trường biến động và có thể chuyển thành concern.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":135,"text":"Conglomerate ghép các hãng không liên quan trực tiếp, chủ yếu thu lợi từ chứng khoán nên phần lớn dễ phá sản hoặc chuyển thành concern.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":37}},"num":328},{"id":"C04-Q077","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Phạm vi liên kết mới của tư bản tài chính","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao phạm vi liên kết của tư bản tài chính hiện đại mở rộng thành các tổ hợp công - nông - thương - tín - dịch vụ?","options":["Khoa học - công nghệ làm nhiều ngành mới, nhất là dịch vụ và bảo hiểm, tăng tỷ trọng và đan xen sâu hơn","Ngân hàng và công nghiệp chấm dứt xâm nhập lẫn nhau khi các ngành kinh tế mới bắt đầu xuất hiện","Các ngành dịch vụ và bảo hiểm mất vai trò nên tư bản tài chính phải quay lại một ngành công nghiệp duy nhất","Tín dụng bị loại khỏi sản xuất nên các tập đoàn chỉ có thể liên kết bằng quan hệ mua bán hàng hóa"],"answer":0,"explanation":"Khoa học - công nghệ hiện đại làm xuất hiện nhiều ngành mới và tăng vai trò của dịch vụ, bảo hiểm; tư bản tài chính vì thế mở rộng sự liên kết, xâm nhập sang các tổ hợp ngành đa dạng hơn.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":137,"text":"Khoa học - công nghệ làm xuất hiện nhiều ngành mới, nhất là dịch vụ và bảo hiểm, khiến phạm vi liên kết của tư bản tài chính mở rộng thành các tổ hợp đa dạng.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":39}},"num":329},{"id":"C04-Q078","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Nguồn gốc thành tựu phúc lợi xã hội","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao không thể chỉ xem phúc lợi cao và chi tiêu bảo vệ môi trường ở một số nước tư bản là sự nhân đạo hóa của chủ nghĩa tư bản?","options":["Vì các khoản chi đó hoàn toàn do doanh nghiệp nhỏ tự nguyện đóng góp, không liên quan đến ngân sách nhà nước","Vì người lao động không tham gia đấu tranh xã hội và cũng không hưởng bất kỳ kết quả phúc lợi nào","Vì đó còn là thành quả đấu tranh lâu dài của nhân dân tiến bộ và sự chuẩn bị vật chất của chủ nghĩa xã hội","Vì mọi chính sách xã hội chỉ nhằm giảm năng suất nên không tạo ra thành quả vật chất cho xã hội"],"answer":2,"explanation":"Giáo trình nhấn mạnh các thành tựu đó không phải sự thức tỉnh tự phát của giai cấp tư sản mà là kết quả đấu tranh bền bỉ của nhân dân tiến bộ, đồng thời tạo tiền đề vật chất mới.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":143,"text":"Phúc lợi và thành tựu xã hội là kết quả đấu tranh lâu dài của nhân dân tiến bộ và là sự chuẩn bị vật chất cho chủ nghĩa xã hội, không phải sự thức tỉnh của giai cấp tư sản."},"num":330},{"id":"C04-Q079","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Đầu tư nhà nước và phân bổ rủi ro","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Nhà nước tài trợ nghiên cứu cơ bản và kết cấu hạ tầng rất tốn kém, gánh rủi ro ban đầu; các tập đoàn tư nhân sau đó tập trung vào khâu có lợi nhuận hấp dẫn. Tình huống phản ánh điều gì?","options":["Đầu tư nhà nước đã thay thế hoàn toàn sở hữu tư nhân trong mọi ngành có lợi nhuận cao","Sở hữu nhà nước đã rút khỏi nghiên cứu cơ bản để nhường toàn bộ rủi ro cho doanh nghiệp tư nhân","Tập đoàn tư nhân tự chi trả mọi kết cấu hạ tầng nên không còn nhận lợi ích từ nguồn lực công","Đầu tư nhà nước gánh chi phí, rủi ro lớn và tạo điều kiện cho tư bản tư nhân chọn lĩnh vực sinh lợi"],"answer":3,"explanation":"Đây là biểu hiện mới của vai trò đầu tư nhà nước: ngân sách chịu các chi phí và rủi ro lớn trong nghiên cứu, hạ tầng, còn doanh nghiệp tư nhân có điều kiện tập trung vào lĩnh vực lợi nhuận cao.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":142,"text":"Nhà nước đầu tư vào nghiên cứu cơ bản và hạ tầng, gánh rủi ro lớn, trong khi công ty tư nhân tập trung vào lĩnh vực có lợi nhuận hấp dẫn."},"num":331},{"id":"C04-Q080","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Biểu hiện mới về quản lý ngân sách nhà nước","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Quốc hội quyết định chi ngân sách, cơ quan hành pháp bị ràng buộc bởi luật ngân sách, còn dự trữ quốc gia chỉ được dùng trong tình huống đặc biệt. Đây là biểu hiện mới nào?","options":["Giới hành pháp toàn quyền sử dụng ngân sách và dự trữ mà không chịu giám sát pháp lý","Ngân sách nhà nước đã bị xóa bỏ vì mọi hoạt động ổn định vĩ mô chuyển cho ngân hàng tư nhân","Quyền chi tiêu công được kiểm soát bằng cơ chế lập pháp và giới hạn pháp luật chặt chẽ hơn","Dự trữ quốc gia trở thành nguồn vốn thường xuyên để mọi tập đoàn tự do vay không hoàn trả"],"answer":2,"explanation":"Tình huống thể hiện ngân sách thuộc quyền quyết định của cơ quan lập pháp, hành pháp bị luật ngân sách giới hạn và dự trữ chỉ dùng trong hoàn cảnh đặc biệt.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":141,"text":"Chi ngân sách thuộc quyền lập pháp, hành pháp bị luật ngân sách quản lý chặt và dự trữ quốc gia chỉ dùng trong tình huống đặc biệt.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":47}},"num":332},{"id":"C04-Q081","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Độc quyền ở nước đang phát triển","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Tại một nước đang phát triển, công nghệ hiện đại theo một công ty xuyên quốc gia đi vào ngành mới; chỉ một doanh nghiệp lớn đã đủ sức chi phối sản xuất và tiêu thụ toàn ngành. Nhận định nào phù hợp?","options":["Độc quyền chỉ có thể xuất hiện sau khi mọi doanh nghiệp vừa và nhỏ trong cả nền kinh tế biến mất","Độc quyền có thể xuất hiện khi công ty xuyên quốc gia đưa công nghệ hiện đại vào ngành mới","Đây là sự trở lại của cartel cổ điển vì nhiều xí nghiệp cùng ngành đã ký hiệp nghị về giá","Đây chỉ là cạnh tranh tự do vì một doanh nghiệp lớn không bao giờ có thể chi phối một ngành mới"],"answer":1,"explanation":"Giáo trình chỉ ra độc quyền đã xuất hiện ở nước đang phát triển do sự thâm nhập của công ty xuyên quốc gia và ứng dụng kỹ thuật hiện đại, khiến một doanh nghiệp lớn có thể chi phối ngành mới.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":136,"text":"Công ty xuyên quốc gia và kỹ thuật hiện đại có thể làm một doanh nghiệp lớn đủ sức chi phối ngành mới ở nước đang phát triển."},"num":333},{"id":"C04-Q082","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Ngân hàng xuyên quốc gia và tư bản tài chính","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một tập đoàn tài chính lập ngân hàng đa quốc gia để điều tiết các concern và conglomerate thâm nhập nhiều nền kinh tế; quanh mạng lưới đó hình thành một trung tâm tài chính lớn. Tình huống thể hiện điều gì?","options":["Độc quyền ngân hàng thu hẹp về phạm vi quốc gia và tách khỏi quá trình quốc tế hóa kinh tế","Công ty xuyên quốc gia không còn cần dịch vụ tài chính khi đầu tư sang các quốc gia khác","Tư bản tài chính thích ứng với quốc tế hóa bằng ngân hàng xuyên quốc gia và trung tâm tài chính","Các trung tâm tài chính thế giới hình thành độc lập với hoạt động của những tập đoàn tài chính quốc tế"],"answer":2,"explanation":"Ngân hàng đa quốc gia và xuyên quốc gia là công cụ để tập đoàn tài chính điều tiết các tổ hợp độc quyền xâm nhập nền kinh tế khác; hoạt động đó góp phần tạo các trung tâm tài chính thế giới.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":138,"text":"Tập đoàn tài chính lập ngân hàng đa quốc gia, xuyên quốc gia để điều tiết các concern và conglomerate; hoạt động của họ tạo ra các trung tâm tài chính thế giới."},"num":334},{"id":"C04-Q083","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Chiến lược biên giới mềm","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một nước vẫn độc lập về hình thức và không bị chiếm đóng, nhưng các ràng buộc vốn và công nghệ dần chuyển thành lệ thuộc kinh tế rồi chính trị vào một cường quốc. Đây là chiến lược nào?","options":["Chiến lược biên giới mềm nhằm mở rộng biên giới kinh tế vượt ra ngoài biên giới địa lý","Chiến lược đóng cửa biên giới kinh tế để cắt mọi quan hệ vốn và công nghệ quốc tế","Chiến lược phân tán sở hữu để các nước yếu tự chủ hoàn toàn về tài chính và ngoại giao","Chiến lược chiếm thuộc địa kiểu cũ bằng bộ máy cai trị trực tiếp trên lãnh thổ"],"answer":0,"explanation":"Biên giới mềm không nhất thiết chiếm đóng lãnh thổ mà dùng sự lệ thuộc về vốn, công nghệ và kinh tế để mở rộng phạm vi chi phối, rồi tác động đến chính trị.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":140,"text":"Chiến lược biên giới mềm mở rộng biên giới kinh tế, ràng buộc nước kém phát triển từ lệ thuộc vốn, công nghệ đến lệ thuộc chính trị.","slide":{"file":"MLN122. Slot 5+6. Cạnh tranh và độc quyền trong nền KTTT.pptx.txt","number":45}},"num":335},{"id":"C04-Q084","chapter":"Chương 4 · Slot 5+6: Cạnh tranh và độc quyền trong nền kinh tế thị trường","chapterNum":4,"topic":"Hai xu thế tăng trưởng và trì trệ","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một nền kinh tế có vài ngành công nghệ tăng trưởng rất nhanh, nhưng ở ngành do tập đoàn độc quyền thống trị, sáng chế đe dọa vị thế hiện tại bị trì hoãn nên sản xuất chậm đổi mới. Nhận định nào phù hợp nhất?","options":["Xu thế tăng trưởng nhanh có thể cùng tồn tại với xu thế trì trệ do sự thống trị của độc quyền","Sự trì hoãn sáng chế chứng minh toàn bộ nền kinh tế tư bản đã ngừng phát triển tuyệt đối","Hai hiện tượng chỉ là dao động ngắn hạn và không liên quan đến mục đích bảo vệ vị thế độc quyền","Tăng trưởng nhanh chứng minh độc quyền không thể kìm hãm tiến bộ kỹ thuật ở bất kỳ ngành nào"],"answer":0,"explanation":"Giáo trình phân biệt xu thế phát triển nhanh của một số bộ phận với xu thế trì trệ do độc quyền tạo các nhân tố cản trở kỹ thuật và sản xuất; hai xu thế có thể đồng thời tồn tại.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":146,"text":"Kinh tế tư bản có thể tăng trưởng nhanh, đồng thời sự thống trị độc quyền tạo nhân tố ngăn cản tiến bộ kỹ thuật và gây xu thế trì trệ."},"num":336},{"id":"C05-Q001","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Khái niệm kinh tế thị trường định hướng xã hội chủ nghĩa","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Theo giáo trình, mô tả nào đúng về kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?","options":["Nền kinh tế chỉ tuân theo tín hiệu thị trường, tách khỏi mục tiêu xã hội và không có sự điều tiết của Nhà nước","Nền kinh tế phân bổ mọi nguồn lực bằng mệnh lệnh hành chính, thay thế quy luật thị trường và quan hệ hàng hóa","Nền kinh tế vận hành theo quy luật thị trường, hướng tới các giá trị xã hội chủ nghĩa và có Nhà nước điều tiết dưới sự lãnh đạo của Đảng","Nền kinh tế chỉ thừa nhận sở hữu công cộng, không có cạnh tranh và không cho các thành phần kinh tế khác cùng phát triển"],"answer":2,"explanation":"Mô hình này vừa vận hành theo các quy luật của thị trường, vừa hướng tới hệ giá trị xã hội chủ nghĩa, dưới sự điều tiết của Nhà nước do Đảng Cộng sản Việt Nam lãnh đạo.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":153,"text":"Giáo trình định nghĩa nền kinh tế này bằng ba nội dung: vận hành theo quy luật thị trường, hướng tới hệ giá trị dân giàu, nước mạnh, dân chủ, công bằng, văn minh và có sự điều tiết của Nhà nước do Đảng lãnh đạo.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":4}},"num":337},{"id":"C05-Q002","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Tính phổ biến và tính đặc thù của mô hình kinh tế thị trường","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Từ nhận định không có một mô hình kinh tế thị trường chung cho mọi quốc gia và mọi giai đoạn, có thể rút ra kết luận nào?","options":["Một quốc gia có thể bỏ qua toàn bộ đặc trưng chung của kinh tế thị trường nếu có lịch sử riêng","Mọi quốc gia phải sao chép mô hình của nước có trình độ kinh tế cao nhất, bất kể khác biệt về lịch sử và trình độ phát triển","Mô hình kinh tế thị trường chỉ do ý chí chính trị quyết định, nên không cần xét trình độ lực lượng sản xuất hoặc điều kiện kinh tế - xã hội","Mỗi mô hình vừa có đặc trưng tất yếu của kinh tế thị trường, vừa phản ánh điều kiện lịch sử, chính trị và kinh tế - xã hội của quốc gia"],"answer":3,"explanation":"Tính đặc thù quốc gia không phủ định các thuộc tính chung của kinh tế thị trường; hai mặt này cùng tồn tại trong mỗi mô hình cụ thể.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":153,"text":"Mỗi nền kinh tế thị trường có cả những đặc trưng tất yếu chung và những đặc trưng phản ánh điều kiện riêng của quốc gia, giai đoạn phát triển."},"num":338},{"id":"C05-Q003","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Nội hàm định hướng xã hội chủ nghĩa","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Định hướng xã hội chủ nghĩa của nền kinh tế thị trường Việt Nam thực chất hướng tới điều gì?","options":["Từng bước xác lập đầy đủ các giá trị dân giàu, nước mạnh, dân chủ, công bằng, văn minh","Thay thế các quy luật thị trường bằng cơ chế cấp phát hiện vật tập trung","Chấm dứt vai trò điều tiết của Nhà nước khi các loại thị trường đã hình thành","Đạt ngay một trạng thái xã hội hoàn chỉnh kể từ khi lựa chọn mô hình, không cần trải qua quá trình phát triển lâu dài"],"answer":0,"explanation":"Định hướng xã hội chủ nghĩa là quá trình hướng tới một hệ giá trị toàn diện của xã hội mới, chứ không phải phủ nhận thị trường hoặc coi mục tiêu đã hoàn thành ngay lập tức.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":154,"text":"Giáo trình xác định định hướng xã hội chủ nghĩa là hướng tới các giá trị cốt lõi dân giàu, nước mạnh, dân chủ, công bằng, văn minh.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":4}},"num":339},{"id":"C05-Q004","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Đặc trưng chung và đặc trưng riêng","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Cách hiểu nào phù hợp với yêu cầu nghiên cứu kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?","options":["Chỉ xem xét các thuộc tính phổ biến của thị trường và bỏ qua hoàn cảnh Việt Nam","Xem xét đầy đủ đặc trưng chung của kinh tế thị trường đồng thời nhận diện những đặc trưng riêng do điều kiện Việt Nam quy định","Chỉ nhấn mạnh đặc điểm riêng của Việt Nam và phủ nhận quy luật chung của thị trường","Luân phiên áp dụng đặc trưng chung và đặc trưng riêng vì hai nhóm đặc trưng được cho là không thể cùng tồn tại trong một mô hình cụ thể"],"answer":1,"explanation":"Giáo trình yêu cầu tránh đối lập trừu tượng mô hình Việt Nam với kinh tế thị trường thế giới; mô hình Việt Nam bao hàm cái chung và có một số đặc trưng riêng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":154,"text":"Nền kinh tế thị trường định hướng xã hội chủ nghĩa phải có đầy đủ đặc trưng chung của kinh tế thị trường và những đặc trưng riêng phù hợp lịch sử, trình độ phát triển, hoàn cảnh Việt Nam."},"num":340},{"id":"C05-Q005","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Tính tất yếu khách quan của mô hình","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Lý do thứ nhất được giáo trình nêu ra để giải thích tính tất yếu phát triển kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam là gì?","options":["Mô hình này bảo đảm thị trường không bao giờ xuất hiện khuyết tật","Mọi loại thị trường ở Việt Nam đã phát triển đầy đủ và đồng bộ","Mô hình này cho phép Việt Nam tách khỏi kinh tế quốc tế và không cần xét điều kiện khách quan trong nước","Mô hình này phù hợp với xu hướng phát triển khách quan của Việt Nam trong bối cảnh thế giới hiện nay"],"answer":3,"explanation":"Lý do đầu tiên là sự phù hợp với xu hướng phát triển khách quan; sự tồn tại của các điều kiện kinh tế hàng hóa làm cho kinh tế thị trường hình thành một cách tất yếu.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":156,"text":"Giáo trình nêu lý do thứ nhất là sự phù hợp với xu hướng phát triển khách quan của Việt Nam trong bối cảnh thế giới hiện nay.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":5}},"num":341},{"id":"C05-Q006","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Điều kiện tồn tại của kinh tế thị trường trong thời kỳ quá độ","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao kinh tế thị trường còn tồn tại lâu dài trong thời kỳ quá độ lên chủ nghĩa xã hội ở Việt Nam?","options":["Hội nhập quốc tế là điều kiện duy nhất làm xuất hiện mọi quan hệ thị trường trong nước","Cơ chế hành chính đã thay thế hoàn toàn trao đổi hàng hóa giữa các chủ thể sản xuất","Phân công lao động xã hội và các hình thức sở hữu khác nhau vẫn tồn tại, nên sản xuất và phân phối sản phẩm vẫn phải thông qua thị trường","Nhu cầu vật chất của người dân tự nó đủ tạo ra thị trường và duy trì thị trường lâu dài, không cần phân công lao động hay sự tách biệt về sở hữu"],"answer":2,"explanation":"Sản xuất hàng hóa và thị trường tồn tại do các điều kiện kinh tế - xã hội khách quan, nổi bật là phân công lao động xã hội và sự khác nhau về quan hệ sở hữu tư liệu sản xuất.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":158,"text":"Trong thời kỳ quá độ, phân công lao động xã hội và các hình thức sở hữu tư liệu sản xuất không mất đi, nên kinh tế thị trường còn tồn tại khách quan."},"num":342},{"id":"C05-Q007","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Tính ưu việt của kinh tế thị trường","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Ưu thế nào của kinh tế thị trường được giáo trình nhấn mạnh khi giải thích sự cần thiết phát triển mô hình này ở Việt Nam?","options":["Triệt tiêu cạnh tranh để giữ nguyên cơ cấu sản xuất hiện có","Tự động loại bỏ mọi thất bại và khuyết tật của thị trường","Duy trì kinh tế tự cấp, tự túc và hạn chế phân công lao động để tránh biến động bên ngoài","Phân bổ nguồn lực hiệu quả, thúc đẩy lực lượng sản xuất, tiến bộ kỹ thuật và năng suất lao động"],"answer":3,"explanation":"Kinh tế thị trường tạo động lực phân bổ nguồn lực và phát triển lực lượng sản xuất, nhưng vẫn có khuyết tật nên không thể coi là cơ chế tự hoàn hảo.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":157,"text":"Giáo trình xem kinh tế thị trường là phương thức phân bổ nguồn lực hiệu quả, thúc đẩy kỹ thuật, năng suất, chất lượng và giảm giá thành.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":5}},"num":343},{"id":"C05-Q008","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Phát huy ưu thế và khắc phục khuyết tật thị trường","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một ngành sản xuất tăng nhanh năng suất nhờ cạnh tranh, nhưng đồng thời phát sinh ô nhiễm và chênh lệch thu nhập lớn. Cách xử lý nào phù hợp với lập luận của giáo trình?","options":["Bãi bỏ cơ chế thị trường và chuyển toàn bộ ngành sang cấp phát hành chính","Để thị trường tự xử lý ô nhiễm, chênh lệch thu nhập vì mọi điều tiết của Nhà nước đều bị coi là trái quy luật thị trường","Tiếp tục phát huy động lực thị trường, đồng thời Nhà nước điều tiết kịp thời để khắc phục khuyết tật và bảo đảm định hướng xã hội","Cấm áp dụng công nghệ mới để đưa năng suất và thu nhập của các chủ thể về mức cũ"],"answer":2,"explanation":"Giáo trình chủ trương sử dụng ưu thế của thị trường để phát triển lực lượng sản xuất, đồng thời cần Nhà nước can thiệp trước các thất bại và khuyết tật của thị trường.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":158,"text":"Phát triển kinh tế thị trường phải đi cùng sự can thiệp, điều tiết kịp thời của Nhà nước pháp quyền xã hội chủ nghĩa đối với thất bại và khuyết tật thị trường."},"num":344},{"id":"C05-Q009","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Đặc trưng về mục tiêu","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Nội dung nào thuộc đặc trưng về mục tiêu của kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?","options":["Trao toàn bộ quyền quản lý nền kinh tế cho các hiệp hội doanh nghiệp","Áp dụng chế độ pháp lý riêng cho từng hình thức sở hữu để các thành phần vận hành theo quy tắc khác nhau","Phân phối kết quả sản xuất duy nhất theo phần vốn mà mỗi chủ thể đóng góp","Phát triển lực lượng sản xuất, xây dựng cơ sở vật chất - kỹ thuật của chủ nghĩa xã hội và nâng cao đời sống nhân dân"],"answer":3,"explanation":"Đặc trưng về mục tiêu gắn phát triển lực lượng sản xuất và cơ sở vật chất - kỹ thuật với nâng cao đời sống, hướng tới dân giàu, nước mạnh, dân chủ, công bằng, văn minh.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":160,"text":"Mục tiêu của mô hình là phát triển lực lượng sản xuất, xây dựng cơ sở vật chất - kỹ thuật của chủ nghĩa xã hội và nâng cao đời sống nhân dân.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":7}},"num":345},{"id":"C05-Q010","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Nội dung kinh tế và pháp lý của sở hữu","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Cách phân biệt nào đúng giữa nội dung kinh tế và nội dung pháp lý của sở hữu?","options":["Nội dung kinh tế và nội dung pháp lý đều chỉ là các quy định hình thức về đăng ký tài sản","Nội dung kinh tế biểu hiện ở lợi ích từ đối tượng sở hữu, còn nội dung pháp lý quy định quyền hạn, nghĩa vụ và sự thừa nhận của pháp luật","Nội dung kinh tế quy định quyền và nghĩa vụ, còn nội dung pháp lý chỉ phản ánh lợi ích được hưởng","Nội dung kinh tế không liên quan đến sản xuất, còn nội dung pháp lý tự tạo ra lợi ích dù không có đối tượng sở hữu hoặc hoạt động tạo ra của cải"],"answer":1,"explanation":"Hai nội dung thống nhất với nhau: lợi ích kinh tế cần phương thức pháp lý để được thực hiện chính đáng, còn quy định pháp lý thiếu lợi ích kinh tế chỉ còn giá trị hình thức.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":162,"text":"Nội dung kinh tế của sở hữu là lợi ích chủ thể được thụ hưởng; nội dung pháp lý thể hiện quyền hạn, nghĩa vụ và sự thừa nhận bằng pháp luật."},"num":346},{"id":"C05-Q011","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Quan hệ sở hữu và các thành phần kinh tế","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Nhận định nào phản ánh đúng quan hệ giữa các thành phần kinh tế trong mô hình Việt Nam?","options":["Kinh tế nhà nước giữ vai trò chủ đạo, kinh tế tư nhân là một động lực quan trọng; các chủ thể bình đẳng, hợp tác và cạnh tranh theo pháp luật","Kinh tế nhà nước là thành phần hợp pháp duy nhất, còn kinh tế tư nhân chỉ tồn tại tạm thời","Kinh tế tư nhân giữ vai trò chủ đạo, còn kinh tế nhà nước chỉ thực hiện các hoạt động phúc lợi","Kinh tế nhà nước và kinh tế tập thể tồn tại tách khỏi toàn bộ nền kinh tế, không tham gia hợp tác hoặc cạnh tranh với các thành phần khác theo pháp luật"],"answer":0,"explanation":"Nhiều hình thức sở hữu và thành phần kinh tế cùng tồn tại; vai trò chủ đạo của kinh tế nhà nước không đồng nghĩa với độc quyền hay bất bình đẳng pháp lý.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":162,"text":"Nền kinh tế có nhiều hình thức sở hữu, nhiều thành phần; kinh tế nhà nước giữ vai trò chủ đạo, kinh tế tư nhân là một động lực quan trọng và các chủ thể bình đẳng theo pháp luật."},"num":347},{"id":"C05-Q012","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Đặc trưng về quản lý nền kinh tế","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Chủ thể nhà nước quản lý nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam có đặc trưng nào?","options":["Nhà nước trung lập về mục tiêu xã hội và chỉ bảo vệ giao dịch của doanh nghiệp","Nhà nước quản lý bằng mệnh lệnh trực tiếp, ấn định hoạt động từng chủ thể và không tôn trọng tín hiệu thị trường","Nhà nước pháp quyền xã hội chủ nghĩa của nhân dân, do nhân dân, vì nhân dân, dưới sự lãnh đạo của Đảng và chịu sự giám sát của nhân dân","Nhà nước trao toàn bộ quyền điều tiết vĩ mô và hoạch định chính sách cho các tổ chức độc quyền tư nhân"],"answer":2,"explanation":"Đây là đặc trưng riêng của quan hệ quản lý; Nhà nước vẫn sử dụng pháp luật, chiến lược, chính sách và công cụ kinh tế trên cơ sở tôn trọng nguyên tắc thị trường.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":164,"text":"Giáo trình xác định Nhà nước quản lý là Nhà nước pháp quyền xã hội chủ nghĩa của nhân dân, do nhân dân, vì nhân dân, dưới sự lãnh đạo của Đảng và sự giám sát của nhân dân.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":7}},"num":348},{"id":"C05-Q013","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Đặc trưng về quan hệ phân phối","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Phương án nào thể hiện đầy đủ nhất quan hệ phân phối trong kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?","options":["Phân phối đầu vào theo địa vị hành chính và mức được cấp; phân phối đầu ra bình quân, không xét kết quả lao động, hiệu quả hoặc đóng góp","Phân phối đầu vào theo lượng vốn sở hữu; phân phối đầu ra chỉ theo phần vốn góp, không có an sinh hoặc phúc lợi xã hội","Phân phối công bằng cơ hội và điều kiện đầu vào; phân phối đầu ra theo lao động, hiệu quả, mức đóng góp nguồn lực và an sinh, phúc lợi xã hội","Phân phối đầu vào bằng cấp phát hành chính; phân phối đầu ra duy nhất thông qua trợ cấp xã hội, không xét hiệu quả kinh tế"],"answer":2,"explanation":"Mô hình kết hợp phân phối đầu vào công bằng với nhiều hình thức phân phối đầu ra; không đồng nhất công bằng với chia đều hoặc chỉ dựa vào vốn.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":165,"text":"Phân phối đầu vào bảo đảm cơ hội và điều kiện phát triển; phân phối đầu ra chủ yếu theo lao động, hiệu quả, đóng góp nguồn lực và qua an sinh, phúc lợi xã hội.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":14}},"num":349},{"id":"C05-Q014","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Gắn tăng trưởng kinh tế với tiến bộ và công bằng xã hội","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một địa phương đề nghị tập trung toàn bộ nguồn lực cho tăng trưởng và chỉ thực hiện công bằng xã hội sau khi kinh tế đạt trình độ cao. Đánh giá nào phù hợp với giáo trình?","options":["Nên dành mọi nguồn lực cho phúc lợi xã hội dù vượt quá khả năng của nền kinh tế","Nên giữ đề nghị vì công bằng xã hội chỉ là kết quả tự động sau khi tăng trưởng hoàn tất và không cần được đặt ra trong các chính sách hiện tại","Nên thay mọi tiêu chí năng suất và đóng góp bằng phân phối bình quân ngay lập tức để mọi chủ thể nhận phần của cải bằng nhau","Cần điều chỉnh vì công bằng phải gắn với từng chính sách và giai đoạn, nhưng không có nghĩa chia đều bất chấp hiệu quả"],"answer":3,"explanation":"Giáo trình bác bỏ cả việc hy sinh công bằng để chạy theo tăng trưởng lẫn cách cào bằng hoặc dồn nguồn lực xã hội vượt khả năng kinh tế.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":167,"text":"Không đợi kinh tế phát triển cao mới thực hiện công bằng, không hy sinh công bằng cho tăng trưởng, đồng thời công bằng không phải cào bằng hay phân phối vượt khả năng kinh tế.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":14}},"num":350},{"id":"C05-Q015","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Khái niệm thể chế","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Theo giáo trình, thể chế là gì?","options":["Chỉ là hệ thống luật kinh tế điều chỉnh sản xuất, kinh doanh, không bao gồm bộ máy hoặc cơ chế vận hành","Các tập quán tự phát trong xã hội, không cần bộ máy quản lý hoặc cơ chế tổ chức thực hiện","Những quy tắc, luật pháp, bộ máy quản lý và cơ chế vận hành điều chỉnh hoạt động của con người trong một chế độ xã hội","Kế hoạch riêng của từng doanh nghiệp nhằm tổ chức kinh doanh và tối đa hóa lợi nhuận"],"answer":2,"explanation":"Khái niệm thể chế có phạm vi rộng hơn thể chế kinh tế, bao gồm quy tắc, luật pháp, bộ máy quản lý và cơ chế vận hành của một chế độ xã hội.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":168,"text":"Thể chế gồm quy tắc, luật pháp, bộ máy quản lý và cơ chế vận hành nhằm điều chỉnh hoạt động của con người trong một chế độ xã hội.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":17}},"num":351},{"id":"C05-Q016","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Khái niệm thể chế kinh tế","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Điểm nào xác định đúng phạm vi của thể chế kinh tế?","options":["Hệ thống quy tắc, luật pháp, bộ máy và cơ chế điều chỉnh chủ thể, hoạt động sản xuất kinh doanh và quan hệ kinh tế","Chỉ quy định tiêu chuẩn kỹ thuật và điều kiện lưu thông của hàng hóa, không điều chỉnh chủ thể hoặc các quan hệ kinh tế","Chỉ bao gồm thỏa thuận tự nguyện giữa các hiệp hội ngành nghề, không có quy tắc chính thức hoặc bộ máy quản lý của Nhà nước","Chỉ điều chỉnh quan hệ chính trị giữa công dân và cơ quan công quyền trong một chế độ xã hội"],"answer":0,"explanation":"Thể chế kinh tế được phân biệt bởi đối tượng điều chỉnh là chủ thể, hành vi và quan hệ kinh tế, chứ không chỉ là một nhóm quy định chuyên biệt.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":168,"text":"Thể chế kinh tế là hệ thống quy tắc, luật pháp, bộ máy quản lý và cơ chế vận hành điều chỉnh chủ thể, sản xuất kinh doanh và quan hệ kinh tế.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":17}},"num":352},{"id":"C05-Q017","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Các bộ phận của thể chế kinh tế","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Tổ hợp nào gồm đúng ba bộ phận cơ bản của thể chế kinh tế?","options":["Hệ thống pháp luật và quy tắc được thừa nhận; hệ thống chủ thể kinh tế; cơ chế, phương pháp và thủ tục vận hành","Hệ thống doanh nghiệp thuộc các hình thức sở hữu; danh mục hàng tiêu dùng; mức giá cân bằng hình thành trên từng thị trường","Ngân sách nhà nước; hệ thống kết cấu hạ tầng; trữ lượng và chất lượng tài nguyên thiên nhiên","Mục tiêu phát triển chính trị; trình độ công nghệ; quy mô và sức mua của thị trường nước ngoài"],"answer":0,"explanation":"Thể chế không đồng nhất với nguồn lực hay kết quả kinh tế; nó gồm luật lệ, các chủ thể thực hiện và cách thức đưa luật lệ vào vận hành.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":168,"text":"Ba bộ phận cơ bản là pháp luật và quy tắc xã hội được Nhà nước thừa nhận, các chủ thể hoạt động kinh tế, cùng cơ chế, phương pháp và thủ tục thực hiện."},"num":353},{"id":"C05-Q018","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Thể chế kinh tế thị trường định hướng xã hội chủ nghĩa","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Nội dung cốt lõi nào thuộc khái niệm thể chế kinh tế thị trường định hướng xã hội chủ nghĩa?","options":["Hệ thống mệnh lệnh hành chính thay thế các yếu tố và loại thị trường bằng phân bổ tập trung","Hệ thống thỏa thuận của doanh nghiệp nhằm điều chỉnh cạnh tranh và phân chia thị trường, không gắn với luật pháp hoặc mục tiêu phát triển xã hội","Hệ thống đường lối, luật pháp, chính sách điều chỉnh chủ thể và đồng bộ các yếu tố, loại thị trường theo mục tiêu xã hội chủ nghĩa","Hệ thống công cụ điều hành ngắn hạn chỉ dùng để thay đổi giá cả trong từng thời điểm"],"answer":2,"explanation":"Khái niệm này bao quát đường lối, luật pháp, chính sách và cơ chế điều chỉnh các chủ thể, hướng tới thị trường hiện đại, đồng bộ và hệ giá trị xã hội chủ nghĩa.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":168,"text":"Thể chế kinh tế thị trường định hướng xã hội chủ nghĩa xác lập cơ chế vận hành, điều chỉnh chủ thể và quan hệ lợi ích, hướng tới đồng bộ các yếu tố và loại thị trường theo mục tiêu xã hội.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":17}},"num":354},{"id":"C05-Q019","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Hiệu lực và hiệu quả của hệ thống thể chế","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Lý do thứ ba phải tiếp tục hoàn thiện thể chế kinh tế thị trường định hướng xã hội chủ nghĩa được giáo trình xác định như thế nào?","options":["Hệ thống thể chế đã đồng bộ nhưng số lượng văn bản quá nhiều, làm thị trường không còn khả năng tự điều tiết","Nền kinh tế không có chủ thể kinh doanh, không có quan hệ sở hữu và không phát sinh hoạt động trao đổi","Các yếu tố thị trường vận hành quá mức, còn các loại thị trường phát triển vượt xa trình độ của nền kinh tế","Hệ thống thể chế còn kém hiệu lực, hiệu quả; các yếu tố và loại thị trường còn thiếu hoặc mới ở trình độ sơ khai"],"answer":3,"explanation":"Lý do thứ ba tập trung vào chất lượng và khả năng thực thi thể chế, đồng thời chỉ ra các yếu tố và loại thị trường vẫn thiếu hoặc còn sơ khai.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":170,"text":"Giáo trình nêu lý do thứ ba là hệ thống thể chế còn kém hiệu lực, hiệu quả, chưa đủ mạnh; các yếu tố và loại thị trường còn thiếu hoặc sơ khai.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":18}},"num":355},{"id":"C05-Q020","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Năng lực xây dựng và thực thi thể chế của Nhà nước","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao tình trạng thể chế chưa đầy đủ đặt ra trách nhiệm trực tiếp cho Nhà nước?","options":["Nhà nước là chủ thể tạo lập thể chế chính thức, còn năng lực quản lý kinh tế thị trường thể hiện chủ yếu ở việc xây dựng và thực thi thể chế","Doanh nghiệp không chịu sự điều chỉnh của thể chế, vì vậy Nhà nước phải thay từng doanh nghiệp quyết định sản lượng, giá bán và phương thức kinh doanh","Số lượng văn bản càng nhiều thì thể chế tự động đầy đủ, không phụ thuộc chất lượng thực thi","Thị trường chỉ vận hành được khi Nhà nước loại bỏ toàn bộ quyền tự chủ của các chủ thể kinh tế"],"answer":0,"explanation":"Nhà nước quyết định số lượng, chất lượng và tiến trình hoàn thiện thể chế chính thức; vì vậy phải nâng cả năng lực xây dựng lẫn năng lực thực thi.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":169,"text":"Nhà nước là tác giả của thể chế chính thức; trình độ tổ chức và quản lý kinh tế thị trường thể hiện chủ yếu ở năng lực xây dựng, thực thi thể chế."},"num":356},{"id":"C05-Q021","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Hoàn thiện thể chế về quyền tài sản","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Nhóm quyền nào cấu thành quyền tài sản cần được thể chế hóa đầy đủ theo giáo trình?","options":["Quyền cấp phép, quyền thanh tra, quyền thu thuế và quyền xử phạt","Quyền đầu tư, quyền cạnh tranh, quyền xuất khẩu và quyền tuyển dụng lao động trong mọi loại hình doanh nghiệp","Quyền đăng ký, quyền định giá, quyền thế chấp và quyền đấu thầu","Quyền sở hữu, quyền sử dụng, quyền định đoạt và quyền hưởng lợi từ tài sản"],"answer":3,"explanation":"Đây là bốn nội dung của quyền tài sản được giáo trình liệt kê; các nhóm còn lại là hoạt động quản lý hoặc kinh doanh, không phải danh mục quyền tài sản nêu trong nguồn.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":171,"text":"Nhiệm vụ đầu tiên về sở hữu là thể chế hóa đầy đủ quyền sở hữu, sử dụng, định đoạt và hưởng lợi từ tài sản của Nhà nước, tổ chức và cá nhân."},"num":357},{"id":"C05-Q022","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Chế độ pháp lý kinh doanh thống nhất","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Yêu cầu thực hiện nhất quán một chế độ pháp lý kinh doanh cho các doanh nghiệp được hiểu như thế nào?","options":["Doanh nghiệp nhà nước được miễn các quy tắc cạnh tranh áp dụng cho doanh nghiệp khác","Mỗi thành phần kinh tế có một hệ thống pháp luật riêng và không cạnh tranh với nhau","Doanh nghiệp không bị phân biệt theo hình thức sở hữu, cùng hoạt động theo cơ chế thị trường và cạnh tranh lành mạnh theo pháp luật","Doanh nghiệp có vốn nước ngoài được tự chọn quy định pháp luật áp dụng, còn doanh nghiệp trong nước phải tuân theo một chế độ pháp lý khác"],"answer":2,"explanation":"Một chế độ pháp lý thống nhất nhằm bảo đảm bình đẳng và cạnh tranh lành mạnh, không tạo đặc quyền chỉ vì hình thức sở hữu hoặc thành phần kinh tế.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":172,"text":"Mọi doanh nghiệp thuộc các thành phần kinh tế phải hoạt động theo cơ chế thị trường, bình đẳng và cạnh tranh lành mạnh theo pháp luật."},"num":358},{"id":"C05-Q023","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Xóa bỏ rào cản đầu tư và kinh doanh","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Nhiều quy định về điều kiện kinh doanh đang chồng chéo, khiến doanh nghiệp phải xin nhiều giấy phép cho cùng một hoạt động. Giải pháp nào đúng hướng hoàn thiện thể chế?","options":["Bổ sung giấy phép riêng cho mỗi hình thức sở hữu và giữ các điều kiện chồng chéo để dễ phân loại doanh nghiệp","Thay quy định pháp luật bằng quyết định tùy từng trường hợp của cơ quan quản lý","Hoàn thiện pháp luật về đầu tư, kinh doanh và cạnh tranh, đồng thời xóa rào cản và xử lý dứt điểm quy định chồng chéo","Miễn toàn bộ điều kiện kinh doanh cho một số doanh nghiệp được lựa chọn trước"],"answer":2,"explanation":"Giáo trình yêu cầu bảo đảm quyền tự do kinh doanh và cạnh tranh lành mạnh bằng cách xóa rào cản, đồng thời xử lý chồng chéo trong các điều kiện kinh doanh.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":173,"text":"Hoàn thiện pháp luật đầu tư, kinh doanh và cạnh tranh phải gắn với xóa bỏ rào cản và xử lý dứt điểm sự chồng chéo của điều kiện kinh doanh."},"num":359},{"id":"C05-Q024","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Phát triển đồng bộ các yếu tố và loại thị trường","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Cặp nhiệm vụ nào thuộc nội dung hoàn thiện thể chế phát triển đồng bộ các yếu tố và loại thị trường?","options":["Chỉ phát triển thị trường hàng tiêu dùng, còn tạm dừng thị trường vốn, công nghệ và sức lao động cho đến khi thị trường hàng hóa hoàn chỉnh","Hoàn thiện thể chế cho hàng hóa, giá cả, cạnh tranh, cung cầu và phát triển thông suốt các thị trường hàng hóa, vốn, công nghệ, sức lao động","Ấn định mọi mức giá bằng quyết định hành chính và loại bỏ cạnh tranh giữa các chủ thể","Hợp nhất các loại thị trường thành một hệ thống cấp phát nguồn lực ngoài cơ chế cung cầu"],"answer":1,"explanation":"Hoàn thiện đồng bộ đòi hỏi cả các yếu tố cấu thành thị trường lẫn các loại thị trường cơ bản được vận hành theo nguyên tắc thị trường và hỗ trợ lẫn nhau.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":174,"text":"Giáo trình yêu cầu hoàn thiện thể chế cho các yếu tố như hàng hóa, giá cả, cạnh tranh, cung cầu và cho các thị trường hàng hóa, vốn, công nghệ, sức lao động.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":20}},"num":360},{"id":"C05-Q025","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Hoàn thiện thể chế hội nhập kinh tế quốc tế","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Phương án nào kết hợp đúng các yêu cầu hoàn thiện thể chế hội nhập kinh tế quốc tế?","options":["Giảm năng lực cạnh tranh trong nước để ưu tiên tuyệt đối hàng hóa nhập khẩu","Tập trung vào một thị trường duy nhất để giảm chi phí thiết lập quan hệ đối ngoại","Giữ nguyên hệ thống pháp luật trong nước dù không đáp ứng các cam kết quốc tế đã tham gia, vì hội nhập không đòi hỏi điều chỉnh thể chế","Rà soát pháp luật theo cam kết, đa phương hóa hợp tác, nâng năng lực cạnh tranh và khả năng ứng phó biến động bất lợi"],"answer":3,"explanation":"Hội nhập cần đi cùng thực hiện cam kết, tránh lệ thuộc vào ít thị trường và tăng sức cạnh tranh, khả năng bảo vệ lợi ích quốc gia trước biến động bên ngoài.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":175,"text":"Nhiệm vụ hội nhập gồm điều chỉnh pháp luật theo cam kết, đa phương hóa và đa dạng hóa hợp tác, không lệ thuộc ít thị trường và nâng năng lực cạnh tranh."},"num":361},{"id":"C05-Q026","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Vai trò của Đảng, Nhà nước và nhân dân trong hoàn thiện thể chế","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một đề án thể chế kinh tế được xây dựng khép kín trong cơ quan quản lý, không huy động ý kiến và nguồn lực xã hội. Cách điều chỉnh nào phù hợp với giáo trình?","options":["Để tổ chức Đảng trực tiếp thay doanh nghiệp quyết định phương án sản xuất, giá bán và phân bổ nguồn lực trong từng hoạt động kinh doanh","Kết hợp nâng cao vai trò lãnh đạo của Đảng, xây dựng và thực thi của Nhà nước với phát huy quyền làm chủ, trí tuệ và đồng thuận của nhân dân","Rút Nhà nước khỏi quá trình xây dựng thể chế, giao toàn bộ việc đặt ra quy tắc và tổ chức thực thi cho các lực lượng thị trường tự phát","Chỉ lấy ý kiến một số doanh nghiệp lớn, loại các nhóm dân cư và chủ thể khác khỏi quá trình xây dựng vì họ không trực tiếp ban hành thể chế"],"answer":1,"explanation":"Hoàn thiện thể chế là quá trình cần sự lãnh đạo, tổ chức thực hiện và tham gia xã hội; cách làm khép kín không phát huy được sức mạnh và đồng thuận toàn dân.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":176,"text":"Phát triển thành công mô hình đòi hỏi nâng cao năng lực lãnh đạo của Đảng, vai trò của Nhà nước và vai trò làm chủ của nhân dân, phát huy trí tuệ, nguồn lực, đồng thuận toàn dân."},"num":362},{"id":"C05-Q027","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Khái niệm lợi ích","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Theo giáo trình, lợi ích được hiểu như thế nào?","options":["Sự thỏa mãn nhu cầu được nhận thức và đặt trong quan hệ xã hội ứng với một trình độ phát triển nhất định của nền sản xuất","Chỉ là phần thu nhập bằng tiền mà một người nhận được sau hoạt động kinh tế","Mọi mong muốn tự phát của cá nhân, không cần được nhận thức hoặc đặt trong quan hệ xã hội và điều kiện sản xuất cụ thể","Sự từ bỏ nhu cầu cá nhân để thực hiện vô điều kiện mọi yêu cầu của cộng đồng"],"answer":0,"explanation":"Lợi ích không chỉ là cảm giác thỏa mãn riêng lẻ; nó phải được nhận thức và tồn tại trong những quan hệ xã hội, điều kiện sản xuất lịch sử nhất định.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":177,"text":"Lợi ích là sự thỏa mãn nhu cầu đã được nhận thức và đặt trong quan hệ xã hội tương ứng với trình độ phát triển của nền sản xuất.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":22}},"num":363},{"id":"C05-Q028","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Khái niệm lợi ích kinh tế","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Lợi ích kinh tế là loại lợi ích nào?","options":["Lợi ích tinh thần chỉ hình thành từ hoạt động văn hóa, nghệ thuật và không liên quan đến nhu cầu vật chất","Lợi ích vật chất thu được khi con người thực hiện các hoạt động kinh tế","Lợi ích chính trị phát sinh từ việc tham gia quản lý nhà nước","Lợi ích pháp lý có được khi một chủ thể tuân thủ thủ tục hành chính"],"answer":1,"explanation":"Giáo trình xác định trực tiếp lợi ích kinh tế là lợi ích vật chất gắn với việc thực hiện hoạt động kinh tế của con người.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":177,"text":"Lợi ích kinh tế là lợi ích vật chất, thu được khi con người thực hiện các hoạt động kinh tế.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":22}},"num":364},{"id":"C05-Q029","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Bản chất và biểu hiện của lợi ích kinh tế","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Phân biệt nào đúng giữa bản chất và biểu hiện của lợi ích kinh tế?","options":["Bản chất là số tiền cụ thể từng chủ thể nhận được; biểu hiện là toàn bộ quan hệ sản xuất, không phụ thuộc vị trí hoặc vai trò của chủ thể","Bản chất phản ánh mục đích, động cơ trong quan hệ giữa các chủ thể; biểu hiện là lợi nhuận của chủ doanh nghiệp, thu nhập của người lao động","Bản chất là quy định pháp lý về quyền sở hữu; biểu hiện chỉ là nghĩa vụ nộp thuế của chủ thể đối với ngân sách nhà nước","Bản chất chỉ là nhu cầu sinh học của từng cá nhân; biểu hiện giống nhau đối với mọi chủ thể dù họ giữ vị trí kinh tế khác nhau"],"answer":1,"explanation":"Bản chất nói đến nội dung quan hệ xã hội thúc đẩy các chủ thể, còn biểu hiện cụ thể thay đổi theo vị trí và vai trò của từng chủ thể kinh tế.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":177,"text":"Về bản chất, lợi ích kinh tế phản ánh mục đích và động cơ của quan hệ giữa các chủ thể; về biểu hiện, mỗi chủ thể có lợi ích tương ứng như lợi nhuận hoặc thu nhập.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":23}},"num":365},{"id":"C05-Q030","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Lợi ích kinh tế là động lực trực tiếp","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Vai trò trực tiếp của lợi ích kinh tế đối với chủ thể và hoạt động kinh tế - xã hội là gì?","options":["Thúc đẩy trực tiếp các chủ thể hành động để thực hiện nhu cầu vật chất và nâng cao thu nhập chính đáng","Xác lập quyền sở hữu pháp lý của chủ thể và thay thế mọi động cơ tinh thần trong đời sống xã hội","Tự động xóa bỏ mâu thuẫn giữa các chủ thể và tạo ra phân phối công bằng mà không cần điều tiết xã hội","Chỉ làm tăng nhu cầu tiêu dùng cá nhân, không tạo ảnh hưởng đến lao động, sản xuất hoặc phát triển kinh tế"],"answer":0,"explanation":"Nhu cầu vật chất và thu nhập khiến các chủ thể hành động, nên lợi ích kinh tế là động lực trực tiếp của hoạt động kinh tế - xã hội.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":178,"text":"Giáo trình xác định lợi ích kinh tế là động lực trực tiếp của các chủ thể và hoạt động kinh tế - xã hội.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":24}},"num":366},{"id":"C05-Q031","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Lợi ích kinh tế chính đáng và động lực phát triển","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao việc theo đuổi lợi ích kinh tế chính đáng có thể thúc đẩy phát triển lực lượng sản xuất?","options":["Mọi cách tăng lợi nhuận đều được coi là chính đáng, nên chủ thể không cần tuân thủ pháp luật hoặc quan tâm đến lợi ích của người khác","Người lao động nâng tay nghề, doanh nghiệp dùng nguồn lực hiệu quả và cải tiến sản phẩm để tăng thu nhập, qua đó phát triển sản xuất","Thu nhập của các chủ thể hoàn toàn độc lập với số lượng và chất lượng sản phẩm xã hội","Mỗi chủ thể có thể thực hiện lợi ích của mình mà không cần tham gia bất kỳ quan hệ kinh tế nào"],"answer":1,"explanation":"Động cơ thu nhập thúc đẩy lao động, đổi mới và nâng hiệu quả, nhưng chỉ tạo tác động tích cực khi lợi ích được theo đuổi hợp pháp và trong liên hệ với các chủ thể khác.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":179,"text":"Vì lợi ích chính đáng, người lao động nâng tay nghề và doanh nghiệp nâng hiệu quả, chất lượng, mẫu mã, qua đó thúc đẩy lực lượng sản xuất và đời sống."},"num":367},{"id":"C05-Q032","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Khái niệm quan hệ lợi ích kinh tế","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Nội dung nào phản ánh đúng khái niệm quan hệ lợi ích kinh tế?","options":["Tương tác giữa con người, cộng đồng, tổ chức, bộ phận kinh tế và quốc gia nhằm xác lập lợi ích trong điều kiện lịch sử nhất định","Quan hệ trao đổi thông tin không nhằm xác lập bất kỳ lợi ích vật chất nào giữa các chủ thể","Quan hệ kỹ thuật giữa người lao động, máy móc và công cụ trong một quy trình sản xuất, không nhằm xác lập lợi ích giữa các chủ thể xã hội","Quan hệ phát sinh riêng giữa các doanh nghiệp cùng ngành khi họ thỏa thuận một mức giá bán"],"answer":0,"explanation":"Khái niệm có phạm vi chủ thể rộng và đặt việc xác lập lợi ích trong điều kiện lịch sử cụ thể của lực lượng sản xuất và kiến trúc thượng tầng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":181,"text":"Quan hệ lợi ích kinh tế là tương tác giữa nhiều loại chủ thể nhằm xác lập lợi ích kinh tế gắn với lực lượng sản xuất và kiến trúc thượng tầng của một giai đoạn.","slide":{"file":"MLN122. Slot 7+8. Kinh tế thị trường định hướng XHCN và các quan hệ lợi ích KT.pptx.txt","number":25}},"num":368},{"id":"C05-Q033","chapter":"Chương 5 · Slot 7+8: Kinh tế thị trường định hướng XHCN và quan hệ lợi ích","chapterNum":5,"topic":"Các chiều biểu hiện của quan hệ lợi ích kinh tế","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Cách phân loại nào đúng về các biểu hiện của quan hệ lợi ích kinh tế?","options":["Cá n
