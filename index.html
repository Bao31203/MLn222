nh, các vùng và các thành phần kinh tế; là tổng thể của ba loại cơ cấu này."},"num":436},{"id":"C06-Q017","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Khái niệm hội nhập kinh tế quốc tế","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Hội nhập kinh tế quốc tế của một quốc gia được hiểu là quá trình nào?","options":["Chỉ tăng xuất khẩu hàng hóa mà không tham gia bất kỳ quan hệ hay cam kết kinh tế quốc tế nào","Thay thế toàn bộ chính sách kinh tế trong nước bằng quyết định của các tổ chức kinh tế quốc tế","Gắn kết nền kinh tế quốc gia với kinh tế thế giới trên cơ sở chia sẻ lợi ích và tuân thủ các chuẩn mực quốc tế chung","Đóng cửa thị trường trong nước để tích lũy đủ nguồn lực trước khi thiết lập quan hệ với bên ngoài"],"answer":2,"explanation":"Hai thành tố không thể thiếu là gắn kết với kinh tế thế giới trên cơ sở chia sẻ lợi ích và tuân thủ chuẩn mực quốc tế chung.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":233,"text":"Hội nhập kinh tế quốc tế là quá trình một quốc gia gắn kết nền kinh tế của mình với kinh tế thế giới dựa trên chia sẻ lợi ích và tuân thủ chuẩn mực quốc tế chung.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":16}},"num":437},{"id":"C06-Q018","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Tính tất yếu của hội nhập kinh tế quốc tế","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Trong bối cảnh toàn cầu hóa kinh tế, vì sao hội nhập kinh tế quốc tế trở thành tất yếu khách quan?","options":["Vì các nền kinh tế ngày càng gắn vào phân công lao động quốc tế và các yếu tố sản xuất lưu thông trên phạm vi toàn cầu","Vì mỗi quốc gia ngày càng tự bảo đảm đầy đủ mọi điều kiện sản xuất mà không cần quan hệ bên ngoài","Vì toàn cầu hóa làm giảm liên hệ sản xuất, trao đổi và sự phụ thuộc lẫn nhau giữa các quốc gia","Vì hội nhập cho phép một quốc gia thay thế hoàn toàn năng lực sản xuất trong nước bằng nhập khẩu"],"answer":0,"explanation":"Toàn cầu hóa làm tăng phân công lao động, liên hệ sản xuất - trao đổi và sự lưu chuyển toàn cầu của các yếu tố sản xuất, nên các nền kinh tế không thể tách rời.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":234,"text":"Toàn cầu hóa lôi cuốn các nước vào phân công lao động quốc tế, làm các nền kinh tế thành bộ phận hữu cơ của kinh tế toàn cầu và khiến các yếu tố sản xuất lưu thông toàn cầu.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":18}},"num":438},{"id":"C06-Q019","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Mức độ hội nhập kinh tế quốc tế","difficulty":"Nhận biết","kind":"trinh_tu_quan_he","stem":"Trong các mức độ hội nhập kinh tế quốc tế được giáo trình nêu, mức độ nào thấp nhất?","options":["Liên minh thuế quan (CU) giữa các thành viên","Khu vực mậu dịch tự do (FTA) giữa các thành viên","Thị trường chung hay thị trường duy nhất giữa các thành viên","Thỏa thuận thương mại ưu đãi (PTA) giữa các thành viên"],"answer":3,"explanation":"Tiến trình được xếp từ thấp đến cao bắt đầu bằng PTA, sau đó đến FTA, CU, thị trường chung và liên minh kinh tế - tiền tệ.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":236,"text":"Tiến trình hội nhập được chia thành các mức độ từ thấp đến cao, bắt đầu bằng Thỏa thuận thương mại ưu đãi, sau đó là Khu vực mậu dịch tự do."},"num":439},{"id":"C06-Q020","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Khái niệm nền kinh tế độc lập, tự chủ","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Nền kinh tế độc lập, tự chủ được giáo trình xác định như thế nào?","options":["Nền kinh tế không duy trì quan hệ thương mại, đầu tư hay tài chính với bất kỳ quốc gia và tổ chức quốc tế nào","Nền kinh tế không bị chủ thể bên ngoài dùng điều kiện kinh tế để áp đặt đường lối, làm tổn hại chủ quyền và lợi ích dân tộc","Nền kinh tế chỉ tham gia hợp tác khi trình độ phát triển đã ngang bằng các nền kinh tế tiên tiến trên thế giới","Nền kinh tế tự sản xuất mọi hàng hóa, không tiếp nhận vốn, tri thức hay công nghệ từ bất kỳ nguồn lực bên ngoài nào"],"answer":1,"explanation":"Độc lập, tự chủ là không bị lệ thuộc và áp đặt về đường lối, chính sách phát triển; khái niệm này không đồng nghĩa với đóng cửa hoặc tự cung tự cấp.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":250,"text":"Nền kinh tế độc lập, tự chủ không bị lệ thuộc về đường lối, chính sách và không bị dùng điều kiện kinh tế, tài chính, thương mại, viện trợ để áp đặt, làm tổn hại chủ quyền và lợi ích dân tộc.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":29}},"num":440},{"id":"C06-Q021","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Phân biệt bốn cuộc cách mạng công nghiệp","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Phương án nào ghép đúng bốn cuộc cách mạng công nghiệp với đặc trưng cốt lõi theo thứ tự từ lần thứ nhất đến lần thứ tư?","options":["Công nghệ thông tin để tự động hóa; điện để sản xuất hàng loạt; nước và hơi nước để cơ khí hóa; liên kết thực - ảo","Điện để sản xuất hàng loạt; nước và hơi nước để cơ khí hóa; liên kết thực - ảo; công nghệ thông tin để tự động hóa","Nước và hơi nước để cơ khí hóa; công nghệ thông tin để tự động hóa; điện để sản xuất hàng loạt; liên kết thực - ảo","Nước và hơi nước để cơ khí hóa; điện để sản xuất hàng loạt; công nghệ thông tin để tự động hóa; liên kết thực - ảo để làm việc thông minh"],"answer":3,"explanation":"Trình tự đúng là cơ khí hóa bằng nước - hơi nước, điện khí hóa và sản xuất hàng loạt, tự động hóa bằng CNTT, rồi liên kết thế giới thực - ảo.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":205,"text":"Hộp 6.1 lần lượt tóm tắt bốn cuộc cách mạng bằng cơ khí hóa với nước và hơi nước, sản xuất hàng loạt với điện, tự động hóa với CNTT và liên kết thực - ảo.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":4}},"num":441},{"id":"C06-Q022","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Cách mạng công nghiệp và lực lượng sản xuất","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Vì sao Cách mạng công nghiệp lần thứ tư có thể làm suy giảm lợi thế truyền thống về nhân công rẻ và tài nguyên của một nước đang phát triển?","options":["Vì công nghệ mới làm cho mọi quốc gia có trữ lượng tài nguyên và số lao động hoàn toàn giống nhau","Vì cuộc cách mạng này buộc mọi ngành phải ngừng sử dụng lao động và nguyên liệu trong nước","Vì tự động hóa làm cho tri thức và công nghệ không còn tham gia vào quá trình tạo ra của cải","Vì của cải ngày càng phụ thuộc nhiều vào khoa học, kỹ thuật và đổi mới hơn là chỉ vào lao động rẻ hay tài nguyên"],"answer":3,"explanation":"Khi khoa học và công nghệ trở thành sức mạnh sản xuất trực tiếp, ưu thế chỉ dựa vào lao động rẻ hoặc tài nguyên không còn đủ để bảo đảm năng lực cạnh tranh.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":207,"text":"Đột phá của Cách mạng công nghiệp lần thứ tư làm mất dần lợi thế sản xuất truyền thống của các nước đang phát triển như nhân công rẻ, dồi dào hoặc nhiều tài nguyên."},"num":442},{"id":"C06-Q023","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Cách mạng công nghiệp và quan hệ sản xuất","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Việc tư bản phải liên kết dưới hình thức công ty cổ phần khi sở hữu tư nhân riêng lẻ không còn đáp ứng quy mô sản xuất thể hiện tác động nào của cách mạng công nghiệp?","options":["Thúc đẩy điều chỉnh quan hệ sở hữu để quan hệ sản xuất thích ứng với lực lượng sản xuất","Làm thay đổi nhu cầu tiêu dùng bằng cách tăng số lượng sản phẩm trên thị trường","Làm thay đổi đối tượng lao động bằng cách mở rộng khai thác tài nguyên thiên nhiên","Thúc đẩy chuyển giao quyền quản trị nhà nước cho các tổ chức kinh tế quốc tế"],"answer":0,"explanation":"Công ty cổ phần mở rộng chủ thể sở hữu tư bản, là ví dụ về sự điều chỉnh quan hệ sở hữu trước yêu cầu của lực lượng sản xuất phát triển.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":210,"text":"Khi sở hữu tư nhân không đáp ứng nhu cầu sản xuất và cải tiến kỹ thuật, tư bản liên kết thành công ty cổ phần, mở rộng chủ thể sở hữu tư bản."},"num":443},{"id":"C06-Q024","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Cách mạng công nghiệp và quản trị phát triển","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Việc nhà nước dùng hạ tầng số để người dân tham gia rộng hơn vào hoạch định chính sách và tối ưu hóa giám sát xã hội minh họa rõ nhất vai trò nào của cách mạng công nghiệp?","options":["Đổi mới phương thức quản trị và điều hành phát triển","Mở rộng tích tụ tư bản trong ngành chế tạo máy","Chuyển dịch cơ cấu tiêu dùng từ hàng hóa sang dịch vụ","Thay đổi đối tượng lao động của ngành khai khoáng"],"answer":0,"explanation":"Hạ tầng số, chính phủ điện tử và sự tham gia rộng hơn của người dân là biểu hiện trực tiếp của đổi mới quản trị nhà nước.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":213,"text":"Cách mạng công nghiệp lần thứ tư làm quản trị nhà nước dựa trên hạ tầng số, mở rộng sự tham gia hoạch định chính sách và tối ưu hóa giám sát, điều hành xã hội.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":9}},"num":444},{"id":"C06-Q025","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"So sánh các mô hình công nghiệp hóa","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Nhận định nào phân biệt đúng mô hình công nghiệp hóa cổ điển với mô hình kiểu Liên Xô?","options":["Mô hình cổ điển ưu tiên công nghiệp nặng bằng mệnh lệnh; mô hình Liên Xô bắt đầu từ dệt và tích lũy theo thị trường","Mô hình cổ điển kéo dài 60 - 80 năm; mô hình Liên Xô tập trung nguồn lực để ưu tiên công nghiệp nặng trong thời gian ngắn","Cả hai mô hình đều dựa vào xuất khẩu, chuyển giao công nghệ và vốn nước ngoài để rút ngắn còn 20 - 30 năm","Cả hai mô hình đều bắt đầu bằng công nghiệp nhẹ và không sử dụng vai trò phân bổ nguồn lực của nhà nước"],"answer":1,"explanation":"Cổ điển là quá trình dài; kiểu Liên Xô tập trung nguồn lực xã hội qua kế hoạch hóa để xây dựng nhanh công nghiệp nặng và cơ sở vật chất - kỹ thuật.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":218,"text":"Công nghiệp hóa cổ điển kéo dài 60 - 80 năm, còn mô hình Liên Xô huy động nguồn lực lớn qua kế hoạch hóa tập trung để ưu tiên công nghiệp nặng và đạt mục tiêu trong thời gian ngắn.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":11}},"num":445},{"id":"C06-Q026","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Con đường phát triển công nghệ của Nhật Bản và NICs","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Con đường phát triển khoa học - công nghệ mà Nhật Bản và NICs sử dụng để công nghiệp hóa có ưu điểm cốt lõi nào?","options":["Kết hợp công nghệ truyền thống và hiện đại, tự nghiên cứu với nhận chuyển giao để vừa bền vững vừa đi tắt","Chỉ tự nghiên cứu tuần tự từ thấp đến cao nên hoàn toàn tránh được thời gian dài và tổn thất thử nghiệm","Chỉ nhận chuyển giao công nghệ nên loại bỏ được nhu cầu vốn, ngoại tệ và sự phụ thuộc bên ngoài","Chỉ nhập sản phẩm hoàn chỉnh nên đồng thời hình thành được năng lực nghiên cứu và tự chủ công nghệ trong nước"],"answer":0,"explanation":"Con đường thứ ba kết hợp nhiều tầng công nghệ và cả tự nghiên cứu lẫn chuyển giao, nhờ đó dung hòa yêu cầu bền vững với yêu cầu rút ngắn.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":220,"text":"Nhật Bản và NICs kết hợp công nghệ truyền thống, hiện đại, tự nghiên cứu và nhận chuyển giao; đây là con đường vừa lâu dài, vững chắc vừa cho phép đi tắt, bám đuổi."},"num":446},{"id":"C06-Q027","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Tính tất yếu riêng của công nghiệp hóa ở Việt Nam","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Điểm nào thể hiện lý do riêng của một nước có nền kinh tế kém phát triển quá độ lên chủ nghĩa xã hội như Việt Nam phải công nghiệp hóa, hiện đại hóa?","options":["Phải xây dựng từ đầu cơ sở vật chất - kỹ thuật cho chủ nghĩa xã hội thông qua công nghiệp hóa, hiện đại hóa","Phải loại bỏ nguồn lực quốc tế để tự xây dựng toàn bộ cơ sở vật chất - kỹ thuật bằng nguồn lực trong nước","Phải lặp nguyên vẹn mô hình cổ điển để xây dựng cơ sở vật chất - kỹ thuật theo đúng trình tự của nước Anh","Phải hoàn thiện trước toàn bộ quan hệ sản xuất rồi mới bắt đầu phát triển lực lượng sản xuất hiện đại"],"answer":0,"explanation":"Do xuất phát điểm kém phát triển, Việt Nam phải tạo dựng cơ sở vật chất - kỹ thuật hiện đại thông qua công nghiệp hóa, đồng thời củng cố quan hệ sản xuất xã hội chủ nghĩa.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":222,"text":"Nước có kinh tế kém phát triển quá độ lên chủ nghĩa xã hội phải xây dựng cơ sở vật chất - kỹ thuật từ đầu thông qua công nghiệp hóa, hiện đại hóa, phát triển lực lượng sản xuất và hoàn thiện quan hệ sản xuất."},"num":447},{"id":"C06-Q028","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Bối cảnh công nghiệp hóa, hiện đại hóa ở Việt Nam","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Một chính sách vừa sử dụng cơ chế thị trường định hướng xã hội chủ nghĩa, vừa chủ động thu hút tri thức và nguồn lực quốc tế phản ánh đúng đặc điểm nào của công nghiệp hóa, hiện đại hóa ở Việt Nam?","options":["Công nghiệp hóa tách khỏi thể chế kinh tế và chỉ dựa trên mệnh lệnh hành chính","Công nghiệp hóa diễn ra trong kinh tế thị trường định hướng xã hội chủ nghĩa và chủ động hội nhập quốc tế","Công nghiệp hóa phải hoàn tất trước khi phát triển kinh tế tri thức và mở cửa nền kinh tế","Công nghiệp hóa chỉ hướng vào thị trường trong nước và hạn chế phân công lao động quốc tế"],"answer":1,"explanation":"Chính sách nêu đồng thời hai đặc điểm: thực hiện trong kinh tế thị trường định hướng xã hội chủ nghĩa và trong bối cảnh toàn cầu hóa, hội nhập chủ động.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":223,"text":"Công nghiệp hóa, hiện đại hóa ở Việt Nam diễn ra trong điều kiện kinh tế thị trường định hướng xã hội chủ nghĩa và bối cảnh toàn cầu hóa, chủ động hội nhập kinh tế quốc tế.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":13}},"num":448},{"id":"C06-Q029","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Ứng dụng khoa học - công nghệ trong công nghiệp hóa","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Nguyên tắc nào phù hợp với yêu cầu ứng dụng khoa học - công nghệ trong công nghiệp hóa, hiện đại hóa ở Việt Nam?","options":["Lựa chọn công nghệ theo khả năng, trình độ và điều kiện từng giai đoạn; không nóng vội nhưng cũng không trì hoãn","Áp dụng ngay mọi công nghệ mới vào tất cả ngành và vùng, không cần xét khả năng hấp thụ hay hiệu quả","Chờ đến khi tự nghiên cứu được toàn bộ công nghệ hiện đại rồi mới cơ giới hóa các ngành còn lạc hậu","Chỉ duy trì công nghệ truyền thống để tránh mọi rủi ro do đổi mới và chuyển giao công nghệ"],"answer":0,"explanation":"Ứng dụng phải chủ động nhưng có lựa chọn theo điều kiện thực tế; cả chủ quan nóng vội lẫn trì hoãn, cản trở đều không phù hợp.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":225,"text":"Ứng dụng khoa học - công nghệ phải phù hợp khả năng, trình độ và điều kiện từng giai đoạn, không chủ quan nóng vội cũng không trì hoãn, cản trở."},"num":449},{"id":"C06-Q030","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Ngành kinh tế dựa vào tri thức","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Một ngành nông nghiệp truyền thống ứng dụng công nghệ sinh học, dữ liệu và tự động hóa ở trình độ cao được xem xét thế nào trong kinh tế tri thức?","options":["Không thể thuộc kinh tế tri thức vì chỉ các ngành hoàn toàn mới mới dựa vào tri thức","Có thể trở thành ngành dựa vào tri thức vì ngành truyền thống cũng có thể ứng dụng khoa học - công nghệ cao","Chỉ thuộc kinh tế tri thức khi ngừng tạo ra sản phẩm vật chất và chuyển hoàn toàn sang dịch vụ","Chỉ thuộc kinh tế tri thức khi không còn sử dụng bất kỳ lao động hay tư liệu sản xuất nào"],"answer":1,"explanation":"Kinh tế tri thức không chỉ gồm ngành công nghệ mới; nông nghiệp, công nghiệp và dịch vụ truyền thống đều có thể trở thành ngành dựa vào tri thức nhờ công nghệ cao.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":226,"text":"Ngành dựa vào tri thức có thể là ngành công nghệ cao mới hoặc ngành truyền thống như nông nghiệp, công nghiệp, dịch vụ được ứng dụng khoa học - công nghệ cao."},"num":450},{"id":"C06-Q031","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Yêu cầu của cơ cấu kinh tế hiện đại","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Phương án nào thể hiện đầy đủ nhất yêu cầu đối với một cơ cấu kinh tế hợp lý, hiện đại và hiệu quả?","options":["Phát huy nguồn lực trong và ngoài nước, cho phép ứng dụng công nghệ mới và phù hợp xu thế hội nhập","Chỉ tăng tỷ trọng công nghiệp, không cần xét khả năng ứng dụng công nghệ hay xu thế hội nhập","Chỉ khai thác tối đa nguồn lực trong nước và hạn chế nguồn lực bên ngoài để tránh cạnh tranh","Phân bổ đồng đều mọi nguồn lực cho mọi ngành, vùng mà không dựa trên thế mạnh hay phân công lao động"],"answer":0,"explanation":"Ba yêu cầu gắn nhau: phát huy nguồn lực trong và ngoài nước, tiếp nhận công nghệ hiện đại và phù hợp xu thế phát triển cùng hội nhập quốc tế.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":228,"text":"Cơ cấu hợp lý phải phát huy nguồn lực trong nước, thu hút nguồn lực ngoài nước, cho phép ứng dụng công nghệ hiện đại và phù hợp xu thế toàn cầu hóa, hội nhập."},"num":451},{"id":"C06-Q032","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Hoàn thiện quan hệ sản xuất","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Trong công nghiệp hóa, hiện đại hóa, hoàn thiện quan hệ sản xuất phù hợp với lực lượng sản xuất bao gồm những quan hệ chủ yếu nào?","options":["Quan hệ giữa công nghiệp, nông nghiệp và dịch vụ trong cơ cấu GDP","Quan hệ giữa thị trường trong nước, thị trường khu vực và thị trường toàn cầu","Quan hệ giữa công nghệ truyền thống, công nghệ hiện đại và công nghệ nhập khẩu","Quan hệ sở hữu, quan hệ phân phối, quan hệ quản lý và phân bổ nguồn lực"],"answer":3,"explanation":"Hoàn thiện quan hệ sản xuất tập trung vào sở hữu, phân phối, quản lý và cách phân bổ nguồn lực để tạo động lực và giải phóng sức sáng tạo.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":229,"text":"Cần thường xuyên hoàn thiện quan hệ sở hữu, phân phối, quản lý và phân bổ nguồn lực theo hướng tạo động lực phát triển, giải phóng sức sáng tạo."},"num":452},{"id":"C06-Q033","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Thể chế đổi mới sáng tạo trong bối cảnh 4.0","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Giải pháp nào trực tiếp thuộc nội dung hoàn thiện thể chế, xây dựng nền kinh tế dựa trên nền tảng đổi mới sáng tạo?","options":["Chỉ mở rộng khai thác tài nguyên để bù đắp khoảng cách công nghệ với các nước phát triển","Xây dựng hệ thống đổi mới sáng tạo quốc gia, cải thiện khung pháp lý và liên kết trường, viện với mạng lưới tri thức","Thay toàn bộ hoạt động nghiên cứu trong nước bằng nhập khẩu sản phẩm công nghệ hoàn chỉnh","Duy trì cơ chế quản lý cũ và tách doanh nghiệp khỏi các trung tâm nghiên cứu để giảm chi phí phối hợp"],"answer":1,"explanation":"Nền tảng đổi mới sáng tạo đòi hỏi đồng thời hệ thống quốc gia, khung pháp lý, vốn con người và liên kết giữa doanh nghiệp, trường, viện cùng mạng lưới tri thức toàn cầu.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":229,"text":"Thích ứng 4.0 cần xây dựng hệ thống đổi mới sáng tạo quốc gia, cải thiện khung pháp lý, tăng vốn con người và phát huy liên kết trường, viện, trung tâm nghiên cứu với mạng lưới tri thức toàn cầu."},"num":453},{"id":"C06-Q034","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Doanh nghiệp thích ứng Cách mạng công nghiệp lần thứ tư","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Tổ hợp hành động nào phù hợp nhất để doanh nghiệp thích ứng với Cách mạng công nghiệp lần thứ tư?","options":["Giữ nguyên mô hình kinh doanh, tăng lao động phổ thông và giảm kết nối dữ liệu để tiết kiệm chi phí","Tự động hóa sản xuất, tin học hóa quản lý, phát triển kỹ năng, chuỗi cung ứng thông minh và an ninh mạng","Chỉ mua thêm máy móc cơ khí, không thay đổi kỹ năng, quản lý hay chuỗi cung ứng","Ngừng kết nối với đối tác bên ngoài và loại bỏ phần mềm khỏi quy trình quản trị, bán hàng"],"answer":1,"explanation":"Thích ứng 4.0 là thay đổi đồng bộ công nghệ sản xuất, quản lý, kỹ năng, chuỗi cung ứng và an ninh mạng, không chỉ mua thiết bị đơn lẻ.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":230,"text":"Doanh nghiệp cần tối ưu mô hình kinh doanh, tự động hóa dây chuyền, tin học hóa quản lý, phát triển kỹ năng mới, chuỗi cung ứng thông minh và an ninh mạng."},"num":454},{"id":"C06-Q035","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Nguồn nhân lực trong bối cảnh 4.0","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Vì sao phát triển nguồn nhân lực, đặc biệt nguồn nhân lực chất lượng cao, là nội dung đặc biệt quan trọng khi thích ứng với Cách mạng công nghiệp lần thứ tư?","options":["Vì nguồn nhân lực đông sẽ tự động bù đắp mọi hạn chế về thể chế, hạ tầng và công nghệ","Vì công nghệ mới loại bỏ nhu cầu học tập, nghiên cứu và phối hợp giữa cơ sở đào tạo với doanh nghiệp","Vì chỉ nguồn nhân lực trong cơ quan nhà nước mới tham gia vào quá trình công nghiệp hóa, hiện đại hóa","Vì con người quyết định khả năng thích ứng, nên phải đổi mới giáo dục, nghiên cứu và chính sách sử dụng nhân tài"],"answer":3,"explanation":"Công nghệ không tự tạo ra năng lực thích ứng; con người là chủ thể quyết định, nên chất lượng giáo dục, nghiên cứu và liên kết đào tạo - doanh nghiệp phải được nâng cao.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":232,"text":"Trong thích ứng với Cách mạng công nghiệp lần thứ tư, con người giữ vai trò quyết định; vì vậy phải đổi mới giáo dục, quy hoạch đào tạo, tăng đầu tư và gắn nghiên cứu, đào tạo với doanh nghiệp."},"num":455},{"id":"C06-Q036","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Chuẩn bị điều kiện hội nhập kinh tế quốc tế","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Nhận định “hội nhập không phải bằng mọi giá” hàm ý yêu cầu nào đối với Việt Nam?","options":["Tham gia mọi cam kết ngay lập tức để đạt mức hội nhập cao nhất, không cần đánh giá năng lực trong nước","Trì hoãn hội nhập cho đến khi nền kinh tế trong nước không còn bất kỳ hạn chế hay rủi ro nào","Cân nhắc lộ trình và cách thức tối ưu, đồng thời chuẩn bị điều kiện nội bộ nền kinh tế và quan hệ quốc tế phù hợp","Chỉ chuẩn bị đàm phán đối ngoại, còn tư duy, thể chế, nhân lực và năng lực sản xuất trong nước không cần thay đổi"],"answer":2,"explanation":"Tính tất yếu của hội nhập không loại bỏ yêu cầu lựa chọn; hiệu quả phụ thuộc vào lộ trình và sự sẵn sàng về tư duy, thể chế, nhân lực, năng lực sản xuất cùng quan hệ đối ngoại.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":236,"text":"Hội nhập không phải bằng mọi giá mà phải cân nhắc lộ trình, cách thức tối ưu và chuẩn bị điều kiện nội bộ cũng như quan hệ quốc tế thích hợp.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":20}},"num":456},{"id":"C06-Q037","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Tác động tích cực của hội nhập đối với doanh nghiệp","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Hội nhập kinh tế quốc tế có thể nâng cao năng lực cạnh tranh của doanh nghiệp trong nước qua cơ chế nào?","options":["Bảo đảm mọi doanh nghiệp đều có lợi như nhau mà không cần đổi mới công nghệ hay quản trị","Loại bỏ hoàn toàn cạnh tranh từ doanh nghiệp nước ngoài trên thị trường trong nước","Mở cơ hội tiếp cận thị trường, tín dụng, đối tác, công nghệ sản xuất và phương thức quản trị quốc tế","Thay thế năng lực sản xuất của doanh nghiệp bằng việc nhập khẩu toàn bộ hàng hóa hoàn chỉnh"],"answer":2,"explanation":"Lợi ích đến từ khả năng tiếp cận nguồn lực và tri thức mới để doanh nghiệp tự đổi mới, chứ hội nhập không xóa cạnh tranh hay tự động bảo đảm thành công.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":238,"text":"Hội nhập giúp doanh nghiệp tiếp cận thị trường quốc tế, tín dụng, đối tác, công nghệ sản xuất và phương thức quản trị để nâng cao năng lực cạnh tranh.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":21}},"num":457},{"id":"C06-Q038","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Hội nhập và chất lượng nguồn nhân lực","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Hội nhập kinh tế quốc tế góp phần nâng cao chất lượng nguồn nhân lực chủ yếu bằng cách nào?","options":["Mở rộng hợp tác đào tạo, nghiên cứu và tiếp thu công nghệ qua đầu tư, chuyển giao","Giảm hợp tác đào tạo để nguồn nhân lực chỉ học từ kinh nghiệm sản xuất trong nước","Thay lực lượng lao động trong nước bằng lao động nước ngoài ở tất cả ngành kinh tế","Chỉ tăng số văn bằng mà không gắn đào tạo với năng lực hấp thụ khoa học - công nghệ"],"answer":0,"explanation":"Hợp tác giáo dục - nghiên cứu và tiếp nhận công nghệ làm tăng trình độ nhân lực, tiềm lực khoa học và năng lực hấp thụ công nghệ hiện đại.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":239,"text":"Hội nhập nâng cao nguồn nhân lực và tiềm lực khoa học - công nghệ nhờ hợp tác giáo dục, đào tạo, nghiên cứu và tiếp thu công nghệ qua đầu tư trực tiếp, chuyển giao."},"num":458},{"id":"C06-Q039","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Tác động tiêu cực đến cơ cấu kinh tế","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Việc một nước đang phát triển tập trung kéo dài vào ngành dùng nhiều tài nguyên, nhiều lao động nhưng giá trị gia tăng thấp phản ánh nguy cơ nào của hội nhập?","options":["Cơ cấu kinh tế tự động chuyển sang ngành công nghệ cao và giành vị trí thuận lợi hơn trong chuỗi giá trị toàn cầu","Lợi ích và rủi ro của hội nhập được phân phối đồng đều giữa mọi ngành, mọi vùng và mọi nhóm xã hội","Cơ cấu chuyển dịch bất lợi, nền kinh tế ở khâu giá trị thấp và phải chịu cạn kiệt tài nguyên, ô nhiễm môi trường","Nền kinh tế giảm dần phụ thuộc thị trường bên ngoài nhờ kéo dài chuyên môn hóa trong một số ít ngành"],"answer":2,"explanation":"Chuyên môn hóa thụ động vào ngành tài nguyên và lao động giá trị thấp có thể khóa nền kinh tế ở khâu bất lợi, đồng thời gây cạn kiệt tài nguyên và ô nhiễm.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":240,"text":"Hội nhập có thể gây chuyển dịch cơ cấu tự nhiên bất lợi sang ngành dùng nhiều tài nguyên, lao động nhưng giá trị thấp, làm nước đang phát triển thua thiệt trong chuỗi giá trị và tổn hại môi trường.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":22}},"num":459},{"id":"C06-Q040","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Nhận thức về thời cơ và thách thức của hội nhập","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Nhận thức nào tạo cơ sở đúng để xây dựng đối sách hội nhập kinh tế quốc tế phù hợp?","options":["Hội nhập chỉ tạo thuận lợi, nên cần tối đa hóa tốc độ và không cần chuẩn bị đối sách với rủi ro phát sinh","Hội nhập chỉ gây sức ép cạnh tranh, nên cần trì hoãn cho đến khi nền kinh tế không còn bất kỳ hạn chế nào","Hội nhập là lựa chọn có thể né tránh, nên đứng ngoài dòng chảy quốc tế là cách bảo đảm phát triển bền vững","Hội nhập là xu thế khách quan và tác động đa chiều; cần coi mặt tích cực là cơ bản nhưng nhận diện đầy đủ mặt trái"],"answer":3,"explanation":"Nhận thức đúng không tuyệt đối hóa cơ hội hoặc rủi ro: hội nhập là xu thế khách quan, mặt tích cực là cơ bản nhưng các tác động tiêu cực vẫn phải được nhận diện để có đối sách.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":242,"text":"Cần nhận thức hội nhập là xu thế khách quan, thấy rõ tác động đa chiều, coi mặt thuận lợi là cơ bản nhưng đồng thời nhận diện các sức ép cạnh tranh và rủi ro kinh tế, chính trị, an ninh, văn hóa.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":24}},"num":460},{"id":"C06-Q041","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Nhận diện mô hình công nghiệp hóa","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một quốc gia bắt đầu công nghiệp hóa bằng ngành dệt cần ít vốn, thu lợi nhanh; sự phát triển của dệt kéo theo vùng nguyên liệu rồi tạo nhu cầu cho cơ khí chế tạo máy. Quốc gia này đang đi theo mô hình nào?","options":["Mô hình công nghiệp hóa tập trung theo kiểu Liên Xô","Mô hình công nghiệp hóa cổ điển của các nước tư bản","Mô hình công nghiệp hóa rút ngắn của Nhật Bản và NICs","Mô hình công nghiệp hóa chỉ dựa vào chuyển giao công nghệ"],"answer":1,"explanation":"Trình tự từ công nghiệp nhẹ, trực tiếp là dệt, rồi tạo tiền đề cho công nghiệp nặng là đặc trưng của con đường công nghiệp hóa cổ điển ở Anh.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":217,"text":"Công nghiệp hóa cổ điển ở Anh bắt đầu từ dệt vì cần ít vốn, lợi nhuận nhanh; dệt thúc đẩy vùng nguyên liệu và tạo tiền đề cho cơ khí chế tạo máy."},"num":461},{"id":"C06-Q042","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Ứng dụng Cách mạng công nghiệp lần thứ tư trong doanh nghiệp","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một nhà máy đồng thời tự động hóa dây chuyền, số hóa quản lý, đào tạo kỹ năng mới, kết nối chuỗi cung ứng thông minh và đầu tư an ninh mạng. Hướng xử lý này phù hợp nhất với yêu cầu nào?","options":["Duy trì mô hình sản xuất cơ khí cũ để tránh thay đổi tổ chức","Nắm bắt, ứng dụng thành tựu 4.0 để tối ưu mô hình kinh doanh và nâng sức cạnh tranh","Chuyển toàn bộ nguồn lực sang công nghiệp nặng theo cơ chế kế hoạch hóa tập trung","Tách hoạt động sản xuất khỏi dữ liệu và các mạng liên kết bên ngoài"],"answer":1,"explanation":"Các hành động phối hợp đúng với yêu cầu tối ưu mô hình kinh doanh của doanh nghiệp trong bối cảnh 4.0, từ sản xuất và quản lý đến kỹ năng, chuỗi cung ứng và an ninh.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":230,"text":"Thích ứng 4.0 đòi hỏi doanh nghiệp tăng tự động hóa, tin học hóa quản lý, phát triển kỹ năng, chuỗi cung ứng thông minh và an ninh mạng để nâng sức cạnh tranh."},"num":462},{"id":"C06-Q043","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Thực hiện cam kết hội nhập","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một quốc gia thành viên thực hiện nghiêm túc các cam kết về thuế quan, dịch vụ và đầu tư trong những liên kết đã tham gia. Theo giáo trình, kết quả trực tiếp phù hợp nhất là gì?","options":["Loại bỏ hoàn toàn sức ép cạnh tranh đối với mọi doanh nghiệp trong nước","Không còn cần hoàn thiện thể chế và pháp luật kinh tế trong nước","Có thể rút khỏi các cơ chế liên kết chung mà vẫn giữ nguyên mọi lợi ích thành viên","Nâng cao uy tín, tạo sự tin cậy của cộng đồng quốc tế và nâng tầm hội nhập"],"answer":3,"explanation":"Thực hiện đầy đủ cam kết tạo độ tin cậy và tôn trọng, qua đó nâng cao uy tín, vai trò và tầm mức tham gia của quốc gia trong các liên kết.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":247,"text":"Tham gia tích cực và thực hiện nghiêm túc cam kết giúp nâng cao uy tín, vai trò của Việt Nam, tạo sự tin cậy, tôn trọng và nâng tầm hội nhập quốc tế.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":26}},"num":463},{"id":"C06-Q044","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Chiến lược và lộ trình hội nhập","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Khi chuẩn bị một hiệp định mới, cơ quan hoạch định xác định rõ thời gian, mức độ, bước đi từng giai đoạn, ngành ưu tiên và cơ chế điều chỉnh theo biến động trong và ngoài nước. Cách làm này thực hiện phương hướng nào?","options":["Xây dựng chiến lược và lộ trình hội nhập hợp lý, linh hoạt, phù hợp năng lực thực tế","Chỉ thực hiện các cam kết đã ký mà không xây dựng định hướng mới","Chỉ hoàn thiện pháp luật trong nước mà không đánh giá tiến trình bên ngoài","Chỉ nâng cao nhận thức chung về mặt tích cực của hội nhập"],"answer":0,"explanation":"Thời gian, mức độ, bước đi, lĩnh vực ưu tiên và khả năng điều chỉnh là các thành tố cụ thể của một lộ trình hội nhập hợp lý nhằm tránh cú sốc không cần thiết.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":245,"text":"Lộ trình hội nhập phải xác định thời gian, mức độ, bước đi từng giai đoạn, bám sát tiến triển bên trong và bên ngoài, đồng thời xác định ngành, lĩnh vực ưu tiên.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":25}},"num":464},{"id":"C06-Q045","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Hoàn thiện thể chế và pháp luật hội nhập","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Doanh nghiệp gặp thủ tục thiếu minh bạch, môi trường cạnh tranh chưa bình đẳng và quy định đầu tư, thương mại không đồng bộ với cam kết quốc tế. Giải pháp phù hợp nhất là gì?","options":["Hoàn thiện cơ chế thị trường, cải cách quản lý hành chính minh bạch và rà soát pháp luật liên quan để phù hợp chuẩn mực quốc tế","Tăng can thiệp trực tiếp vào mọi quyết định kinh doanh và duy trì các quy định không đồng bộ để bảo vệ thị trường","Chỉ trợ cấp một số doanh nghiệp, không thay đổi môi trường cạnh tranh hay hệ thống pháp luật","Hoãn hoàn thiện luật pháp cho đến khi kết thúc toàn bộ quá trình hội nhập kinh tế quốc tế"],"answer":0,"explanation":"Tình huống đồng thời đặt ra vấn đề thể chế thị trường, quản lý nhà nước và pháp luật; vì vậy phải xử lý đồng bộ cả cạnh tranh, minh bạch thủ tục và tương thích pháp lý.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":248,"text":"Nâng hiệu quả hội nhập cần hoàn thiện cơ chế thị trường, đổi mới quản lý nhà nước theo hướng minh bạch và rà soát pháp luật đầu tư, thương mại, doanh nghiệp, thuế, tài chính phù hợp luật pháp quốc tế.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":27}},"num":465},{"id":"C06-Q046","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Nâng cao năng lực cạnh tranh quốc tế","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một ngành xuất khẩu mất thị phần do công nghệ lạc hậu, nhân lực yếu, chi phí hạ tầng cao và doanh nghiệp thiếu kỹ năng quản trị quốc tế. Gói giải pháp nào sát nhất với giáo trình?","options":["Doanh nghiệp giữ công nghệ cũ; Nhà nước bù lỗ và bảo hộ thay cho cải thiện năng suất","Doanh nghiệp chỉ giảm lương; Nhà nước cắt đào tạo và không đầu tư hạ tầng để giảm chi phí","Doanh nghiệp đổi mới công nghệ, quản trị; Nhà nước hỗ trợ nhân lực, hạ tầng và kiến thức pháp lý quốc tế","Doanh nghiệp rút khỏi xuất khẩu; Nhà nước hạn chế thu hút vốn, công nghệ và kinh nghiệm quốc tế"],"answer":2,"explanation":"Năng lực cạnh tranh cần nỗ lực từ doanh nghiệp về đầu tư, công nghệ, quản trị và hỗ trợ kiến tạo của Nhà nước về nhân lực, hạ tầng, kỹ năng và luật quốc tế.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":249,"text":"Doanh nghiệp phải đầu tư, cải tiến công nghệ và học cách kinh doanh mới; Nhà nước hỗ trợ nhân lực chất lượng cao, kỹ năng hội nhập, luật quốc tế và hạ tầng để giảm chi phí, tăng năng suất.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":28}},"num":466},{"id":"C06-Q047","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Rủi ro phụ thuộc thị trường bên ngoài","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một nền kinh tế tập trung phần lớn xuất khẩu vào một thị trường. Khi thị trường đó biến động, sản xuất và việc làm trong nước suy giảm mạnh. Tình huống này thể hiện rõ nhất tác động tiêu cực nào của hội nhập?","options":["Phân phối lợi ích và rủi ro không công bằng giữa các nhóm xã hội trong nước","Gia tăng phụ thuộc vào thị trường ngoài và dễ tổn thương trước biến động quốc tế","Bản sắc văn hóa dân tộc bị xói mòn trước ảnh hưởng của văn hóa nước ngoài","Gia tăng khủng bố, buôn lậu, tội phạm xuyên quốc gia và nhập cư bất hợp pháp"],"answer":1,"explanation":"Nguyên nhân trực tiếp của cú sốc là mức độ tập trung và lệ thuộc vào một thị trường bên ngoài, khiến nền kinh tế trong nước dễ bị tổn thương khi thị trường đó biến động.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":240,"text":"Hội nhập có thể làm nền kinh tế phụ thuộc hơn vào thị trường bên ngoài và dễ tổn thương trước biến động chính trị, kinh tế, thị trường quốc tế.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":22}},"num":467},{"id":"C06-Q048","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Quan hệ giữa độc lập, tự chủ và hội nhập quốc tế","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một đề xuất cho rằng muốn giữ độc lập, tự chủ thì Việt Nam nên đóng cửa nền kinh tế và hạn chế tối đa quan hệ quốc tế. Đánh giá nào phù hợp với giáo trình?","options":["Sai, vì tự chủ không phải biệt lập; phải phát huy nội lực đồng thời chủ động, tích cực hội nhập","Đúng, vì tự cung tự cấp là tiêu chí duy nhất của nền kinh tế độc lập, tự chủ","Sai, vì hội nhập phải thay thế hoàn toàn mục tiêu độc lập, tự chủ trong phát triển","Đúng, vì mọi quan hệ kinh tế quốc tế đều tất yếu làm mất chủ quyền quốc gia"],"answer":0,"explanation":"Đóng cửa trái xu thế khách quan và có thể làm suy yếu tự chủ. Quan hệ đúng là dùng nội lực làm nền tảng, đồng thời hội nhập hiệu quả để bổ sung nguồn lực và vị thế.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":253,"text":"Độc lập, tự chủ không có nghĩa biệt lập, đóng cửa; giữ vững độc lập, tự chủ phải đi đôi với chủ động, tích cực hội nhập quốc tế và hai mặt tạo tiền đề cho nhau."},"num":468},{"id":"C06-Q049","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Biện pháp xây dựng nền kinh tế độc lập, tự chủ","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Việt Nam đồng thời đa dạng hóa thị trường, nguồn vốn, đối tác và tăng đầu tư nghiên cứu để từng bước làm chủ công nghệ. Tổ hợp biện pháp này trực tiếp nhằm mục tiêu nào?","options":["Mở cửa không điều kiện và thay thế năng lực nghiên cứu trong nước bằng công nghệ nhập khẩu","Rút khỏi phân công lao động quốc tế để chuyển nền kinh tế sang trạng thái tự cung tự cấp","Giảm phụ thuộc vào một thị trường, một đối tác và nâng dần năng lực tự chủ công nghệ của nền kinh tế","Trì hoãn công nghiệp hóa cho đến khi không còn bất kỳ biến động nào từ thị trường thế giới"],"answer":2,"explanation":"Đa dạng hóa làm giảm rủi ro tập trung, còn đầu tư nghiên cứu và triển khai tạo khả năng tiến tới tự chủ công nghệ; cả hai cùng củng cố nền kinh tế độc lập, tự chủ.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":251,"text":"Xây dựng nền kinh tế độc lập, tự chủ cần đa dạng hóa thị trường, vốn và đối tác để tránh phụ thuộc, đồng thời đầu tư nghiên cứu, triển khai nhằm tự chủ dần về công nghệ.","slide":{"file":"MLN122. Slot 9+10. Công nghiệp hoá-Hiện đại hoá và hội nhập kinh tế QT.pptx.txt","number":30}},"num":469},{"id":"C06-Q050","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Công nghiệp hóa, hiện đại hóa nông nghiệp, nông thôn","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một địa phương kết hợp công nghệ sinh học, cơ giới hóa, điện khí hóa, thủy lợi hóa, số hóa với công nghiệp chế biến, dịch vụ và hạ tầng nông thôn. Chương trình này thực hiện trực tiếp nội dung nào?","options":["Chỉ chuyển dịch tỷ trọng ngành trong GDP mà không đổi mới công nghệ hay lực lượng sản xuất ở nông thôn","Chỉ hoàn thiện quan hệ phân phối ở nông thôn mà không ứng dụng khoa học - công nghệ vào sản xuất","Chỉ mở rộng các hình thức hội nhập kinh tế quốc tế mà không hiện đại hóa sản xuất và hạ tầng của địa phương","Đẩy mạnh công nghiệp hóa, hiện đại hóa nông nghiệp, nông thôn trong bối cảnh Cách mạng công nghiệp lần thứ tư"],"answer":3,"explanation":"Chương trình tích hợp đúng các thành tố giáo trình nêu cho hiện đại hóa nông nghiệp, nông thôn: công nghệ sinh học, cơ giới, điện, thủy lợi, số hóa, chế biến, dịch vụ và hạ tầng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":232,"text":"Công nghiệp hóa, hiện đại hóa nông nghiệp, nông thôn cần ứng dụng công nghệ sinh học, cơ giới hóa, điện khí hóa, thủy lợi hóa, số hóa, phát triển chế biến, dịch vụ và hạ tầng đồng bộ."},"num":470},{"id":"C06-Q051","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Ba giai đoạn của Cách mạng công nghiệp lần thứ nhất","difficulty":"Nhận biết","kind":"trinh_tu_quan_he","stem":"Theo khái quát của C. Mác, ba giai đoạn phát triển biểu hiện tính quy luật của Cách mạng công nghiệp lần thứ nhất theo trình tự nào?","options":["Đại công nghiệp, công trường thủ công, hiệp tác giản đơn","Công trường thủ công, hiệp tác giản đơn, đại công nghiệp","Hiệp tác giản đơn, công trường thủ công, đại công nghiệp","Hiệp tác giản đơn, đại công nghiệp, công trường thủ công"],"answer":2,"explanation":"C. Mác khái quát trình tự hiệp tác giản đơn, công trường thủ công và đại công nghiệp. Đây đồng thời là ba giai đoạn tăng năng suất, phát triển lực lượng sản xuất và xã hội hóa lao động.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":203,"text":"C. Mác khái quát tính quy luật của Cách mạng công nghiệp lần thứ nhất qua ba giai đoạn: hiệp tác giản đơn, công trường thủ công và đại công nghiệp."},"num":471},{"id":"C06-Q052","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Cách mạng công nghiệp và nguồn nhân lực","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Cách mạng công nghiệp tác động trực tiếp đến nguồn nhân lực theo hai chiều nào?","options":["Hạ yêu cầu về chất lượng và đồng thời thu hẹp cơ hội phát triển nguồn nhân lực","Giữ nguyên yêu cầu về chất lượng và chỉ làm tăng số lượng lao động thủ công","Nâng yêu cầu về chất lượng và đồng thời tạo điều kiện phát triển nguồn nhân lực","Xóa bỏ yêu cầu về đào tạo và thay nguồn nhân lực bằng nguồn tài nguyên"],"answer":2,"explanation":"Cách mạng công nghiệp vừa đòi hỏi nguồn nhân lực có chất lượng ngày càng cao, vừa tạo ra công nghệ và điều kiện mới để phát triển chính nguồn nhân lực đó.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":206,"text":"Cách mạng công nghiệp đặt ra đòi hỏi ngày càng cao về chất lượng nguồn nhân lực, đồng thời tạo điều kiện để phát triển nguồn nhân lực."},"num":472},{"id":"C06-Q053","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Biến đổi hệ thống sản xuất trong Cách mạng công nghiệp lần thứ tư","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Biến đổi nào của hệ thống sản xuất được giáo trình nêu khi phân tích Cách mạng công nghiệp lần thứ tư?","options":["Chuyển từ sản xuất phân cấp sang tập trung và tách biệt ba lĩnh vực công nghệ","Chuyển từ sản xuất tự động sang thủ công và tách con người khỏi mọi công nghệ","Chuyển từ sản xuất hàng loạt sang cơ khí và giữ nguyên ranh giới các lĩnh vực","Chuyển từ sản xuất tập trung sang phân cấp và hợp nhất công nghệ số, vật lý, sinh học"],"answer":3,"explanation":"Cách mạng công nghiệp lần thứ tư làm hệ thống sản xuất chuyển từ tập trung sang phân cấp và thúc đẩy sự hợp nhất công nghệ, xóa mờ ranh giới giữa số, vật lý và sinh học.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":215,"text":"Cách mạng công nghiệp lần thứ tư chuyển sản xuất từ tập trung sang phân cấp và hợp nhất công nghệ, xóa bỏ ranh giới giữa kỹ thuật số, vật lý và sinh học."},"num":473},{"id":"C06-Q054","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Thời gian công nghiệp hóa của Nhật Bản và NICs","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Nhật Bản và các nước công nghiệp mới (NICs) thực hiện thành công công nghiệp hóa, hiện đại hóa trong khoảng thời gian trung bình nào?","options":["Khoảng 40 - 50 năm","Khoảng 60 - 80 năm","Khoảng 5 - 10 năm","Khoảng 20 - 30 năm"],"answer":3,"explanation":"Nhờ chiến lược công nghiệp hóa rút ngắn, phát huy nguồn lực trong nước và tận dụng khoa học - công nghệ cùng nguồn lực bên ngoài, Nhật Bản và NICs hoàn thành quá trình trong khoảng 20 - 30 năm.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":219,"text":"Nhật Bản và các nước công nghiệp mới thực hiện thành công công nghiệp hóa, hiện đại hóa trong thời gian ngắn, trung bình khoảng 20 - 30 năm."},"num":474},{"id":"C06-Q055","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Cơ sở vật chất - kỹ thuật của phương thức sản xuất","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Cơ sở vật chất - kỹ thuật của một phương thức sản xuất được hiểu là gì?","options":["Hệ thống ngành, vùng và thành phần kinh tế phù hợp với chiến lược phát triển của quốc gia","Hệ thống quan hệ sở hữu, quản lý và phân phối phù hợp với cơ chế điều tiết và phân bổ của nền kinh tế","Hệ thống yếu tố vật chất của lực lượng sản xuất phù hợp với trình độ kỹ thuật của lao động xã hội","Hệ thống quan hệ thương mại, đầu tư và tài chính phù hợp với các cam kết kinh tế quốc tế"],"answer":2,"explanation":"Khái niệm này thuộc về mặt vật chất của lực lượng sản xuất: các yếu tố vật chất phải tương ứng với trình độ kỹ thuật mà lực lượng lao động xã hội dùng trong sản xuất.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":221,"text":"Cơ sở vật chất - kỹ thuật là hệ thống các yếu tố vật chất của lực lượng sản xuất xã hội, phù hợp với trình độ kỹ thuật mà lực lượng lao động xã hội sử dụng."},"num":475},{"id":"C06-Q056","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Công nghiệp sản xuất tư liệu sản xuất","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Ngành nào có vị trí quan trọng, quyết định sự phát triển của các ngành khác và góp phần nâng cao tính độc lập, tự chủ của nền kinh tế?","options":["Công nghiệp sản xuất tư liệu sản xuất, nhất là máy cái","Công nghiệp sản xuất hàng tiêu dùng thông thường","Công nghiệp khai thác và xuất khẩu khoáng sản thô","Công nghiệp gia công sản phẩm bằng công nghệ nhập khẩu"],"answer":0,"explanation":"Ngành sản xuất tư liệu sản xuất, trực tiếp là sản xuất máy cái, cung cấp công cụ và thiết bị cho các ngành khác nên giữ vị trí quyết định và củng cố năng lực tự chủ.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":224,"text":"Công nghiệp hóa đòi hỏi phát triển ngành sản xuất tư liệu sản xuất, sản xuất máy cái, vì ngành này có vị trí quan trọng quyết định sự phát triển của các ngành khác."},"num":476},{"id":"C06-Q057","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Tài nguyên của nền kinh tế tri thức","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Trong nền kinh tế tri thức, yếu tố nào được xác định là tài nguyên quan trọng nhất của nền kinh tế?","options":["Nguồn vốn tiền tệ","Lao động phổ thông","Khoáng sản tự nhiên","Nguồn thông tin"],"answer":3,"explanation":"Công nghệ thông tin được ứng dụng rộng rãi và các mạng đa phương tiện bao phủ nền kinh tế, làm cho thông tin trở thành tài nguyên quan trọng nhất.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":226,"text":"Trong kinh tế tri thức, công nghệ thông tin được ứng dụng rộng rãi, các mạng thông tin phủ khắp và thông tin trở thành tài nguyên quan trọng nhất của nền kinh tế."},"num":477},{"id":"C06-Q058","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Công nghiệp hóa, hiện đại hóa và liên minh xã hội","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Công nghiệp hóa, hiện đại hóa tác động như thế nào đến khối liên minh công nhân, nông dân và trí thức ở Việt Nam?","options":["Tách rời ba lực lượng và thu hẹp vai trò lãnh đạo của giai cấp công nhân","Tăng cường khối liên minh và nâng cao vai trò lãnh đạo của giai cấp công nhân","Thay khối liên minh ba lực lượng bằng liên minh giữa các ngành kinh tế","Chỉ củng cố đội ngũ trí thức, còn quan hệ công nhân - nông dân không đổi"],"answer":1,"explanation":"Giáo trình xác định công nghiệp hóa, hiện đại hóa làm khối liên minh công nhân, nông dân và trí thức ngày càng được tăng cường, đồng thời nâng vai trò lãnh đạo của giai cấp công nhân.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":222,"text":"Công nghiệp hóa, hiện đại hóa tăng cường, củng cố khối liên minh công nhân, nông dân và trí thức, đồng thời nâng cao vai trò lãnh đạo của giai cấp công nhân."},"num":478},{"id":"C06-Q059","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Vị trí của cơ cấu ngành kinh tế","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Trong hệ thống cơ cấu kinh tế, loại cơ cấu nào giữ vị trí quan trọng nhất vì phản ánh trình độ phát triển và kết quả công nghiệp hóa, hiện đại hóa?","options":["Cơ cấu vùng kinh tế","Cơ cấu ngành kinh tế","Cơ cấu thành phần kinh tế","Cơ cấu thị trường kinh tế"],"answer":1,"explanation":"Cơ cấu ngành, gồm công nghiệp, nông nghiệp và dịch vụ, giữ vị trí quan trọng nhất vì phản ánh trực tiếp trình độ phát triển và kết quả của công nghiệp hóa, hiện đại hóa.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":227,"text":"Trong hệ thống cơ cấu kinh tế, cơ cấu ngành kinh tế giữ vị trí quan trọng nhất vì phản ánh trình độ phát triển và kết quả công nghiệp hóa, hiện đại hóa."},"num":479},{"id":"C06-Q060","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Khâu đột phá trong Cách mạng công nghiệp lần thứ tư","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Giáo trình xác định nội dung nào là khâu đột phá trong Cách mạng công nghiệp lần thứ tư ở Việt Nam?","options":["Phát triển và ứng dụng công nghệ thông tin","Phát triển và ứng dụng công nghệ sinh học","Phát triển và ứng dụng công nghệ vật liệu","Phát triển và ứng dụng công nghệ năng lượng"],"answer":0,"explanation":"Phát triển và ứng dụng công nghệ thông tin được coi là khâu đột phá, đi cùng yêu cầu bứt phá về hạ tầng, ứng dụng, nhân lực và an toàn mạng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":230,"text":"Việt Nam coi phát triển và ứng dụng công nghệ thông tin là khâu đột phá trong Cách mạng công nghiệp lần thứ tư."},"num":480},{"id":"C06-Q061","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Phát triển công nghiệp trong chuyển đổi số","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Định hướng phát triển công nghiệp nào phù hợp với yêu cầu chuyển đổi số nền kinh tế?","options":["Mở rộng đồng đều mọi ngành mà không xét hiệu quả và khả năng lan tỏa","Ưu tiên khai thác tài nguyên thô và tăng tỷ trọng linh kiện nhập khẩu","Chọn ngành hiện đại có sức lan tỏa, tăng hàm lượng công nghệ và giá trị nội địa","Thu hẹp công nghiệp chế biến và chuyển sang xuất khẩu nguyên liệu chưa qua xử lý"],"answer":2,"explanation":"Giáo trình yêu cầu phát triển có chọn lọc những ngành hiện đại có khả năng lan tỏa, đồng thời tăng hàm lượng khoa học - công nghệ và tỷ trọng giá trị nội địa trong sản phẩm.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":231,"text":"Cần phát triển có chọn lọc một số ngành công nghiệp hiện đại có tác động lan tỏa, tăng hàm lượng khoa học - công nghệ và tỷ trọng giá trị nội địa."},"num":481},{"id":"C06-Q062","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Khái niệm toàn cầu hóa","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Theo giáo trình, toàn cầu hóa là quá trình nào?","options":["Làm mỗi quốc gia tự bảo đảm mọi nguồn lực và giảm dần quan hệ kinh tế, chính trị với bên ngoài","Thu hẹp hoạt động xuyên biên giới trong từng khu vực và giảm liên hệ giữa các nền kinh tế","Gia tăng liên kết và sự phụ thuộc lẫn nhau giữa các quốc gia trên quy mô toàn cầu","Tách các nền kinh tế khỏi phân công lao động quốc tế và hạn chế lưu chuyển các yếu tố sản xuất"],"answer":2,"explanation":"Dấu hiệu cốt lõi của toàn cầu hóa là các liên kết xuyên biên giới và mức độ phụ thuộc lẫn nhau giữa các quốc gia ngày càng tăng trên quy mô toàn cầu.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":233,"text":"Toàn cầu hóa là quá trình tạo ra liên kết và sự phụ thuộc lẫn nhau ngày càng tăng giữa các quốc gia trên quy mô toàn cầu."},"num":482},{"id":"C06-Q063","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Hình thức hội nhập kinh tế quốc tế","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Nhóm nào gồm các hình thức hội nhập kinh tế quốc tế xét theo hoạt động kinh tế đối ngoại?","options":["Ngoại thương, đầu tư quốc tế, hợp tác quốc tế và dịch vụ thu ngoại tệ","Thương mại nội địa, đầu tư quốc tế, hợp tác trong nước và dịch vụ tài chính nội địa","Ngoại thương, đầu tư trong nước, hợp tác liên vùng và dịch vụ công","Ngoại thương, đầu tư công, hợp tác giữa địa phương và dịch vụ ngân sách"],"answer":0,"explanation":"Xét về hình thức hoạt động, hội nhập bao gồm ngoại thương, đầu tư quốc tế, hợp tác quốc tế và dịch vụ thu ngoại tệ. PTA, FTA hay liên minh thuế quan là các mức độ hội nhập.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":237,"text":"Xét về hình thức, hội nhập kinh tế quốc tế gồm các hoạt động kinh tế đối ngoại như ngoại thương, đầu tư quốc tế, hợp tác quốc tế và dịch vụ thu ngoại tệ."},"num":483},{"id":"C06-Q064","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Chủ thể của hội nhập kinh tế quốc tế","difficulty":"Nhận biết","kind":"trinh_tu_quan_he","stem":"Phương án nào xác định đúng vai trò của các chủ thể trong hội nhập kinh tế quốc tế?","options":["Nhà nước làm thay doanh nghiệp; doanh nhân hỗ trợ; người dân đứng ngoài tiến trình","Nhà nước dẫn dắt, hỗ trợ; doanh nghiệp là nòng cốt; người dân ở vị trí trung tâm","Người dân dẫn dắt đàm phán; Nhà nước đứng ngoài thị trường; doanh nghiệp chỉ thi hành","Doanh nghiệp dẫn dắt Nhà nước; người dân chỉ tiếp nhận kết quả; trí thức không tham gia"],"answer":1,"explanation":"Hội nhập là sự nghiệp của toàn dân. Nhà nước dẫn dắt và hỗ trợ chứ không làm thay; doanh nghiệp, doanh nhân là lực lượng nòng cốt và người dân được đặt ở vị trí trung tâm.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":242,"text":"Nhà nước dẫn dắt và hỗ trợ các chủ thể; doanh nghiệp, doanh nhân là lực lượng nòng cốt; người dân ở vị trí trung tâm và hội nhập là sự nghiệp của toàn dân."},"num":484},{"id":"C06-Q065","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Cách mạng công nghiệp và chính sách phân phối","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Vì sao tác động của tự động hóa đến việc làm buộc các nước phải điều chỉnh chính sách phân phối thu nhập và an sinh xã hội?","options":["Mọi người lao động đều có việc làm và thu nhập ngang nhau, làm chính sách phân phối trở nên dư thừa","Thất nghiệp và phân hóa thu nhập có thể gia tăng, làm bất bình đẳng và mâu thuẫn phân phối gay gắt hơn","Chi phí sản xuất tăng đồng đều ở mọi ngành, làm mọi nhóm xã hội cùng chịu một mức thiệt hại","Quan hệ phân phối tự mất đi khi công nghệ thay thế một phần lao động trong quá trình sản xuất"],"answer":1,"explanation":"Tự động hóa có thể làm thất nghiệp và phân hóa thu nhập tăng lên. Chính sách phân phối và an sinh phải được điều chỉnh để hạn chế bất bình đẳng và xử lý mâu thuẫn phân phối.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":211,"text":"Tác động tiêu cực đến việc làm và thu nhập làm thất nghiệp, phân hóa thu nhập, bất bình đẳng gia tăng, buộc các nước điều chỉnh phân phối và an sinh xã hội."},"num":485},{"id":"C06-Q066","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Lợi thế của nước đi sau","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Thành tựu của các cuộc cách mạng công nghiệp tạo lợi thế đi sau cho nước đang phát triển theo cơ chế nào?","options":["Buộc nước đi sau trải qua đầy đủ mọi thử nghiệm và lặp lại những sai lầm công nghệ của nước đi trước","Cho phép bỏ qua công nghiệp hóa và chỉ nhập khẩu sản phẩm hoàn chỉnh từ các nước tiên tiến","Giúp tiếp cận thành tựu mới, tận dụng kinh nghiệm để bứt phá và rút ngắn khoảng cách phát triển","Bảo đảm lợi thế nhân công rẻ và tài nguyên sẽ tồn tại lâu dài mà không cần đổi mới công nghệ"],"answer":2,"explanation":"Nước đi sau có thể tiếp cận thành tựu khoa học - công nghệ đã hình thành và học kinh nghiệm của nước đi trước, qua đó bứt phá và thu hẹp khoảng cách phát triển.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":208,"text":"Cách mạng công nghiệp tạo cơ hội cho nước đang và kém phát triển tiếp cận thành tựu mới, tận dụng lợi thế đi sau để bứt phá và rút ngắn khoảng cách."},"num":486},{"id":"C06-Q067","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Hạn chế của mô hình công nghiệp hóa kiểu Liên Xô","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Vì sao mô hình công nghiệp hóa kiểu Liên Xô về sau trở thành một nguyên nhân gây trì trệ?","options":["Vì bắt đầu từ công nghiệp nhẹ nên không xây dựng được cơ sở vật chất - kỹ thuật trong thời gian ngắn","Vì dựa vào xuất khẩu nên nguồn lực xã hội không thể tập trung cho các ngành công nghiệp nền tảng","Vì kết hợp công nghệ nhiều tầng nên không thể huy động nguồn lực tập trung cho sản xuất trong nước","Vì cơ sở cơ khí hóa khó thích ứng tiến bộ mới và cơ chế kế hoạch hóa mệnh lệnh được duy trì quá lâu"],"answer":3,"explanation":"Ưu thế xây dựng nhanh cơ sở cơ khí lớn chuyển thành hạn chế khi công nghệ tiến bộ: cơ sở cũ khó thích ứng, còn cơ chế kế hoạch hóa tập trung kéo dài làm nền kinh tế trì trệ.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":218,"text":"Cơ sở vật chất ở trình độ cơ khí hóa không thích ứng tiến bộ kỹ thuật mới và cơ chế kế hoạch hóa tập trung mệnh lệnh duy trì quá lâu đã dẫn đến trì trệ."},"num":487},{"id":"C06-Q068","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Các con đường phát triển khoa học - công nghệ","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Nhận định nào phân biệt đúng con đường tự nghiên cứu tuần tự với con đường tiếp nhận chuyển giao công nghệ?","options":["Tự nghiên cứu cần nhiều ngoại tệ; chuyển giao luôn loại bỏ hoàn toàn sự phụ thuộc bên ngoài","Tự nghiên cứu thường kéo dài và tốn thử nghiệm; chuyển giao cần vốn, ngoại tệ và có nguy cơ phụ thuộc","Tự nghiên cứu không có tổn thất thử nghiệm; chuyển giao không đòi hỏi vốn hay năng lực tiếp nhận","Tự nghiên cứu diễn ra rất nhanh; chuyển giao phải thử nghiệm tuần tự từ trình độ thấp đến cao"],"answer":1,"explanation":"Con đường tự nghiên cứu từ thấp đến cao thường mất nhiều thời gian và chịu tổn thất thử nghiệm. Chuyển giao nhanh hơn nhưng cần vốn, ngoại tệ và có thể tạo phụ thuộc.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":219,"text":"Tự nghiên cứu tuần tự thường kéo dài và tổn thất thử nghiệm; tiếp nhận chuyển giao đòi hỏi nhiều vốn, ngoại tệ và luôn có nguy cơ phụ thuộc nước ngoài."},"num":488},{"id":"C06-Q069","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Quan hệ giữa điều kiện và nhiệm vụ công nghiệp hóa","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Yêu cầu “không chờ chuẩn bị đầy đủ mới thực hiện công nghiệp hóa, hiện đại hóa” cần được hiểu như thế nào?","options":["Tạo lập các điều kiện cần thiết đồng thời với thực hiện những nhiệm vụ chuyển đổi nền sản xuất - xã hội","Bỏ qua mọi điều kiện về thể chế, nguồn lực và môi trường quốc tế để đẩy nhanh tiến độ bằng mọi giá","Hoàn thành toàn bộ nhiệm vụ hiện đại hóa trước rồi mới xây dựng tư duy, thể chế và nguồn nhân lực","Chỉ tạo lập điều kiện trong nước, còn các nhiệm vụ chuyển đổi phải chờ môi trường quốc tế ổn định tuyệt đối"],"answer":0,"explanation":"Giáo trình không phủ nhận vai trò của điều kiện mà yêu cầu vừa tạo lập điều kiện, vừa triển khai nhiệm vụ chuyển đổi. Hai quá trình phải được tiến hành đồng thời.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":223,"text":"Không chờ chuẩn bị đầy đủ mới công nghiệp hóa, hiện đại hóa mà phải đồng thời tạo lập điều kiện và thực hiện các nhiệm vụ chuyển đổi."},"num":489},{"id":"C06-Q070","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Tính đồng bộ của ứng dụng khoa học - công nghệ","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Vì sao ứng dụng khoa học - công nghệ trong công nghiệp hóa, hiện đại hóa phải được tiến hành đồng bộ, cân đối giữa các ngành, vùng và lĩnh vực?","options":["Để mọi ngành và vùng cùng sử dụng một công nghệ bất kể nhu cầu, khả năng và điều kiện thực tế","Để các bộ phận của nền kinh tế hỗ trợ nhau và việc ứng dụng công nghệ đem lại hiệu quả tổng thể cao","Để tập trung toàn bộ công nghệ hiện đại vào một ngành, còn các ngành khác duy trì phương thức thủ công","Để thay thế yêu cầu lựa chọn công nghệ bằng nguyên tắc triển khai đồng loạt ở cùng một thời điểm"],"answer":1,"explanation":"Đồng bộ, cân đối không có nghĩa áp dụng giống nhau. Mục tiêu là tránh các khâu tách rời, tạo sự hỗ trợ giữa ngành, vùng và lĩnh vực để đạt hiệu quả chung cao.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":225,"text":"Ứng dụng khoa học - công nghệ mới phải được tiến hành đồng bộ, cân đối ở các ngành, vùng và lĩnh vực thì mới đem lại hiệu quả cao."},"num":490},{"id":"C06-Q071","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Điều kiện biểu hiện đầy đủ của kinh tế tri thức","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Một nền kinh tế đã phủ mạng thông tin rộng khắp nhưng người lao động ít học tập, đổi mới và sáng tạo. Vì sao nền kinh tế đó chưa thể hiện đầy đủ đặc trưng của kinh tế tri thức?","options":["Vì tri thức còn phải trở thành lực lượng sản xuất trực tiếp, còn người lao động phải thường xuyên học tập và sáng tạo","Vì kinh tế tri thức chỉ tồn tại trong ngành công nghệ cao, không phụ thuộc trình độ và năng lực đổi mới của người lao động","Vì kinh tế tri thức không sử dụng mạng thông tin mà chỉ dựa vào lao động thủ công có kỹ năng","Vì phải thay toàn bộ sản xuất vật chất bằng dịch vụ số trước khi tri thức có vai trò kinh tế"],"answer":0,"explanation":"Mạng thông tin chỉ là một điều kiện. Kinh tế tri thức còn đòi hỏi tri thức trở thành lực lượng sản xuất trực tiếp và nguồn nhân lực được tri thức hóa, thường xuyên học tập, đổi mới và sáng tạo.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":226,"text":"Trong kinh tế tri thức, tri thức trở thành lực lượng sản xuất trực tiếp; nguồn nhân lực được tri thức hóa, sáng tạo, đổi mới và học tập trở thành nhu cầu thường xuyên."},"num":491},{"id":"C06-Q072","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Chuyển dịch cơ cấu kinh tế trong tổng thể thống nhất","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao chuyển dịch cơ cấu ngành, vùng và thành phần kinh tế phải đặt trong chiến lược phát triển tổng thể?","options":["Vì mỗi loại cơ cấu vận động độc lập và không chịu tác động của thể chế hay chính sách chung","Vì chỉ cơ cấu ngành có liên hệ với công nghệ, năng lượng và giao thông, còn các cơ cấu khác thì không","Vì các cơ cấu cùng tồn tại trong một nền kinh tế và chịu tác động của thể chế, hạ tầng cùng các cân đối lớn","Vì chiến lược tổng thể cho phép bỏ qua quan hệ trung ương - địa phương, tích lũy - tiêu dùng và trong - ngoài nước"],"answer":2,"explanation":"Các cơ cấu không tồn tại tách rời mà cùng chịu một thể chế, cơ chế và chính sách. Chuyển dịch phải tính đến hạ tầng, quan hệ trong - ngoài nước, trung ương - địa phương và các cân đối phát triển.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":228,"text":"Các cơ cấu tồn tại trong nền kinh tế thống nhất, chịu thể chế và chính sách chung, nên chuyển dịch phải đặt trong chiến lược tổng thể và tính đến các quan hệ lớn."},"num":492},{"id":"C06-Q073","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Liên kết nông, lâm, ngư nghiệp với công nghiệp chế biến","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Vì sao phát triển nông, lâm, ngư nghiệp cần gắn với công nghiệp chế biến trong quá trình hiện đại hóa?","options":["Để tách sản xuất nông nghiệp khỏi dịch vụ, hạ tầng và phân công lao động xã hội trong khu vực nông thôn","Để chuyển toàn bộ lao động nông thôn sang khai thác tài nguyên và ngừng sản xuất sản phẩm nông nghiệp","Để chỉ tăng sản lượng nguyên liệu thô, không cần nâng chất lượng, chế biến hay phát triển thị trường tiêu thụ","Để bảo đảm lương thực, cung cấp nguyên liệu, tăng giá trị xuất khẩu và mở rộng thị trường"],"answer":3,"explanation":"Liên kết với chế biến vừa phát huy tiềm năng nông, lâm, ngư nghiệp, vừa bảo đảm lương thực, cung cấp nguyên liệu cho chế biến, nâng giá trị hàng xuất khẩu và mở rộng thị trường.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":231,"text":"Gắn nông, lâm, ngư nghiệp với chế biến giúp bảo đảm an ninh lương thực, cung cấp nguyên liệu, gia tăng giá trị hàng xuất khẩu và mở rộng thị trường."},"num":493},{"id":"C06-Q074","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Vai trò của kinh nghiệm quốc tế trong chiến lược hội nhập","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Vì sao khi xây dựng chiến lược hội nhập, Việt Nam cần nghiên cứu cả thành công và thất bại của các nước?","options":["Để rút ra bài học phù hợp và tránh lặp lại những sai lầm từng gây hậu quả cho nước đi trước","Để sao chép nguyên trạng mô hình thành công, không cần đánh giá bối cảnh, điều kiện và năng lực trong nước","Để hoãn xác định chiến lược cho đến khi mọi quốc gia thống nhất một mô hình hội nhập chung","Để chỉ dùng kinh nghiệm thất bại làm căn cứ loại bỏ mọi hình thức liên kết kinh tế quốc tế"],"answer":0,"explanation":"Nghiên cứu kinh nghiệm quốc tế nhằm rút ra cả bài học thành công lẫn thất bại, từ đó lựa chọn cách làm phù hợp và tránh lặp lại những sai lầm đã gây hậu quả cho nước đi trước.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":244,"text":"Trong xây dựng chiến lược hội nhập kinh tế cần nghiên cứu kinh nghiệm của các nước, đúc rút bài học thành công và thất bại để tránh những sai lầm mà các nước đã từng gánh chịu."},"num":494},{"id":"C06-Q075","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Rủi ro hội nhập đối với nước đang phát triển","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Vì sao các nước đang và kém phát triển cần chiến lược, đối sách phù hợp khi tham gia toàn cầu hóa và hội nhập?","options":["Vì mọi dòng tài chính, công nghệ và kinh nghiệm bên ngoài đều bị ngăn cấm, không thể tới các nước đang phát triển","Vì hội nhập làm nước phát triển mất toàn bộ ưu thế về vốn, công nghệ và khả năng chi phối thương mại","Vì hội nhập tất yếu xóa bỏ thị trường trong nước và buộc mọi nền kinh tế chuyển sang tự cung tự cấp","Vì ưu thế vốn, công nghệ của nước phát triển có thể làm gia tăng sự phụ thuộc do nợ và bất bình đẳng thương mại"],"answer":3,"explanation":"Ưu thế lớn về vốn và công nghệ của các nước phát triển có thể làm nước đang phát triển phụ thuộc hơn do nợ và chịu trao đổi thương mại bất bình đẳng. Vì vậy, hội nhập cần chiến lược và đối sách phù hợp.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":236,"text":"Các nước đang phát triển đối mặt với nguy cơ gia tăng phụ thuộc do nợ nước ngoài và bất bình đẳng trong trao đổi thương mại, nên cần chiến lược và đối sách phù hợp."},"num":495},{"id":"C06-Q076","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Định hướng xã hội chủ nghĩa và khả năng hội nhập","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Vì sao định hướng xã hội chủ nghĩa của mô hình kinh tế thị trường Việt Nam không tự nó cản trở hội nhập kinh tế quốc tế?","options":["Vì hội nhập chỉ yêu cầu mở cửa thương mại, không đòi hỏi thể chế kinh tế hay pháp luật trong nước tương thích","Vì khác biệt chính trị không cản hội nhập; trở ngại là cơ chế thị trường và pháp luật chưa hoàn thiện","Vì mọi nước tham gia hội nhập đều phải có cùng chế độ chính trị, mô hình thị trường và hệ thống pháp luật","Vì khi hội nhập, định hướng phát triển trong nước phải chuyển hoàn toàn sang định hướng chính trị của đối tác"],"answer":1,"explanation":"Sự khác biệt về định hướng chính trị không tự ngăn cản hội nhập khi nền kinh tế vận hành theo cơ chế thị trường. Vấn đề thực tế là cơ chế thị trường, luật pháp và chính sách trong nước còn phải hoàn thiện để tương thích.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":247,"text":"Mô hình kinh tế thị trường định hướng xã hội chủ nghĩa khác các nước về định hướng chính trị nhưng không cản trở hội nhập; hạn chế nằm ở cơ chế, luật pháp và chính sách chưa hoàn thiện."},"num":496},{"id":"C06-Q077","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Lợi ích hội nhập đối với người tiêu dùng và nhà hoạch định","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Phương án nào ghép đúng lợi ích của hội nhập đối với người tiêu dùng và nhà hoạch định chính sách?","options":["Người tiêu dùng giảm lựa chọn; nhà hoạch định không cần theo dõi xu thế phát triển của thế giới","Người tiêu dùng chỉ được lợi từ xuất khẩu; nhà hoạch định chỉ được lợi từ giảm số đối tác quốc tế","Người tiêu dùng được bảo đảm việc làm và thu nhập; nhà hoạch định không cần đánh giá tác động từ thị trường quốc tế","Người tiêu dùng có hàng hóa đa dạng, giá cạnh tranh; nhà hoạch định nắm xu thế để điều chỉnh chính sách"],"answer":3,"explanation":"Hội nhập mở rộng lựa chọn hàng hóa, dịch vụ với giá cạnh tranh cho người tiêu dùng. Đồng thời, thông tin và tiếp xúc quốc tế giúp nhà hoạch định nhận biết xu thế để điều chỉnh chiến lược, chính sách.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":238,"text":"Hội nhập cải thiện tiêu dùng bằng hàng hóa, dịch vụ đa dạng và giá cạnh tranh; giúp nhà hoạch định nắm xu thế thế giới để xây dựng, điều chỉnh chiến lược."},"num":497},{"id":"C06-Q078","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Tác động lan tỏa của hội nhập kinh tế","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Vì sao hội nhập kinh tế quốc tế có thể thúc đẩy hội nhập văn hóa, chính trị và hợp tác an ninh?","options":["Vì liên kết kinh tế làm các nước loại bỏ bản sắc, từ bỏ pháp luật và chuyển toàn bộ quyền lực ra bên ngoài","Vì liên kết kinh tế mở rộng giao lưu, tiếp thu giá trị, cải cách, nâng vị thế và phối hợp nguồn lực cho vấn đề chung","Vì trao đổi kinh tế làm quan hệ văn hóa, chính trị và an ninh thu hẹp để tránh phát sinh khác biệt lợi ích","Vì hợp tác kinh tế thay thế hoàn toàn nhu cầu cải cách nhà nước và phối hợp xử lý vấn đề chung giữa các nước"],"answer":1,"explanation":"Hội nhập kinh tế tạo nền tảng mở rộng giao lưu văn hóa, thúc đẩy cải cách chính trị, nâng vị thế quốc tế và phối hợp nguồn lực giải quyết các vấn đề an ninh, môi trường chung.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":239,"text":"Hội nhập kinh tế là tiền đề cho giao lưu văn hóa, cải cách chính trị, nâng vị thế và phối hợp các nước về an ninh, môi trường cùng những vấn đề chung."},"num":498},{"id":"C06-Q079","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Phân phối lợi ích và rủi ro của hội nhập","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Sau khi mở cửa, lao động kỹ năng cao ở đô thị nhận phần lớn lợi ích, còn lao động kỹ năng thấp ở nông thôn chịu mất việc và giảm thu nhập. Tình huống thể hiện rõ nhất tác động nào?","options":["Phân phối lợi ích và rủi ro không công bằng, làm tăng khoảng cách giàu - nghèo và bất bình đẳng","Phụ thuộc vào một thị trường bên ngoài, làm nền kinh tế dễ tổn thương trước biến động quốc tế","Chuyển dịch cơ cấu sang ngành dùng nhiều tài nguyên, làm nền kinh tế mắc kẹt ở khâu giá trị thấp","Xói mòn bản sắc văn hóa dân tộc do sự gia tăng giao lưu với sản phẩm văn hóa nước ngoài"],"answer":0,"explanation":"Dấu hiệu quyết định là lợi ích và thiệt hại rơi vào các nhóm xã hội khác nhau, kéo theo chênh lệch thu nhập. Đây là rủi ro phân phối không công bằng của hội nhập.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":240,"text":"Hội nhập có thể phân phối không công bằng lợi ích và rủi ro giữa các nước, các nhóm xã hội, làm tăng khoảng cách giàu - nghèo và bất bình đẳng."},"num":499},{"id":"C06-Q080","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Thách thức văn hóa trong hội nhập","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Nội dung giải trí ngoại nhập lấn át sản phẩm trong nước, khiến một bộ phận giới trẻ xa rời ngôn ngữ, phong tục và giá trị truyền thống. Đây là thách thức nào của hội nhập?","options":["Gia tăng cạnh tranh làm doanh nghiệp và ngành kinh tế trong nước gặp khó khăn","Nền kinh tế phụ thuộc thị trường ngoài và dễ tổn thương trước biến động","Bản sắc dân tộc và văn hóa truyền thống có nguy cơ bị xói mòn","Lợi ích và rủi ro được phân phối không công bằng giữa các nhóm xã hội"],"answer":2,"explanation":"Tình huống tập trung vào sự suy giảm ngôn ngữ, phong tục và giá trị truyền thống trước ảnh hưởng văn hóa bên ngoài, nên phản ánh nguy cơ xói mòn bản sắc dân tộc.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":240,"text":"Hội nhập có thể làm gia tăng nguy cơ bản sắc dân tộc và văn hóa truyền thống Việt Nam bị xói mòn trước ảnh hưởng của văn hóa nước ngoài."},"num":500},{"id":"C06-Q081","chapter":"Chương 6 · Slot 9+10: Công nghiệp hóa, hiện đại hóa và hội nhập kinh tế quốc tế","chapterNum":6,"topic":"Kết hợp kinh tế với quốc phòng, an ninh và đối ngoại","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Trong đàm phán một dự án hạ tầng chiến lược, đối tác yêu cầu quyền can thiệp vào chính sách nội bộ để đổi lấy vốn. Cách xử lý nào phù hợp với nguyên tắc hội nhập của giáo trình?","options":["Tách quyết định đầu tư khỏi quốc phòng, an ninh và đối ngoại vì chỉ tiêu kinh tế là căn cứ duy nhất","Chấp nhận quyền can thiệp vì thu hút vốn cho hạ tầng phải được ưu tiên hơn yêu cầu về chủ quyền","Từ chối mọi hợp tác quốc tế, kể cả khi đối tác tôn trọng chủ quyền, bình đẳng và bảo đảm lợi ích hai bên","Chỉ hợp tác khi bảo đảm bình đẳng, cùng có lợi, tôn trọng độc lập, chủ quyền và không can thiệp nội bộ"],"answer":3,"explanation":"Hội nhập phải dựa trên bình đẳng, cùng có lợi, tôn trọng độc lập, chủ quyền và không can thiệp công việc nội bộ; đồng thời phải gắn kinh tế với quốc phòng, an ninh và đối ngoại.","source":{"file":"GIAO-TRINH-KINH-TE-
