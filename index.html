ỉ có ý nghĩa khi kết thúc bằng T' lớn hơn T.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":76,"text":"Mục đích của H - T - H là giá trị sử dụng, còn mục đích của T - H - T' là giá trị lớn hơn."},"num":155},{"id":"C03-Q003","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Mâu thuẫn của công thức chung","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao mua rẻ rồi bán đắt không giải thích được nguồn gốc giá trị tăng thêm trên phạm vi toàn xã hội?","options":["Vì mọi hàng hóa trên thị trường đều luôn được bán đúng bằng chi phí sản xuất","Vì người bán không bao giờ đồng thời đóng vai trò là người mua","Vì khoản lợi của người bán là khoản thiệt của người mua nên lưu thông chỉ phân phối lại giá trị","Vì mọi chênh lệch giá đều tự động chuyển thành tiền công của người lao động"],"answer":2,"explanation":"Trong nền kinh tế thị trường, mỗi người vừa có thể là người bán vừa có thể là người mua. Mua bán không ngang giá có thể chuyển giá trị giữa các bên, nhưng không tạo thêm giá trị mới cho toàn xã hội.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":77,"text":"Lưu thông mua bán thông thường không tạo ra giá trị tăng thêm xét trên phạm vi xã hội."},"num":156},{"id":"C03-Q004","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tiền chuyển hóa thành tư bản","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Theo giáo trình, tiền biến thành tư bản khi nào?","options":["Khi được dùng với mục đích mang lại giá trị thặng dư","Khi được dùng làm phương tiện thanh toán","Khi được đổi lấy một hàng hóa tiêu dùng","Khi được cất giữ lâu dài ngoài lưu thông"],"answer":0,"explanation":"Không phải mọi khoản tiền đều là tư bản. Tiền chỉ trở thành tư bản khi được ứng ra trong sự vận động nhằm thu về giá trị thặng dư.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":76,"text":"Tiền biến thành tư bản khi được dùng để mang lại giá trị thặng dư."},"num":157},{"id":"C03-Q005","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Khái niệm sức lao động","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Sức lao động được hiểu là gì?","options":["Toàn bộ tư liệu sản xuất mà một người đang sở hữu","Toàn bộ năng lực thể chất và tinh thần được con người vận dụng khi sản xuất","Hoạt động lao động đã được thực hiện trong sản xuất","Toàn bộ sản phẩm mà một người tạo ra trong ngày"],"answer":1,"explanation":"Sức lao động là năng lực tồn tại trong con người sống; lao động mới là sự vận dụng năng lực ấy vào quá trình sản xuất.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":77,"text":"Sức lao động là toàn bộ năng lực thể chất và tinh thần trong con người sống được vận dụng để sản xuất giá trị sử dụng.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":8}},"num":158},{"id":"C03-Q006","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Điều kiện sức lao động trở thành hàng hóa","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Hai điều kiện để sức lao động trở thành hàng hóa là gì?","options":["Người lao động mất tự do thân thể và được cấp đầy đủ tư liệu sinh hoạt","Người lao động có đủ tư liệu sản xuất và tự quyết định mọi sản phẩm","Người lao động tự do về thân thể và không có đủ tư liệu sản xuất cần thiết","Người lao động có vốn tiền tệ lớn và thuê được nhiều lao động khác"],"answer":2,"explanation":"Người lao động phải có quyền định đoạt sức lao động của mình, đồng thời thiếu tư liệu sản xuất để tự sản xuất hàng hóa nên buộc phải bán sức lao động.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":77,"text":"Hai điều kiện là người lao động tự do về thân thể và không có đủ tư liệu sản xuất cần thiết.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":9}},"num":159},{"id":"C03-Q007","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Sức lao động và lao động","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Phân biệt nào đúng giữa sức lao động và lao động?","options":["Sức lao động là tư liệu sản xuất; lao động là sự hao mòn tư liệu ấy","Sức lao động là sản phẩm; lao động là giá cả của sản phẩm đó","Sức lao động là năng lực; lao động là sự vận dụng năng lực đó trong sản xuất","Sức lao động là kết quả đã vật hóa; lao động là tiền dùng để mua kết quả ấy"],"answer":2,"explanation":"Sức lao động tồn tại như một khả năng trong con người sống. Khi khả năng ấy được sử dụng trong quá trình sản xuất thì mới trở thành lao động.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":77,"text":"Sức lao động là năng lực thể chất và tinh thần được con người đem ra vận dụng khi sản xuất.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":8}},"num":160},{"id":"C03-Q008","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Giá trị hàng hóa sức lao động","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Giá trị hàng hóa sức lao động gồm những bộ phận cơ bản nào?","options":["Tư liệu sinh hoạt chỉ cho bản thân người lao động, phí đào tạo và khoản tiết kiệm tự nguyện","Tư liệu sinh hoạt để tái sản xuất sức lao động, phí đào tạo và tư liệu sinh hoạt để nuôi con","Tư liệu sinh hoạt của người lao động, chi phí tuyển dụng và chi phí quản lý của doanh nghiệp","Tư liệu sinh hoạt vật chất tối thiểu, tiền thưởng năng suất và phần chia lợi nhuận"],"answer":1,"explanation":"Ba bộ phận phản ánh chi phí tái sản xuất người lao động hiện tại, hình thành trình độ nghề nghiệp và tái sản xuất thế hệ lao động tiếp theo.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":78,"text":"Giá trị sức lao động gồm tư liệu sinh hoạt cần thiết, phí đào tạo và tư liệu sinh hoạt cần thiết để nuôi con người lao động.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":12}},"num":161},{"id":"C03-Q009","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Giá trị sử dụng của sức lao động","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Điều gì làm cho giá trị sử dụng của hàng hóa sức lao động trở nên đặc biệt?","options":["Khi được sử dụng, giá trị của nó tăng lên mà không cần có quá trình lao động","Khi được sử dụng, toàn bộ giá trị của nó chỉ chuyển nguyên vẹn vào sản phẩm","Khi được sử dụng, nó không tạo giá trị mới nhưng làm giảm chi phí lưu thông","Khi được sử dụng, nó vừa bảo tồn giá trị vừa tạo ra giá trị mới lớn hơn giá trị của bản thân"],"answer":3,"explanation":"Giá trị sử dụng đặc biệt của sức lao động chỉ bộc lộ trong lao động: nó có khả năng tạo ra lượng giá trị mới lớn hơn chính giá trị sức lao động. Đây là chìa khóa giải thích nguồn gốc giá trị thặng dư.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":79,"text":"Trong khi sử dụng sức lao động, giá trị của nó được bảo tồn và còn tạo ra lượng giá trị lớn hơn.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":13}},"num":162},{"id":"C03-Q010","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Yếu tố tinh thần và lịch sử của sức lao động","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Nhận định nào giải thích đúng việc hàng hóa sức lao động mang yếu tố tinh thần và lịch sử?","options":["Giá trị sức lao động chỉ do lượng calo tối thiểu quyết định ở mọi quốc gia","Giá trị sức lao động chỉ thay đổi khi máy móc trong doanh nghiệp bị hao mòn","Nhu cầu tái sản xuất sức lao động gồm cả nhu cầu tinh thần và phụ thuộc hoàn cảnh lịch sử từng nơi","Mọi người lao động ở mọi thời kỳ đều có cơ cấu nhu cầu hoàn toàn giống nhau"],"answer":2,"explanation":"Tái sản xuất sức lao động không chỉ đòi hỏi tư liệu vật chất mà còn có nhu cầu tinh thần. Mức và cơ cấu các nhu cầu ấy chịu ảnh hưởng của điều kiện lịch sử, xã hội.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":78,"text":"Sức lao động là hàng hóa đặc biệt mang yếu tố tinh thần và lịch sử.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":11}},"num":163},{"id":"C03-Q011","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Khái niệm giá trị thặng dư","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Giá trị thặng dư là bộ phận nào trong giá trị hàng hóa?","options":["Phần giá trị tư liệu sản xuất chuyển nguyên vẹn vào sản phẩm","Phần giá trị dùng để bù đắp hao mòn máy móc","Phần giá trị sức lao động được hoàn trả đầy đủ dưới dạng tiền công","Phần giá trị mới dôi ra ngoài giá trị sức lao động do công nhân tạo ra"],"answer":3,"explanation":"Giá trị thặng dư, ký hiệu m, là phần giá trị mới vượt quá giá trị sức lao động. Phần này là kết quả của thời gian lao động thặng dư.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":81,"text":"Giá trị thặng dư là bộ phận giá trị mới dôi ra ngoài giá trị sức lao động do công nhân tạo ra.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":18}},"num":164},{"id":"C03-Q012","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Lao động tất yếu và lao động thặng dư","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Trong một ngày lao động, thời gian lao động tất yếu và thời gian lao động thặng dư được phân biệt như thế nào?","options":["Thời gian tất yếu chuyển giá trị máy móc; thời gian thặng dư chuyển giá trị nguyên liệu","Thời gian tất yếu tạo giá trị bù đắp sức lao động; thời gian thặng dư tạo phần giá trị dôi ra","Thời gian tất yếu diễn ra trong lưu thông; thời gian thặng dư diễn ra ngoài sản xuất","Thời gian tất yếu thuộc nhà tư bản; thời gian thặng dư được hoàn trả toàn bộ cho công nhân"],"answer":1,"explanation":"Người lao động chỉ cần một phần ngày lao động để tạo lượng giá trị ngang với giá trị sức lao động. Phần thời gian còn lại tạo ra giá trị thặng dư cho người mua sức lao động.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":79,"text":"Thời gian lao động tất yếu bù đắp giá trị sức lao động; thời gian vượt quá đó là thời gian lao động thặng dư."},"num":165},{"id":"C03-Q013","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tính giá trị thặng dư","difficulty":"Vận dụng","kind":"van_dung_tinh_toan","stem":"Một cơ sở dùng 100 triệu đồng nguyên liệu, 10 triệu đồng hao mòn máy móc và 30 triệu đồng mua sức lao động. Hàng hóa làm ra có giá trị 170 triệu đồng. Giá trị thặng dư là bao nhiêu?","options":["60 triệu đồng","20 triệu đồng","40 triệu đồng","30 triệu đồng"],"answer":3,"explanation":"Tổng giá trị tư bản đã tiêu dùng là 100 + 10 + 30 = 140 triệu đồng. Vì G = c + v + m nên m = 170 - 140 = 30 triệu đồng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":81,"text":"Giá trị thặng dư là phần chênh lệch giữa giá trị sản phẩm và tổng giá trị tư bản đã tiêu dùng trong ví dụ sản xuất sợi."},"num":166},{"id":"C03-Q014","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Vai trò hai mặt của lao động trong sản xuất","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Trong quá trình sản xuất giá trị thặng dư, lao động cụ thể và lao động trừu tượng của công nhân có vai trò nào?","options":["Lao động cụ thể chuyển giá trị tư liệu sản xuất; lao động trừu tượng tạo giá trị mới v + m","Lao động cụ thể tạo riêng phần v; lao động trừu tượng chỉ tạo hình nguyên liệu có giá trị chuyển toàn bộ","Mua hàng hóa sức lao động tạo ra giá trị mới lớn hơn","Mua tư liệu sản xuất có giá trị được bảo tồn nhưng không tăng"],"answer":2,"explanation":"Tư bản khả biến, ký hiệu v, dùng mua sức lao động. Thông qua lao động trừu tượng của công nhân, bộ phận này tái hiện và tăng thêm về lượng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":83,"text":"Tư bản khả biến tồn tại dưới hình thái sức lao động và biến đổi về số lượng trong quá trình sản xuất.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":19}},"num":169},{"id":"C03-Q017","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Vai trò của tư bản bất biến","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Nhận định nào đúng về vai trò của máy móc và nguyên liệu đối với giá trị thặng dư?","options":["Chúng không tạo giá trị thặng dư nhưng là điều kiện cần để quá trình tạo giá trị thặng dư diễn ra","Chúng trực tiếp tạo ra toàn bộ giá trị mới và giá trị thặng dư","Chúng không tham gia quá trình sản xuất mà chỉ tham gia lưu thông","Chúng tạo giá trị thặng dư ngay cả khi không có lao động sống vận hành"],"answer":0,"explanation":"Tư liệu sản xuất không tự tăng giá trị; giá trị của chúng chỉ được chuyển vào sản phẩm. Tuy vậy, chúng là điều kiện vật chất cần thiết để lao động sống tạo giá trị mới và giá trị thặng dư.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":82,"text":"Tư bản bất biến không tạo ra giá trị thặng dư nhưng là điều kiện cần thiết của quá trình này."},"num":170},{"id":"C03-Q018","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Bản chất tiền công","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Cách hiểu nào phản ánh đúng bản chất tiền công trong chủ nghĩa tư bản?","options":["Tiền công là giá cả của toàn bộ sản phẩm mà công nhân tạo ra","Tiền công là giá cả của toàn bộ lao động đã hao phí trong ngày","Tiền công là giá cả hàng hóa sức lao động và thuộc phần giá trị mới do công nhân tạo ra","Tiền công là phần giá trị tư liệu sản xuất được công nhân chuyển vào sản phẩm"],"answer":2,"explanation":"Tiền công biểu hiện như khoản người mua sức lao động trả, nhưng nguồn của nó nằm trong giá trị mới do chính lao động làm thuê tạo ra. Nó là giá cả của sức lao động, không phải giá cả của toàn bộ lao động đã hao phí.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":84,"text":"Tiền công là giá cả hàng hóa sức lao động và là bộ phận giá trị mới do người lao động làm thuê tạo ra.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":20}},"num":171},{"id":"C03-Q019","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Thực hiện giá trị thặng dư","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Điều kiện trực tiếp để giá trị thặng dư chứa trong hàng hóa được thực hiện dưới hình thái tiền là gì?","options":["Người lao động phải sở hữu toàn bộ tư liệu sản xuất","Máy móc phải được khấu hao hết ngay trong một chu kỳ","Hàng hóa phải bán được và được thị trường chấp nhận","Tư bản phải dừng lại ở hình thái hàng hóa H'"],"answer":2,"explanation":"Sản xuất tạo ra H' có chứa giá trị thặng dư, nhưng chỉ khi H' bán được thì nhà tư bản mới thu T' và thực hiện giá trị thặng dư dưới hình thái tiền.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":85,"text":"Muốn thực hiện giá trị thặng dư dưới hình thái tiền, hàng hóa đã sản xuất phải được bán đi."},"num":172},{"id":"C03-Q020","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tuần hoàn của tư bản","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Tuần hoàn của tư bản là sự vận động lần lượt qua những hình thái nào?","options":["Tư bản tiền tệ, tư bản hàng hóa và tư bản sản xuất rồi dừng ở sản xuất","Tư bản tiền tệ, tư bản sản xuất và tư bản hàng hóa rồi trở về hình thái ban đầu","Tư bản sản xuất, tư bản tiền tệ và tư bản hàng hóa rồi dừng ở hàng hóa","Tư bản hàng hóa, tư bản sản xuất và tư bản tiền tệ rồi không trở về hình thái đầu"],"answer":1,"explanation":"Trong tuần hoàn, tư bản lần lượt mang ba hình thái để thực hiện các chức năng chuẩn bị sản xuất, sản xuất và thực hiện giá trị, sau đó quay về hình thái ban đầu cùng giá trị thặng dư.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":85,"text":"Tuần hoàn tư bản trải qua ba hình thái: tư bản tiền tệ, tư bản sản xuất và tư bản hàng hóa.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":21}},"num":173},{"id":"C03-Q021","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Các giai đoạn tuần hoàn tư bản","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Mô tả nào ghép đúng giai đoạn và chức năng trong tuần hoàn T - H → SX → H' - T'?","options":["T - H thực hiện giá trị thặng dư; SX mua đầu vào; H' - T' tạo sức lao động","T - H tạo hàng hóa mới; SX bán hàng; H' - T' mua tư liệu sản xuất","T - H thực hiện giá trị hàng hóa; SX chuyển tư bản hàng hóa thành tiền; H' - T' tạo giá trị thặng dư","T - H chuẩn bị yếu tố sản xuất; SX tạo H' chứa giá trị thặng dư; H' - T' thực hiện giá trị"],"answer":3,"explanation":"T - H chuyển tư bản tiền tệ thành các yếu tố sản xuất. Trong SX, lao động kết hợp tư liệu sản xuất tạo H'; bán H' ở giai đoạn cuối đưa tư bản trở về T' và hiện thực hóa giá trị thặng dư.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":85,"text":"Mô hình tuần hoàn là T - H → SX → H' - T', trong đó H' chứa và T' biểu hiện giá trị thặng dư.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":21}},"num":174},{"id":"C03-Q022","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Chu chuyển của tư bản","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Chu chuyển của tư bản được hiểu là gì?","options":["Tuần hoàn tư bản xét như quá trình định kỳ, thường xuyên lặp lại và đổi mới theo thời gian","Một lần mua bán hàng hóa tách khỏi quá trình sản xuất","Sự chuyển riêng giá trị máy móc vào sản phẩm theo khấu hao","Sự phân chia giá trị thặng dư thành lợi nhuận, lợi tức và địa tô"],"answer":0,"explanation":"Chu chuyển nhấn mạnh tính lặp lại định kỳ của tuần hoàn theo thời gian. Nó được đo bằng thời gian chu chuyển hoặc tốc độ chu chuyển.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":86,"text":"Chu chuyển là tuần hoàn tư bản được xét như quá trình định kỳ, thường xuyên lặp lại và đổi mới.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":22}},"num":175},{"id":"C03-Q023","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tốc độ chu chuyển của tư bản","difficulty":"Vận dụng","kind":"van_dung_tinh_toan","stem":"Một tư bản hoàn thành một vòng chu chuyển trong 3 tháng. Lấy một năm bằng 12 tháng, tốc độ chu chuyển của tư bản đó là bao nhiêu?","options":["3 vòng/năm","6 vòng/năm","4 vòng/năm","12 vòng/năm"],"answer":2,"explanation":"Áp dụng n = CH/ch, ta có n = 12 tháng / 3 tháng = 4 vòng/năm.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":87,"text":"Tốc độ chu chuyển được tính bằng n = CH/ch, trong đó ch là thời gian một vòng chu chuyển.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":23}},"num":176},{"id":"C03-Q024","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tư bản cố định và tư bản lưu động","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Tiêu chí nào phân biệt đúng tư bản cố định với tư bản lưu động?","options":["Tư bản cố định chuyển giá trị từng phần; tư bản lưu động chuyển toàn bộ giá trị sau mỗi quá trình sản xuất","Tư bản cố định tạo giá trị mới; tư bản lưu động chỉ bảo tồn giá trị cũ","Tư bản cố định chỉ tồn tại trong lưu thông; tư bản lưu động chỉ tồn tại ngoài lưu thông","Tư bản cố định dùng mua sức lao động; tư bản lưu động chỉ dùng mua máy móc"],"answer":0,"explanation":"Tư liệu lao động tham gia toàn bộ quá trình nhưng giá trị chuyển dần theo hao mòn. Sức lao động, nguyên liệu và vật liệu phụ chuyển giá trị một lần, toàn phần sau từng quá trình sản xuất.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":87,"text":"Tư bản cố định chuyển giá trị dần từng phần, còn tư bản lưu động chuyển một lần toàn phần vào sản phẩm."},"num":177},{"id":"C03-Q025","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Hao mòn tư bản cố định","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Hao mòn hữu hình và hao mòn vô hình của tư bản cố định khác nhau ở điểm nào?","options":["Hữu hình do giá thị trường tăng; vô hình do máy móc được sử dụng nhiều hơn","Hữu hình do sử dụng và tự nhiên; vô hình do năng suất tăng và tư liệu lao động mới xuất hiện","Hữu hình chỉ làm mất giá; vô hình chỉ làm mất giá trị sử dụng vật chất","Hữu hình phát sinh trong lưu thông; vô hình chỉ phát sinh khi bán sản phẩm"],"answer":1,"explanation":"Hao mòn hữu hình gắn với sự suy giảm vật chất và giá trị do sử dụng hoặc tự nhiên. Hao mòn vô hình là sự mất giá thuần túy khi công nghệ sản xuất tư liệu lao động tiến bộ hoặc thế hệ máy mới hiệu quả hơn xuất hiện.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":87,"text":"Hao mòn cố định gồm hao mòn hữu hình do sử dụng, tự nhiên và hao mòn vô hình do tiến bộ năng suất, công nghệ."},"num":178},{"id":"C03-Q026","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tỷ suất giá trị thặng dư","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Công thức tính tỷ suất giá trị thặng dư theo giá trị là công thức nào?","options":["m' = v/m × 100%","m' = m/(c + v) × 100%","m' = m/v × 100%","m' = (c + v)/m × 100%"],"answer":2,"explanation":"Tỷ suất giá trị thặng dư là tỷ lệ phần trăm giữa giá trị thặng dư m và tư bản khả biến v đã sản xuất ra lượng m đó.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":89,"text":"Tỷ suất giá trị thặng dư được tính theo công thức m' = m/v × 100%.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":26}},"num":179},{"id":"C03-Q027","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tỷ suất và khối lượng giá trị thặng dư","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Tỷ suất giá trị thặng dư và khối lượng giá trị thặng dư phản ánh hai mặt nào?","options":["Tỷ suất phản ánh trình độ khai thác sức lao động; khối lượng phản ánh quy mô giá trị thặng dư thu được","Tỷ suất phản ánh quy mô tư bản bất biến; khối lượng phản ánh tốc độ hao mòn máy móc","Tỷ suất phản ánh giá cả hàng hóa; khối lượng phản ánh giá trị sử dụng của hàng hóa","Tỷ suất phản ánh số vòng chu chuyển; khối lượng phản ánh thời gian một vòng"],"answer":0,"explanation":"m' là số đo tương đối cho biết quan hệ giữa lao động thặng dư và lao động tất yếu. M là số tuyệt đối bằng tiền cho biết tổng quy mô giá trị thặng dư chủ sở hữu thu được.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":90,"text":"Tỷ suất phản ánh trình độ khai thác sức lao động, còn khối lượng phản ánh quy mô giá trị thặng dư thu được."},"num":180},{"id":"C03-Q028","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tính tỷ suất giá trị thặng dư theo thời gian","difficulty":"Vận dụng","kind":"van_dung_tinh_toan","stem":"Một ngày lao động gồm 3 giờ lao động tất yếu và 5 giờ lao động thặng dư. Tỷ suất giá trị thặng dư bằng bao nhiêu?","options":["166,67%","100,00%","125,00%","60,00%"],"answer":0,"explanation":"Theo công thức m' = t'/t × 100%, ta có m' = 5/3 × 100% = 166,67%.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":90,"text":"Tỷ suất giá trị thặng dư có thể tính bằng tỷ lệ t'/t × 100%."},"num":181},{"id":"C03-Q029","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tính khối lượng giá trị thặng dư","difficulty":"Vận dụng","kind":"van_dung_tinh_toan","stem":"Một doanh nghiệp sử dụng tổng tư bản khả biến 400 triệu đồng và đạt tỷ suất giá trị thặng dư 150%. Khối lượng giá trị thặng dư là bao nhiêu?","options":["266,67 triệu đồng","400 triệu đồng","600 triệu đồng","550 triệu đồng"],"answer":2,"explanation":"Đổi 150% thành 1,5 rồi áp dụng M = m' × V: M = 1,5 × 400 = 600 triệu đồng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":90,"text":"Khối lượng giá trị thặng dư được tính bằng M = m' × V.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":29}},"num":182},{"id":"C03-Q030","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Quan hệ giữa tỷ suất và khối lượng giá trị thặng dư","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Nhận định nào đúng về quan hệ giữa m', V và M?","options":["V không đổi thì m' tăng làm M tăng; m' giảm vẫn có thể đi cùng M tăng nếu V tăng đủ lớn","V không đổi thì m' tăng làm M giảm; m' giảm luôn làm M tăng","M chỉ phụ thuộc V nên mọi thay đổi của m' đều không có tác động","M chỉ phụ thuộc m' nên tăng số lao động không thể làm M thay đổi"],"answer":0,"explanation":"Do M = m' × V, khi V cố định thì M biến thiên cùng chiều với m'. Nếu cả hai cùng thay đổi, mức tăng đủ lớn của V có thể bù quá mức giảm của m'.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":90,"text":"Khối lượng giá trị thặng dư là tích số giữa tỷ suất giá trị thặng dư và tổng tư bản khả biến.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":30}},"num":183},{"id":"C03-Q031","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Bản chất kinh tế - xã hội của giá trị thặng dư","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một nhà tư bản trả đúng giá trị hàng hóa sức lao động theo hợp đồng. Trong sản xuất, công nhân tạo ra lượng giá trị mới lớn hơn giá trị sức lao động và phần dôi ra thuộc nhà tư bản. Kết luận nào phù hợp với phân tích của C. Mác?","options":["Trao đổi sức lao động ngang giá làm cho giá trị thặng dư không thể xuất hiện","Quy luật trao đổi ngang giá vẫn có thể được tuân thủ, còn giá trị thặng dư phát sinh từ lao động sống trong sản xuất","Giá trị thặng dư do máy móc tự tạo ra vì máy móc thuộc sở hữu của nhà tư bản","Giá trị thặng dư chỉ là khoản chuyển từ người mua sang người bán do mua rẻ, bán đắt"],"answer":1,"explanation":"Việc mua sức lao động có thể diễn ra đúng giá trị, nhưng giá trị sử dụng đặc biệt của nó tạo ra giá trị mới lớn hơn trong sản xuất. Phần dôi ra bắt nguồn từ lao động sống, qua đó biểu hiện quan hệ giữa người mua và người bán sức lao động.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":89,"text":"Nhà tư bản có thể tuân thủ trao đổi ngang giá, nhưng giá trị thặng dư vẫn được lao động sống tạo ra trong sản xuất chứ không phải do máy móc."},"num":184},{"id":"C03-Q032","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Giá trị thặng dư tuyệt đối","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Giá trị thặng dư tuyệt đối được tạo ra bằng cách nào?","options":["Rút ngắn thời gian lao động thặng dư trong khi ngày lao động không đổi","Hạ giá trị cá biệt của hàng hóa thấp hơn giá trị xã hội","Tăng tổng tư bản khả biến bằng cách thuê thêm lao động trong khi tỷ lệ thời gian lao động không đổi","Kéo dài ngày lao động vượt thời gian tất yếu khi năng suất và giá trị sức lao động không đổi"],"answer":3,"explanation":"Phương pháp tuyệt đối làm tăng phần lao động thặng dư bằng cách kéo dài ngày lao động, trong khi thời gian lao động tất yếu và các điều kiện nêu trong định nghĩa vẫn không đổi.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":90,"text":"Giá trị thặng dư tuyệt đối thu được do kéo dài ngày lao động vượt thời gian tất yếu khi các điều kiện khác không đổi.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":31}},"num":185},{"id":"C03-Q033","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Giới hạn của ngày lao động","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao nhà tư bản không thể kéo dài ngày lao động và tăng cường độ lao động vô hạn?","options":["Vì thời gian lao động tất yếu luôn bằng toàn bộ ngày tự nhiên","Vì kéo dài ngày lao động luôn làm giá trị sức lao động bằng không","Vì mọi quốc gia đều ấn định một độ dài ngày lao động giống hệt nhau","Vì có giới hạn thể chất, tinh thần của người lao động và sự đấu tranh về độ dài ngày lao động"],"answer":3,"explanation":"Con người cần thời gian ăn, ngủ, nghỉ ngơi và cường độ lao động chịu giới hạn sức chịu đựng. Xung đột lợi ích còn dẫn tới đấu tranh xác lập độ dài ngày lao động trong từng điều kiện lịch sử.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":91,"text":"Ngày lao động và cường độ lao động bị giới hạn bởi thể chất, tinh thần và đấu tranh của công nhân."},"num":186},{"id":"C03-Q034","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tính tỷ suất giá trị thặng dư tuyệt đối","difficulty":"Vận dụng","kind":"van_dung_tinh_toan","stem":"Ngày lao động ban đầu dài 8 giờ, trong đó lao động tất yếu là 4 giờ. Nếu ngày lao động tăng lên 10 giờ còn thời gian tất yếu không đổi, tỷ suất giá trị thặng dư mới là bao nhiêu?","options":["100%","200%","150%","250%"],"answer":2,"explanation":"Thời gian lao động thặng dư mới là 10 - 4 = 6 giờ. Do đó m' = 6/4 × 100% = 150%.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":91,"text":"Ví dụ kéo dài ngày lao động từ 8 lên 10 giờ với 4 giờ tất yếu làm m' tăng lên 150%.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":31}},"num":187},{"id":"C03-Q035","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Giá trị thặng dư tương đối","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Đặc trưng của phương pháp sản xuất giá trị thặng dư tương đối là gì?","options":["Kéo dài thời gian lao động tất yếu và rút ngắn thời gian thặng dư trong ngày lao động không đổi","Kéo dài ngày lao động trong khi giữ nguyên thời gian tất yếu","Tăng số người lao động nhưng giữ nguyên thời gian tất yếu và thặng dư của mỗi người","Rút ngắn thời gian lao động tất yếu để kéo dài thời gian thặng dư trong một ngày lao động không tăng"],"answer":3,"explanation":"Giá trị sức lao động giảm làm thời gian tất yếu ngắn lại. Vì tổng ngày lao động không tăng, phần lao động thặng dư tương ứng dài hơn.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":91,"text":"Giá trị thặng dư tương đối có được nhờ rút ngắn thời gian tất yếu và kéo dài thời gian thặng dư.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":32}},"num":188},{"id":"C03-Q036","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tính tỷ suất giá trị thặng dư tương đối","difficulty":"Vận dụng","kind":"van_dung_tinh_toan","stem":"Một ngày lao động dài 8 giờ. Sau khi năng suất xã hội tăng, thời gian lao động tất yếu giảm từ 4 giờ xuống 2 giờ. Tỷ suất giá trị thặng dư mới là bao nhiêu?","options":["150%","200%","400%","300%"],"answer":3,"explanation":"Ngày lao động vẫn là 8 giờ nên thời gian thặng dư mới là 8 - 2 = 6 giờ. m' = 6/2 × 100% = 300%.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":92,"text":"Khi ngày lao động 8 giờ và thời gian tất yếu giảm còn 2 giờ, thời gian thặng dư là 6 giờ và m' bằng 300%.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":32}},"num":189},{"id":"C03-Q037","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Giá trị thặng dư siêu ngạch","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Giá trị thặng dư siêu ngạch phát sinh trực tiếp từ điều kiện nào?","options":["Giá trị cá biệt của hàng hóa cao hơn giá trị xã hội do năng suất thấp hơn","Giá trị cá biệt của hàng hóa thấp hơn giá trị xã hội nhờ năng suất cá biệt cao hơn","Mọi doanh nghiệp cùng lúc có giá trị cá biệt bằng giá trị xã hội","Giá bán hàng hóa thấp hơn cả chi phí sản xuất của doanh nghiệp"],"answer":1,"explanation":"Doanh nghiệp đi đầu về kỹ thuật có năng suất cao, làm giá trị cá biệt thấp hơn giá trị xã hội nhưng vẫn bán theo mức xã hội. Phần chênh lệch tạo giá trị thặng dư siêu ngạch.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":92,"text":"Xí nghiệp có giá trị cá biệt thấp hơn giá trị xã hội thu được phần giá trị thặng dư trội hơn.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":34}},"num":190},{"id":"C03-Q038","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tính chất của giá trị thặng dư siêu ngạch","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Nhận định nào mô tả đúng tính chất của giá trị thặng dư siêu ngạch?","options":["Là hình thái của giá trị thặng dư tuyệt đối do kéo dài đồng loạt ngày lao động","Thường xuyên với từng xí nghiệp, tạm thời với toàn xã hội và độc lập với năng suất lao động","Chỉ có khi mọi xí nghiệp dùng cùng công nghệ và có cùng giá trị cá biệt","Tạm thời đối với từng xí nghiệp, thường xuyên xét toàn xã hội và là hình thái biến tướng của giá trị thặng dư tương đối"],"answer":3,"explanation":"Lợi thế của một xí nghiệp mất đi khi công nghệ phổ biến, nên mang tính tạm thời ở cấp cá biệt. Nhưng luôn có những đơn vị đổi mới trước, nên hiện tượng tồn tại thường xuyên ở cấp xã hội và thúc đẩy giá trị thặng dư tương đối.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":92,"text":"Giá trị thặng dư siêu ngạch tạm thời ở đơn vị cá biệt, thường xuyên trong xã hội và là biến tướng của giá trị thặng dư tương đối.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":34}},"num":191},{"id":"C03-Q039","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tái sản xuất giản đơn và mở rộng","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Phân biệt nào đúng giữa tái sản xuất giản đơn và tái sản xuất mở rộng?","options":["Giản đơn làm quy mô tăng; mở rộng giữ nguyên quy mô","Giản đơn không lặp lại sản xuất; mở rộng chỉ lặp lại một lần","Giản đơn dùng toàn bộ giá trị thặng dư để mua máy; mở rộng dùng toàn bộ cho tiêu dùng","Giản đơn lặp lại quy mô cũ; mở rộng lặp lại với quy mô lớn hơn"],"answer":3,"explanation":"Trong tái sản xuất giản đơn, toàn bộ giá trị thặng dư được tiêu dùng cá nhân nên quy mô không đổi. Tái sản xuất mở rộng đòi hỏi biến một phần giá trị thặng dư thành tư bản phụ thêm.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":94,"text":"Tái sản xuất giản đơn lặp lại quy mô cũ, còn tái sản xuất mở rộng làm quy mô lớn hơn.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":37}},"num":192},{"id":"C03-Q040","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Bản chất tích lũy tư bản","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Bản chất của tích lũy tư bản là gì?","options":["Chuyển toàn bộ tư bản bất biến thành quỹ tiêu dùng cá nhân","Chuyển hóa một phần giá trị thặng dư thành tư bản phụ thêm để tái sản xuất mở rộng","Dùng toàn bộ giá trị thặng dư để duy trì nguyên quy mô sản xuất","Hợp nhất các tư bản cá biệt mà không làm thay đổi quy mô từng tư bản"],"answer":1,"explanation":"Tích lũy không phải chỉ là cất giữ tiền. Đó là tư bản hóa một phần giá trị thặng dư để mua thêm sức lao động, nguyên liệu, máy móc và mở rộng kinh doanh.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":94,"text":"Tích lũy tư bản là chuyển hóa một phần giá trị thặng dư thành tư bản phụ thêm để mở rộng sản xuất.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":38}},"num":193},{"id":"C03-Q041","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Phân chia quỹ tích lũy và quỹ tiêu dùng","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Khi khối lượng giá trị thặng dư không đổi, điều gì xảy ra nếu nhà tư bản tăng tỷ lệ dành cho quỹ tích lũy?","options":["Quy mô tích lũy giảm và quỹ tiêu dùng tăng","Quy mô tích lũy tăng và phần dành cho tiêu dùng cá nhân giảm","Cả quỹ tích lũy và quỹ tiêu dùng đều tăng bằng đúng một lượng","Tỷ lệ phân chia không ảnh hưởng đến quy mô tích lũy"],"answer":1,"explanation":"Một khối lượng giá trị thặng dư cố định được chia giữa tích lũy và tiêu dùng. Tăng tỷ trọng của một quỹ tất yếu làm giảm tỷ trọng quỹ còn lại và làm quy mô tích lũy tăng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":95,"text":"Với khối lượng giá trị thặng dư nhất định, quy mô tích lũy phụ thuộc tỷ lệ phân chia giữa tích lũy và tiêu dùng.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":39}},"num":194},{"id":"C03-Q042","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Quy mô tư bản ứng trước","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Trong điều kiện thị trường thuận lợi và hàng hóa bán được, đại lượng nào càng lớn càng tạo tiền đề tăng quy mô tích lũy?","options":["Thời gian của một vòng chu chuyển càng dài","Tỷ lệ giá trị thặng dư dành cho tiêu dùng càng lớn","Mức hao mòn vô hình của máy móc càng lớn","Đại lượng tư bản ứng trước"],"answer":3,"explanation":"Giáo trình xác định đại lượng tư bản ứng trước là một nhân tố của quy mô tích lũy. Khi đầu ra thuận lợi, tư bản ứng trước lớn tạo cơ sở thu khối lượng giá trị thặng dư và tích lũy lớn hơn.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":96,"text":"Khi thị trường thuận lợi, tư bản ứng trước càng lớn càng là tiền đề tăng quy mô tích lũy."},"num":195},{"id":"C03-Q043","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Năng suất lao động và tích lũy","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Chuỗi tác động nào giải thích việc năng suất lao động xã hội tăng có thể làm quy mô tích lũy tăng?","options":["Giá trị tư liệu sinh hoạt tăng → giá trị sức lao động tăng → giá trị thặng dư tăng","Giá trị tư liệu sinh hoạt giảm → giá trị sức lao động tăng → giá trị thặng dư giảm","Giá trị tư liệu sinh hoạt giảm → giá trị sức lao động giảm → giá trị thặng dư có điều kiện tăng","Giá trị tư liệu sinh hoạt không đổi → giá trị sức lao động tăng → tích lũy không đổi"],"answer":2,"explanation":"Năng suất tăng làm giá trị tư liệu sinh hoạt hạ xuống, từ đó giá trị sức lao động giảm. Trong các điều kiện khác không đổi, phần giá trị thặng dư tăng lên và tạo khả năng mở rộng tích lũy.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":95,"text":"Năng suất lao động tăng làm giảm giá trị tư liệu sinh hoạt và sức lao động, góp phần tăng giá trị thặng dư và tích lũy."},"num":196},{"id":"C03-Q044","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Chênh lệch giữa tư bản sử dụng và tư bản tiêu dùng","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao sử dụng hiệu quả máy móc có thể hỗ trợ mở rộng tích lũy trước khi phải thay máy?","options":["Vì máy móc chuyển toàn bộ giá trị trong một chu kỳ rồi tiếp tục hoạt động mà không cần đổi mới","Vì máy móc hoạt động toàn bộ công năng nhưng chuyển giá trị dần, còn quỹ khấu hao chưa dùng có thể hỗ trợ mở rộng","Vì máy móc tự tạo giá trị mới lớn hơn phần khấu hao mà không cần lao động sống vận hành","Vì giá trị máy móc không chuyển vào sản phẩm nên toàn bộ doanh thu có thể đưa vào quỹ tích lũy"],"answer":1,"explanation":"Giá trị sử dụng của máy được huy động toàn bộ nhưng giá trị của nó chỉ chuyển dần qua khấu hao. Khi chưa đến lúc đổi máy, quỹ khấu hao tích tụ có thể trở thành nguồn tài chính tạm thời cho mở rộng sản xuất.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":96,"text":"Quỹ khấu hao tăng lên khi chưa cần đổi tư bản cố định có thể trở thành nguồn tài chính mở rộng sản xuất."},"num":197},{"id":"C03-Q045","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Cấu tạo hữu cơ của tư bản","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Cấu tạo hữu cơ của tư bản được biểu hiện bằng tỷ lệ nào?","options":["m/v","v/c","c/v","t'/t"],"answer":2,"explanation":"Cấu tạo hữu cơ là cấu tạo giá trị do cấu tạo kỹ thuật quyết định và phản ánh sự biến đổi của cấu tạo kỹ thuật; nó được ký hiệu bằng tỷ lệ c/v.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":96,"text":"Cấu tạo hữu cơ của tư bản là cấu tạo giá trị do cấu tạo kỹ thuật quyết định, ký hiệu c/v.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":41}},"num":198},{"id":"C03-Q046","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tích tụ và tập trung tư bản","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Khác biệt cốt lõi giữa tích tụ tư bản và tập trung tư bản là gì?","options":["Tích tụ hợp nhất các tư bản đã có nên không tăng tư bản xã hội; tập trung tư bản hóa m nên làm tư bản xã hội tăng","Tích tụ làm tăng tư bản xã hội nhưng không tăng tư bản cá biệt; tập trung làm giảm cả hai loại quy mô tư bản","Tích tụ tư bản hóa m nên tăng tư bản cá biệt và xã hội; tập trung hợp nhất tư bản nên chỉ tăng tư bản cá biệt","Tích tụ diễn ra bằng sáp nhập các tư bản cá biệt; tập trung diễn ra bằng tích lũy m trong từng doanh nghiệp"],"answer":2,"explanation":"Tích tụ bổ sung tư bản mới từ giá trị thặng dư nên quy mô tư bản xã hội tăng. Tập trung chỉ tổ chức lại các tư bản đã có thành một tư bản cá biệt lớn hơn, không làm tổng tư bản xã hội tăng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":97,"text":"Tích tụ làm tăng tư bản cá biệt và xã hội; tập trung do hợp nhất chỉ làm tăng quy mô tư bản cá biệt.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":41}},"num":199},{"id":"C03-Q047","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Nhận diện tích tụ và tập trung tư bản","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Doanh nghiệp A dùng giá trị thặng dư giữ lại để mua thêm máy và thuê thêm lao động. Hai doanh nghiệp B và C sáp nhập thành một doanh nghiệp lớn nhưng không tạo thêm tư bản xã hội tại thời điểm sáp nhập. Hai trường hợp lần lượt là gì?","options":["Tích tụ tư bản; tập trung tư bản","Tập trung tư bản; tích tụ tư bản","Tái sản xuất giản đơn; tích tụ tư bản","Tập trung tư bản; tái sản xuất giản đơn"],"answer":0,"explanation":"A tăng quy mô bằng cách tư bản hóa giá trị thặng dư nên là tích tụ. B và C hợp nhất các tư bản đã có thành một tư bản cá biệt lớn hơn nên là tập trung.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":97,"text":"Tích tụ dựa trên tư bản hóa giá trị thặng dư, còn tập trung được thực hiện bằng hợp nhất các tư bản cá biệt."},"num":200},{"id":"C03-Q048","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Bần cùng hóa tương đối và tuyệt đối","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Biểu hiện nào phân biệt đúng bần cùng hóa tương đối với bần cùng hóa tuyệt đối?","options":["Tương đối là thu nhập công nhân có thể tăng nhưng tỷ trọng giảm; tuyệt đối là mức sống thực tế sụt giảm","Tương đối là mức sống giảm tuyệt đối; tuyệt đối là tỷ trọng của công nhân tăng","Tương đối chỉ xảy ra khi thất nghiệp; tuyệt đối chỉ xảy ra khi kinh tế tăng trưởng","Tương đối và tuyệt đối đều chỉ có nghĩa là tiền công danh nghĩa không đổi"],"answer":0,"explanation":"Bần cùng hóa tương đối nói về phần phân phối của công nhân giảm so với phần của tư sản dù mức tuyệt đối có thể tăng. Bần cùng hóa tuyệt đối là mức sống giảm thực sự, thường rõ trong thất nghiệp hoặc khủng hoảng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":98,"text":"Bần cùng hóa tương đối là tỷ trọng phân phối giảm dù mức tuyệt đối có thể tăng; bần cùng hóa tuyệt đối là mức sống sụt giảm."},"num":201},{"id":"C03-Q049","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Chi phí sản xuất tư bản chủ nghĩa","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Chi phí sản xuất tư bản chủ nghĩa k được xác định như thế nào?","options":["k = c + m, gồm tư liệu sản xuất và giá trị thặng dư","k = v + m, gồm sức lao động và giá trị thặng dư","k = c + v, gồm tư liệu sản xuất đã tiêu dùng và sức lao động đã sử dụng","k = c + v + m, bằng toàn bộ giá trị hàng hóa"],"answer":2,"explanation":"Chi phí sản xuất là phần giá trị bù lại giá cả tư liệu sản xuất đã tiêu dùng và sức lao động đã sử dụng. Vì vậy k = c + v, còn giá trị hàng hóa G = k + m.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":99,"text":"Chi phí sản xuất ký hiệu k, về lượng bằng c + v.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":43}},"num":202},{"id":"C03-Q050","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tính chi phí sản xuất và giá trị hàng hóa","difficulty":"Vận dụng","kind":"van_dung_tinh_toan","stem":"Một máy trị giá 600 triệu đồng được dùng đều trong 6 chu kỳ; mỗi chu kỳ còn tiêu dùng 400 triệu đồng nguyên liệu và 100 triệu đồng tư bản khả biến. Nếu m' = 100%, cặp chi phí sản xuất k và giá trị hàng hóa G của một chu kỳ là bao nhiêu?","options":["k = 500 triệu; G = 600 triệu","k = 600 triệu; G = 700 triệu","k = 700 triệu; G = 800 triệu","k = 1.100 triệu; G = 1.200 triệu"],"answer":1,"explanation":"Khấu hao máy mỗi chu kỳ là 600/6 = 100 triệu; c tiêu dùng = 100 + 400 = 500 triệu. k = c + v = 500 + 100 = 600 triệu; m = 100% × 100 = 100 triệu; G = k + m = 700 triệu.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":99,"text":"Chi phí tính phần khấu hao máy, nguyên liệu và tư bản khả biến; giá trị hàng hóa bằng k cộng m."},"num":203},{"id":"C03-Q051","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Bản chất lợi nhuận","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Theo C. Mác, lợi nhuận là gì?","options":["Hình thái chuyển hóa của giá trị thặng dư, được quan niệm như con đẻ của toàn bộ tư bản ứng trước","Hình thái hoàn trả của tư bản bất biến đã tiêu dùng trong sản xuất","Hình thái chuyển hóa của tiền công khi hàng hóa được bán đúng giá trị","Hình thái chênh lệch giữa tư bản cố định đã dùng và phần khấu hao"],"answer":0,"explanation":"Trên bề mặt kinh doanh, khoản chênh lệch giữa giá trị hàng hóa và chi phí sản xuất xuất hiện như lợi nhuận do toàn bộ tư bản sinh ra. Về bản chất, đó là giá trị thặng dư đã chuyển hóa hình thái.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":100,"text":"Lợi nhuận là hình thái chuyển hóa của giá trị thặng dư, được quan niệm là con đẻ của toàn bộ tư bản ứng trước.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":44}},"num":204},{"id":"C03-Q052","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Giá bán, chi phí và lợi nhuận","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Một hàng hóa có chi phí sản xuất 80 triệu đồng và giá trị 100 triệu đồng. Nếu bán với giá 90 triệu đồng, kết luận nào đúng?","options":["Không có lợi nhuận vì giá bán thấp hơn giá trị","Có lợi nhuận 20 triệu đồng vì lợi nhuận luôn bằng giá trị thặng dư","Có lợi nhuận 10 triệu đồng, nhỏ hơn giá trị thặng dư 20 triệu đồng","Bị lỗ 10 triệu đồng vì giá bán thấp hơn giá trị"],"answer":2,"explanation":"Lợi nhuận cá biệt tính theo giá bán trừ chi phí: 90 - 80 = 10 triệu đồng. Giá trị thặng dư chứa trong hàng hóa là 100 - 80 = 20 triệu đồng, nên lợi nhuận thực hiện nhỏ hơn m dù doanh nghiệp vẫn có lãi.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":101,"text":"Bán thấp hơn giá trị nhưng cao hơn chi phí sản xuất vẫn có lợi nhuận, khi đó lợi nhuận nhỏ hơn giá trị thặng dư."},"num":205},{"id":"C03-Q053","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tỷ suất lợi nhuận","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Công thức và ý nghĩa đúng của tỷ suất lợi nhuận là gì?","options":["p' = p/v × 100%, phản ánh trình độ khai thác sức lao động","p' = p/c × 100%, phản ánh tốc độ chu chuyển","p' = p/(c + v) × 100%, phản ánh mức doanh lợi của tư bản đầu tư","p' = (c + v)/p × 100%, phản ánh quy mô chi phí"],"answer":2,"explanation":"Tỷ suất lợi nhuận so sánh lợi nhuận với toàn bộ tư bản ứng trước c + v. Đây là số đo tương đối phản ánh mức doanh lợi, khác với m' chỉ so m với v.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":101,"text":"Tỷ suất lợi nhuận p' = p/(c + v) × 100% và phản ánh mức doanh lợi đầu tư tư bản.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":46}},"num":206},{"id":"C03-Q054","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tính tỷ suất lợi nhuận","difficulty":"Vận dụng","kind":"van_dung_tinh_toan","stem":"Một doanh nghiệp ứng trước 800 triệu đồng tư bản bất biến và 200 triệu đồng tư bản khả biến, thu lợi nhuận 250 triệu đồng. Tỷ suất lợi nhuận là bao nhiêu?","options":["25%","22%","20%","30%"],"answer":0,"explanation":"Tổng tư bản ứng trước là 800 + 200 = 1.000 triệu đồng. p' = 250/1.000 × 100% = 25%.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":101,"text":"Tỷ suất lợi nhuận là tỷ lệ phần trăm giữa lợi nhuận và toàn bộ tư bản ứng trước."},"num":207},{"id":"C03-Q055","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Nhân tố ảnh hưởng tỷ suất lợi nhuận","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Giữ nguyên tư bản khả biến và giá trị thặng dư, thay đổi nào làm tỷ suất lợi nhuận tăng?","options":["Tăng tư bản bất biến đã sử dụng","Tăng đồng thời c và v với lợi nhuận không đổi","Giảm lợi nhuận trong khi tổng tư bản không đổi","Tiết kiệm tư bản bất biến để giảm mẫu số c + v"],"answer":3,"explanation":"Với p và v không đổi, p' = p/(c + v) × 100%. Tiết kiệm c làm tổng tư bản ứng trước giảm, vì vậy tỷ suất lợi nhuận tăng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":102,"text":"Trong điều kiện v không đổi và m giữ nguyên, tiết kiệm tư bản bất biến làm tăng tỷ suất lợi nhuận.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":48}},"num":208},{"id":"C03-Q056","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Lợi nhuận bình quân","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Lợi nhuận bình quân là gì và được hình thành chủ yếu qua cơ chế nào?","options":["Số lợi nhuận khác nhau của những tư bản bằng nhau ở các ngành khác nhau, hình thành khi vốn ngừng di chuyển","Số lợi nhuận bằng nhau của những tư bản bằng nhau ở các ngành khác nhau, hình thành qua cạnh tranh giữa các ngành","Số lợi nhuận bằng nhau của những tư bản bằng nhau trong cùng một ngành, hình thành chỉ qua cạnh tranh nội bộ ngành","Số lợi nhuận tỷ lệ với tư bản khả biến của từng ngành, hình thành mà không cần tư bản tự do di chuyển"],"answer":1,"explanation":"Chênh lệch tỷ suất lợi nhuận thúc đẩy tư bản di chuyển giữa các ngành. Quá trình đó làm các tỷ suất tiến gần nhau và tạo lợi nhuận bình quân cho các tư bản có quy mô bằng nhau.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":104,"text":"Cạnh tranh giữa các ngành hình thành lợi nhuận bình quân, tức lợi nhuận bằng nhau của những tư bản bằng nhau.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":49}},"num":209},{"id":"C03-Q057","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tính tỷ suất lợi nhuận bình quân","difficulty":"Vận dụng","kind":"van_dung_tinh_toan","stem":"Ngành A có tư bản 200 tỷ đồng và tỷ suất lợi nhuận 20%; ngành B có tư bản 300 tỷ đồng và tỷ suất lợi nhuận 40%. Tỷ suất lợi nhuận bình quân gia quyền là bao nhiêu?","options":["30%","32%","36%","60%"],"answer":1,"explanation":"Lợi nhuận A = 200 × 20% = 40 tỷ; lợi nhuận B = 300 × 40% = 120 tỷ. Tỷ suất bình quân = (40 + 120)/(200 + 300) × 100% = 32%.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":104,"text":"Tỷ suất lợi nhuận bình quân được tính bằng số bình quân gia quyền của các tỷ suất lợi nhuận."},"num":210},{"id":"C03-Q058","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Giá cả sản xuất","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Khi lợi nhuận chuyển hóa thành lợi nhuận bình quân, giá trị hàng hóa chuyển hóa thành giá cả sản xuất theo quan hệ nào?","options":["Giá cả sản xuất = k + lợi nhuận bình quân","Giá cả sản xuất = k + lợi tức cho vay","Giá cả sản xuất = giá trị hàng hóa + k","Giá cả sản xuất = k + tư bản khả biến"],"answer":0,"explanation":"Sự hình thành lợi nhuận bình quân làm giá trị hàng hóa chuyển thành giá cả sản xuất. Giá cả sản xuất gồm chi phí sản xuất k cộng lợi nhuận bình quân tương ứng với tư bản ứng trước.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":105,"text":"Khi lợi nhuận thành lợi nhuận bình quân, giá trị chuyển thành giá cả sản xuất: GCSX = k + lợi nhuận bình quân."},"num":211},{"id":"C03-Q059","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Lợi nhuận thương nghiệp","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Nguồn gốc của lợi nhuận thương nghiệp là gì?","options":["Giá trị mới do bản thân hành vi mua và bán tạo ra trong lưu thông","Khoản phụ giá cao hơn giá trị mà người tiêu dùng luôn phải trả","Khoản tiết kiệm chi phí lưu thông do riêng thương nhân tạo ra","Một phần giá trị thặng dư do sản xuất tạo ra được nhà tư bản sản xuất nhường cho nhà tư bản thương nghiệp"],"answer":3,"explanation":"Tư bản thương nghiệp giúp thực hiện hàng hóa nhưng lưu thông không tự tạo giá trị thặng dư. Lợi nhuận của nó là phần giá trị thặng dư trong sản xuất được phân chia để trả cho chức năng tiêu thụ.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":105,"text":"Lợi nhuận thương nghiệp là một phần giá trị thặng dư mà nhà tư bản sản xuất trả cho nhà tư bản thương nghiệp.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":50}},"num":212},{"id":"C03-Q060","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Cơ chế thực hiện lợi nhuận thương nghiệp","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Cơ chế nào cho phép nhà tư bản thương nghiệp có lợi nhuận mà vẫn bán hàng hóa đúng giá trị?","options":["Nhà tư bản sản xuất bán dưới giá trị nhưng trên k; thương nghiệp bán đúng giá trị và hưởng phần chênh lệch","Thương nghiệp mua dưới chi phí sản xuất rồi bán đúng chi phí, lấy phần giảm giá làm lợi nhuận","Nhà tư bản sản xuất bán đúng giá trị, còn thương nghiệp chỉ thu thêm lợi tức từ người mua","Thương nghiệp mua đúng giá trị rồi bán cao hơn giá trị để giữ toàn bộ khoản chênh lệch"],"answer":0,"explanation":"Nhà tư bản sản xuất giữ một phần lợi nhuận bằng cách bán cho thương nghiệp với giá cao hơn k nhưng thấp hơn giá trị. Thương nghiệp bán ở giá trị, và chênh lệch mua - bán là phần giá trị thặng dư được nhường lại.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":105,"text":"Nhà tư bản sản xuất bán cao hơn chi phí để thương nghiệp bán đúng giá trị và hưởng chênh lệch mua bán."},"num":213},{"id":"C03-Q061","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Lợi tức","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Lợi tức trong quan hệ tư bản cho vay là gì?","options":["Toàn bộ lợi nhuận bình quân người đi vay chuyển cho người cho vay","Phần tiền gốc người đi vay hoàn trả sau thời hạn sử dụng","Khoản tiền mua đứt quyền sở hữu tư bản của người cho vay","Một phần lợi nhuận bình quân người đi vay trả cho người cho vay vì sử dụng tư bản tiền tệ"],"answer":3,"explanation":"Người sử dụng vốn vay thu lợi nhuận trong hoạt động kinh doanh rồi trích một phần trả chủ sở hữu vốn. Về thực chất, lợi tức là một phần giá trị thặng dư được phân chia qua lợi nhuận bình quân.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":106,"text":"Lợi tức là một phần lợi nhuận bình quân người đi vay trả cho người cho vay vì sử dụng tiền nhàn rỗi.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":51}},"num":214},{"id":"C03-Q062","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tính lợi tức","difficulty":"Vận dụng","kind":"van_dung_tinh_toan","stem":"Một nhà tư bản vay 2 tỷ đồng trong một năm với tỷ suất lợi tức 8%/năm. Số lợi tức phải trả cuối năm là bao nhiêu?","options":["80 triệu đồng","160 triệu đồng","140 triệu đồng","120 triệu đồng"],"answer":1,"explanation":"Từ z' = z/TBCV × 100% suy ra z = z' × TBCV. Số lợi tức = 8% × 2 tỷ = 0,16 tỷ = 160 triệu đồng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":107,"text":"Tỷ suất lợi tức là tỷ lệ phần trăm giữa lợi tức và tư bản cho vay."},"num":215},{"id":"C03-Q063","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Hình thái tư bản cho vay","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Vì sao công thức vận động T - T' của tư bản cho vay dễ tạo ảo tưởng tiền tự sinh ra tiền?","options":["Vì công thức trình bày đầy đủ quá trình sử dụng sức lao động trong sản xuất","Vì công thức lược bỏ các khâu sản xuất và lưu thông trung gian, che khuất nguồn gốc giá trị thặng dư của lợi tức","Vì T' luôn nhỏ hơn T nên không cần giải thích phần chênh lệch","Vì người cho vay đồng thời là người trực tiếp tạo ra mọi hàng hóa"],"answer":1,"explanation":"T - T' chỉ biểu hiện tiền ứng ra quay về cùng một khoản tăng thêm. Khi quá trình kinh doanh của người đi vay bị che khuất, phần lợi tức có vẻ như do bản thân tiền sinh ra thay vì là phần giá trị thặng dư.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":107,"text":"Tư bản cho vay vận động theo T - T', tạo ảo tưởng tiền đẻ ra tiền và không phản ánh rõ nguồn gốc lợi tức."},"num":216},{"id":"C03-Q064","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Địa tô chênh lệch","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Mảnh đất A đem lại lợi thế vì độ màu mỡ tự nhiên và vị trí thuận lợi; mảnh đất B đem lại lợi thế sau khi được đầu tư thâm canh. Hai phần địa tô tương ứng là gì?","options":["A là địa tô chênh lệch II; B là địa tô chênh lệch I","A và B đều là địa tô chênh lệch II","A và B đều là địa tô chênh lệch I","A là địa tô chênh lệch I; B là địa tô chênh lệch II"],"answer":3,"explanation":"Địa tô chênh lệch I gắn với độ màu mỡ và điều kiện tự nhiên thuận lợi sẵn có. Địa tô chênh lệch II gắn với kết quả đầu tư, thâm canh làm tăng độ màu mỡ của đất.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":108,"text":"Địa tô chênh lệch I do điều kiện tự nhiên thuận lợi; chênh lệch II do đầu tư thâm canh làm tăng độ màu mỡ.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":52}},"num":217},{"id":"C03-Q065","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Tính giá cả đất đai","difficulty":"Vận dụng","kind":"van_dung_tinh_toan","stem":"Một mảnh đất đem lại địa tô 240 triệu đồng mỗi năm. Nếu tỷ suất lợi tức nhận gửi của ngân hàng là 6%/năm, giá cả đất đai theo công thức của giáo trình là bao nhiêu?","options":["1,44 tỷ đồng","2,4 tỷ đồng","14,4 tỷ đồng","4 tỷ đồng"],"answer":3,"explanation":"Giá cả đất đai = Địa tô / Tỷ suất lợi tức. Đổi 6% thành 0,06: 240 triệu / 0,06 = 4.000 triệu đồng = 4 tỷ đồng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":109,"text":"Về nguyên lý, giá cả đất đai được tính bằng địa tô chia cho tỷ suất lợi tức nhận gửi của ngân hàng."},"num":218},{"id":"C03-Q066","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Cách đo giá trị hàng hóa sức lao động","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Vì sức lao động chỉ tồn tại trong con người sống, lượng giá trị của hàng hóa này được xác định gián tiếp qua đâu?","options":["Lượng giá trị các tư liệu sinh hoạt cần thiết để tái sản xuất sức lao động","Lượng thời gian lao động cá biệt mà người lao động thực hiện mỗi ngày","Lượng giá trị tư liệu sản xuất mà người lao động sử dụng trong công việc","Mức giá bán các sản phẩm do người lao động trực tiếp làm ra"],"answer":0,"explanation":"Sức lao động chỉ tồn tại trong con người sống nên phải được tái sản xuất bằng một lượng tư liệu sinh hoạt nhất định. Vì vậy, giá trị sức lao động được đo gián tiếp bằng giá trị những tư liệu sinh hoạt cần thiết cho việc tái sản xuất đó.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":78,"text":"Giá trị hàng hóa sức lao động được đo lường gián tiếp thông qua giá trị các tư liệu sinh hoạt cần thiết để tái sản xuất sức lao động."},"num":219},{"id":"C03-Q067","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Điều kiện xã hội của sản xuất giá trị thặng dư","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Điều kiện về trình độ sản xuất nào làm cho thời gian lao động thặng dư có thể xuất hiện trong ngày lao động đã thỏa thuận?","options":["Người lao động phải dùng toàn bộ ngày lao động mới tái tạo đủ giá trị sức lao động","Tư liệu sản xuất tự tạo giá trị mới trước khi sức lao động được đưa vào sử dụng","Người lao động chỉ cần một phần ngày lao động để tạo giá trị bù đắp sức lao động","Việc mua sức lao động trong lưu thông tự làm số tiền ứng trước tăng thêm giá trị"],"answer":2,"explanation":"Sản xuất phải đạt trình độ mà người lao động chỉ cần một phần thời gian đã thỏa thuận để tạo lượng giá trị bù đắp sức lao động. Phần thời gian còn lại dưới sự quản lý của người mua sức lao động là thời gian lao động thặng dư.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":79,"text":"Khi người lao động chỉ cần một phần thời gian đã thỏa thuận để bù đắp giá trị sức lao động, thời gian còn lại trở thành thời gian lao động thặng dư."},"num":220},{"id":"C03-Q068","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Cấu trúc quá trình sản xuất giá trị thặng dư","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Quá trình sản xuất giá trị thặng dư là sự thống nhất của hai quá trình nào?","options":["Quá trình bảo quản hàng hóa và quá trình chuyển quyền sở hữu","Quá trình tạo ra giá trị và quá trình làm tăng giá trị","Quá trình định giá hàng hóa và quá trình phân phối thu nhập","Quá trình vay tư bản và quá trình hoàn trả lợi tức"],"answer":1,"explanation":"Sản xuất giá trị thặng dư vừa là quá trình lao động tạo ra giá trị mới, vừa là quá trình kéo dài sự tạo giá trị vượt điểm bù đắp giá trị sức lao động để làm tăng giá trị ứng trước.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":79,"text":"Quá trình sản xuất giá trị thặng dư là sự thống nhất của quá trình tạo ra giá trị và quá trình làm tăng giá trị."},"num":221},{"id":"C03-Q069","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Lao động quản lý và giá trị mới","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một chủ doanh nghiệp vừa sở hữu tư liệu sản xuất vừa trực tiếp tổ chức, điều hành hoạt động sản xuất bằng sức lao động của mình. Đánh giá nào phù hợp với phân tích của giáo trình?","options":["Toàn bộ giá trị mới do máy móc tạo ra vì người chủ sở hữu máy móc","Toàn bộ giá trị mới chỉ do lao động làm thuê tạo ra trong mọi trường hợp","Lao động quản lý chỉ phân phối giá trị cũ nên không thể đóng góp vào giá trị mới","Lao động quản lý có thể góp vào giá trị mới với tư cách lao động phức tạp"],"answer":3,"explanation":"Khi người mua sức lao động cũng thực sự hao phí sức lao động để quản lý, giá trị mới có sự đóng góp của lao động quản lý với tư cách lao động phức tạp. Điều này khác giả định nhà tư bản chỉ là chủ sở hữu thuần túy.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":82,"text":"Nếu người mua sức lao động cũng hao phí sức lao động quản lý thì giá trị mới có một phần đóng góp của lao động quản lý với tư cách lao động phức tạp."},"num":222},{"id":"C03-Q070","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Cấu thành thời gian chu chuyển","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Thời gian chu chuyển của tư bản gồm hai bộ phận cơ bản nào?","options":["Thời gian sản xuất và thời gian lưu thông","Thời gian hao mòn hữu hình và thời gian hao mòn vô hình","Thời gian lao động tất yếu và thời gian lao động thặng dư","Thời gian tích lũy và thời gian tiêu dùng"],"answer":0,"explanation":"Một vòng chu chuyển bao quát cả thời gian tư bản ở trong lĩnh vực sản xuất và thời gian tư bản thực hiện các hoạt động mua, bán trong lưu thông.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":86,"text":"Thời gian chu chuyển của tư bản bao gồm thời gian sản xuất và thời gian lưu thông.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":22}},"num":223},{"id":"C03-Q071","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Môi trường kinh doanh và hiệu quả tuần hoàn","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao nỗ lực tổ chức bên trong doanh nghiệp chưa phải là điều kiện duy nhất bảo đảm tuần hoàn tư bản đạt hiệu quả?","options":["Do hiệu quả chỉ phụ thuộc quy mô tiền ứng trước, không liên quan tổ chức hay môi trường","Do doanh nghiệp chỉ cần chờ Nhà nước quyết định thay mọi hoạt động mua, sản xuất và bán","Do còn cần điều kiện bên ngoài thuận lợi và Nhà nước kiến tạo môi trường kinh doanh","Do mọi doanh nghiệp thực hiện đủ quy trình luôn đạt mức hiệu quả hoàn toàn giống nhau"],"answer":2,"explanation":"Doanh nghiệp phải tổ chức tốt đầu vào, sản xuất và đầu ra, nhưng hiệu quả còn phụ thuộc các điều kiện khách quan bên ngoài. Vì vậy, môi trường kinh doanh thuận lợi và sự hỗ trợ kiến tạo của Nhà nước cũng cần thiết.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":86,"text":"Kinh doanh hiệu quả cần nỗ lực tổ chức của doanh nhân, điều kiện bên ngoài thuận lợi và sự hỗ trợ của Nhà nước trong kiến tạo môi trường kinh doanh."},"num":224},{"id":"C03-Q072","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Rút ngắn thời gian lưu thông","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Một doanh nghiệp giữ nguyên thời gian sản xuất nhưng rút ngắn được thời gian tìm khách hàng, giao hàng và thu tiền. Hệ quả trực tiếp nào phù hợp?","options":["Thời gian lưu thông ngắn hơn, thời gian chu chuyển ngắn hơn và tốc độ tăng","Thời gian lưu thông không đổi, thời gian chu chuyển không đổi và tốc độ giữ nguyên","Thời gian sản xuất ngắn hơn, thời gian chu chuyển ngắn hơn và tốc độ tăng","Thời gian lưu thông dài hơn, thời gian chu chuyển dài hơn và tốc độ giảm"],"answer":0,"explanation":"Tìm khách hàng, giao hàng và thu tiền thuộc thời gian bán trong lưu thông. Rút ngắn bộ phận này làm tổng thời gian chu chuyển giảm; với cùng kỳ tính, số vòng chu chuyển tăng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":86,"text":"Thời gian chu chuyển gồm thời gian sản xuất và lưu thông; rút ngắn một bộ phận làm tổng thời gian chu chuyển giảm.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":22}},"num":225},{"id":"C03-Q073","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Phối hợp các giai đoạn tuần hoàn","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao các hoạt động mua yếu tố đầu vào, tổ chức sản xuất và bán hàng phải được phối hợp nhịp nhàng trong tuần hoàn tư bản?","options":["Vì mỗi hoạt động đều độc lập tạo ra toàn bộ giá trị thặng dư cho doanh nghiệp","Vì chỉ hoạt động bán hàng quyết định sản xuất còn hai hoạt động kia không có chức năng","Vì đình trệ ở một khâu sẽ cản trở các khâu còn lại của vòng tuần hoàn","Vì phối hợp ba hoạt động sẽ loại bỏ hoàn toàn nhu cầu thị trường và rủi ro kinh doanh"],"answer":2,"explanation":"Ba giai đoạn thực hiện những chức năng kế tiếp và phụ thuộc nhau. Thiếu đầu vào làm sản xuất đình trệ, tổ chức sản xuất kém không tạo được H', còn bán hàng chậm cản trở việc thực hiện giá trị và bắt đầu vòng mới.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":86,"text":"Tuần hoàn phản ánh các quan hệ khách quan giữa những hoạt động cần kết hợp nhịp nhàng, kịp thời và đúng lúc trong sản xuất kinh doanh."},"num":226},{"id":"C03-Q074","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Các cuộc biến đổi trong tổ chức sản xuất","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Cách ghép nào đúng về ba cuộc biến đổi lớn trong sản xuất mà giáo trình nêu?","options":["Tổ chức - hiệp tác giản đơn; sức lao động - hiệp tác có phân công; tư liệu lao động - đại công nghiệp","Tổ chức - đại công nghiệp; sức lao động - hiệp tác giản đơn; tư liệu lao động - hiệp tác có phân công","Tổ chức - hiệp tác có phân công; sức lao động - đại công nghiệp; tư liệu lao động - hiệp tác giản đơn","Tổ chức - đại công nghiệp; sức lao động - hiệp tác có phân công; tư liệu lao động - hiệp tác giản đơn"],"answer":0,"explanation":"Giáo trình lần lượt gắn cách mạng về tổ chức với hiệp tác giản đơn, cách mạng về sức lao động với hiệp tác có phân công và cách mạng về tư liệu lao động với sự hình thành đại công nghiệp.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":93,"text":"Các cuộc biến đổi lớn gồm hiệp tác giản đơn về tổ chức, hiệp tác có phân công về sức lao động và đại công nghiệp về tư liệu lao động."},"num":227},{"id":"C03-Q075","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Phạm vi tăng năng suất để hạ giá trị sức lao động","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Để hạ giá trị sức lao động và tạo giá trị thặng dư tương đối, năng suất lao động cần tăng trong phạm vi nào?","options":["Trong ngành làm tư liệu sinh hoạt cùng các ngành tạo đầu vào","Chỉ trong các ngành sản xuất hàng xa xỉ cho tiêu dùng cá nhân","Chỉ trong xí nghiệp đang trực tiếp thuê người lao động làm thuê","Trong riêng các hoạt động mua bán và thanh toán sau khi sản xuất"],"answer":0,"explanation":"Giá trị sức lao động giảm khi giá trị tư liệu sinh hoạt và dịch vụ cần thiết giảm. Điều này đòi hỏi năng suất tăng cả ở các ngành trực tiếp tạo tư liệu sinh hoạt và các ngành cung cấp tư liệu sản xuất cho chúng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":92,"text":"Muốn hạ giá trị sức lao động phải tăng năng suất trong các ngành sản xuất tư liệu sinh hoạt và các ngành sản xuất tư liệu sản xuất cho những ngành đó."},"num":228},{"id":"C03-Q076","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Từ giá trị thặng dư siêu ngạch đến tương đối","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Vì sao sự theo đuổi giá trị thặng dư siêu ngạch của từng doanh nghiệp có thể góp phần hình thành giá trị thặng dư tương đối trong toàn xã hội?","options":["Bán hàng cao hơn giá trị xã hội làm lưu thông tạo thêm giá trị mới cho toàn nền kinh tế","Mọi doanh nghiệp đồng loạt kéo dài ngày lao động nên thời gian tất yếu tự động giảm","Đổi mới lan rộng làm năng suất xã hội tăng, tạo điều kiện hạ giá trị sức lao động","Đổi mới kỹ thuật làm giá trị cá biệt tăng, khiến thời gian lao động tất yếu kéo dài hơn"],"answer":2,"explanation":"Lợi thế kỹ thuật giúp doanh nghiệp đi trước thu giá trị thặng dư siêu ngạch. Khi cải tiến được phổ biến, năng suất lao động xã hội tăng; nếu tác động đến các tư liệu tái sản xuất sức lao động, giá trị thặng dư tương đối được hình thành.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":92,"text":"Cạnh tranh vì giá trị thặng dư siêu ngạch thúc đẩy cải tiến kỹ thuật, làm tăng năng suất xã hội và hình thành giá trị thặng dư tương đối."},"num":229},{"id":"C03-Q077","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Cấu tạo kỹ thuật của tư bản","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Khi quan sát tư bản ở hình thái hiện vật qua tỷ lệ giữa tư liệu sản xuất và sức lao động, giáo trình dùng khái niệm nào?","options":["Tỷ suất giá trị thặng dư","Cấu tạo hữu cơ của tư bản","Cấu tạo kỹ thuật của tư bản","Tỷ suất lợi nhuận của tư bản"],"answer":2,"explanation":"Cấu tạo kỹ thuật quan sát tư bản ở hình thái hiện vật, tức tỷ lệ giữa khối lượng tư liệu sản xuất được sử dụng và lượng sức lao động vận hành chúng.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":96,"text":"Cấu tạo kỹ thuật là quan hệ tỷ lệ giữa số lượng tư liệu sản xuất và số lượng sức lao động."},"num":230},{"id":"C03-Q078","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Quan hệ giữa cấu tạo kỹ thuật và hữu cơ","difficulty":"Thông hiểu","kind":"thong_hieu_phan_biet","stem":"Vì sao cấu tạo hữu cơ của tư bản không chỉ là một tỷ lệ giá trị c/v bất kỳ?","options":["Vì tỷ lệ này chỉ do biến động giá thị trường của hàng hóa cuối cùng quyết định","Vì c/v do cấu tạo kỹ thuật quyết định và phản ánh biến đổi của cấu tạo ấy","Vì tỷ lệ này được xác định bằng quan hệ giữa giá trị thặng dư và tiền công","Vì tỷ lệ này hoàn toàn độc lập với lượng tư liệu sản xuất và sức lao động"],"answer":1,"explanation":"Cấu tạo hữu cơ là cấu tạo giá trị có liên hệ nội tại với hình thái hiện vật của sản xuất. Nó được cấu tạo kỹ thuật quyết định và phản ánh sự thay đổi của quan hệ giữa tư liệu sản xuất với sức lao động.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":96,"text":"Cấu tạo hữu cơ là cấu tạo giá trị do cấu tạo kỹ thuật quyết định và phản ánh sự biến đổi của cấu tạo kỹ thuật."},"num":231},{"id":"C03-Q079","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Cấu tạo hữu cơ và tỷ suất lợi nhuận","difficulty":"Vận dụng","kind":"van_dung_tinh_huong","stem":"Hai doanh nghiệp có cùng tổng tư bản ứng trước, cùng tỷ suất giá trị thặng dư và tốc độ chu chuyển. Doanh nghiệp A có c/v cao hơn B. Kết luận nào phù hợp?","options":["A có tỷ suất lợi nhuận cao hơn vì sử dụng nhiều tư bản bất biến hơn","Không thể so sánh dù các nhân tố cần thiết đã được giữ không đổi","Hai bên có tỷ suất lợi nhuận bằng nhau vì tổng tư bản ứng trước bằng nhau","A có tỷ suất lợi nhuận thấp hơn vì tỷ trọng tư bản khả biến nhỏ hơn"],"answer":3,"explanation":"Khi tổng tư bản và m' bằng nhau, c/v cao hơn nghĩa là tỷ trọng v thấp hơn. Vì m = m' × v nên A tạo khối lượng m nhỏ hơn trên cùng tổng tư bản, do đó p' = m/(c + v) của A thấp hơn.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":102,"text":"Cấu tạo hữu cơ c/v là một nhân tố tác động tới lợi nhuận và tỷ suất lợi nhuận.","slide":{"file":"MLN122. Slot 3+4. Giá trị thặng dư-Tích luỹ tư bản.pptx.txt","number":48}},"num":232},{"id":"C03-Q080","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Vai trò của lợi nhuận","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Theo giáo trình, lợi nhuận giữ vai trò nào trong hoạt động sản xuất, kinh doanh của nhà tư bản?","options":["Chỉ xuất hiện khi hàng hóa được bán thấp hơn chi phí sản xuất","Chỉ là khoản bù đắp tư bản bất biến đã tiêu dùng trong sản xuất","Là thước đo trực tiếp trình độ khai thác sức lao động làm thuê","Là mục tiêu, động cơ và động lực của hoạt động sản xuất, kinh doanh"],"answer":3,"explanation":"Lợi nhuận là lợi ích kinh tế trực tiếp mà nhà tư bản theo đuổi. Vì vậy, nó trở thành mục tiêu, động cơ và động lực của hoạt động sản xuất, kinh doanh trong nền kinh tế thị trường.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":101,"text":"Lợi nhuận là mục tiêu, động cơ và động lực của hoạt động sản xuất, kinh doanh trong nền kinh tế thị trường."},"num":233},{"id":"C03-Q081","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Hai mặt xã hội của tích lũy tư bản","difficulty":"Thông hiểu","kind":"trinh_tu_quan_he","stem":"Nhận định nào phản ánh đúng tính hai mặt của quá trình tích lũy tư bản theo C. Mác?","options":["Tích lũy đồng thời làm giảm của cải của nhà tư bản và tăng tiền công của mọi lao động","Tích lũy sự giàu sang cho tư sản đồng thời tích lũy sự bần cùng cho lao động làm thuê","Tích lũy chỉ làm tăng máy móc nên không tác động đến quan hệ thu nhập giữa các giai cấp","Tích lũy phân phối của cải ngang nhau cho nhà tư bản và người lao động làm thuê"],"answer":1,"explanation":"Sự mở rộng quy mô và tăng cấu tạo hữu cơ làm của cải tập trung về phía chủ sở hữu tư bản, trong khi tư bản khả biến giảm tương đối và người lao động đối mặt với nguy cơ thất nghiệp, bần cùng hóa.","source":{"file":"GIAO-TRINH-KINH-TE-CHINH-TRI-MAC-LENIN-BO-GIAO-DUC-VA-DAO-TAO.pdf","page":97,"text":"Tích lũy tư bản có hai mặt: tích lũy sự giàu sang về phía tư sản và tích lũy sự bần cùng về phía công nhân làm thuê."},"num":234},{"id":"C03-Q082","chapter":"Chương 3 · Slot 3+4: Giá trị thặng dư và tích lũy tư bản","chapterNum":3,"topic":"Ý nghĩa của các hình thức biểu hiện giá trị thặng dư","difficulty":"Nhận biết","kind":"nhan_biet_khai_niem","stem":"Nghiên cứu các hình thức biểu hiện của giá trị thặng dư thực chất là phân tích quan hệ nào?","options":["Quan hệ trao đổi hàng hóa giữa người sản xuất với người tiêu dùng","Quan hệ điều tiết giá
